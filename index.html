// ─── STORAGE HELPERS ────────────────────────────────────────────────────────
const STORAGE_KEYS = {
  PROJECTS: "rrp_projects",
  CHATS: "rrp_chats",
  MESSAGES: "rrp_messages",
  SETTINGS: "rrp_settings",
  ACTIVE: "rrp_active",
};

const DB_NAME = "mirror_app_db";
const DB_VERSION = 1;
const STORE_NAME = "kv";
const STORAGE_CACHE = Object.create(null);
let storageInitPromise = null;

const openStorageDb = () => new Promise((resolve, reject) => {
  const request = indexedDB.open(DB_NAME, DB_VERSION);
  request.onupgradeneeded = () => {
    const db = request.result;
    if (!db.objectStoreNames.contains(STORE_NAME)) db.createObjectStore(STORE_NAME);
  };
  request.onsuccess = () => resolve(request.result);
  request.onerror = () => reject(request.error || new Error("IndexedDB failed to open"));
});

const withStore = async (mode, fn) => {
  const db = await openStorageDb();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(STORE_NAME, mode);
    const store = tx.objectStore(STORE_NAME);
    let result;
    try { result = fn(store, tx); }
    catch (error) { reject(error); return; }
    tx.oncomplete = () => resolve(result);
    tx.onerror = () => reject(tx.error || new Error("IndexedDB transaction failed"));
    tx.onabort = () => reject(tx.error || new Error("IndexedDB transaction aborted"));
  });
};

const initStorageCache = async () => {
  if (storageInitPromise) return storageInitPromise;
  storageInitPromise = (async () => {
    try {
      const db = await openStorageDb();
      await new Promise((resolve, reject) => {
        const tx = db.transaction(STORE_NAME, "readonly");
        const store = tx.objectStore(STORE_NAME);
        const keysReq = store.getAllKeys();
        const valuesReq = store.getAll();
        // Populate cache inside tx.oncomplete so both requests are guaranteed
        // to have finished before we resolve. The old approach attached nested
        // onsuccess handlers that could fire after the promise already resolved,
        // causing the cache to be empty when the app first reads from it —
        // which meant compaction chunks and other state appeared to vanish on reload.
        tx.oncomplete = () => {
          const keys = keysReq.result || [];
          const values = valuesReq.result || [];
          Object.keys(STORAGE_CACHE).forEach(key => delete STORAGE_CACHE[key]);
          keys.forEach((key, index) => { STORAGE_CACHE[key] = values[index]; });
          resolve();
        };
        tx.onerror = () => reject(tx.error || new Error("IndexedDB init transaction failed"));
        tx.onabort = () => reject(tx.error || new Error("IndexedDB init transaction aborted"));
      });
    } catch (error) {
      console.error("Failed to initialize IndexedDB cache", error);
    }
  })();
  return storageInitPromise;
};

const storage = {
  get: (key, fallback = null) => {
    try {
      return Object.prototype.hasOwnProperty.call(STORAGE_CACHE, key) ? STORAGE_CACHE[key] : fallback;
    } catch {
      return fallback;
    }
  },
  set: (key, val) => {
    STORAGE_CACHE[key] = val;
    return withStore("readwrite", (store) => { store.put(val, key); }).catch(error => console.error(`Failed to save ${key}`, error));
  },
  remove: (key) => {
    delete STORAGE_CACHE[key];
    return withStore("readwrite", (store) => { store.delete(key); }).catch(error => console.error(`Failed to remove ${key}`, error));
  },
  clear: () => {
    Object.keys(STORAGE_CACHE).forEach(key => delete STORAGE_CACHE[key]);
    return withStore("readwrite", (store) => { store.clear(); }).catch(error => console.error("Failed to clear storage", error));
  },
};

const MEMORY_DEFAULT_PENDING_LIMIT = 500;

const normalizeMemorySettings = (settings = {}) => {
  const type = MEMORY_TYPES.some(opt => opt.key === settings?.type) ? settings.type : DEFAULT_PROJECT.memorySettings.type;
  const retention = MEMORY_RETENTION_MODES.some(opt => opt.key === settings?.retention) ? settings.retention : DEFAULT_PROJECT.memorySettings.retention;
  const pendingLimitRaw = Number(settings?.pendingLimit);
  return {
    type,
    retention,
    allowLookup: settings?.allowLookup !== false,
    allowInventoryUpdates: settings?.allowInventoryUpdates == null ? type === "fiction" : !!settings.allowInventoryUpdates,
    pendingLimit: Number.isFinite(pendingLimitRaw) ? Math.max(25, Math.min(5000, Math.round(pendingLimitRaw))) : MEMORY_DEFAULT_PENDING_LIMIT,
  };
};

const normalizeMemory = (memory = {}, fallbackProjectId = "") => {
  const now = Date.now();
  const text = String(memory?.content ?? memory?.text ?? "").trim();
  const categoryRaw = String(memory?.category || "other").trim().toLowerCase();
  const statusRaw = String(memory?.status || "active").trim().toLowerCase();
  const tags = Array.isArray(memory?.tags) ? memory.tags.map(tag => String(tag).trim()).filter(Boolean).slice(0, 12) : [];
  return {
    id: memory?.id || makeId("mem"),
    projectId: memory?.projectId || fallbackProjectId || "",
    content: text,
    category: MEMORY_CATEGORIES.includes(categoryRaw) ? categoryRaw : "other",
    tags,
    importance: Math.max(1, Math.min(5, Math.round(Number(memory?.importance) || 3))),
    status: MEMORY_STATUSES.includes(statusRaw) ? statusRaw : "active",
    source: memory?.source || "manual",
    reason: String(memory?.reason || "").trim(),
    createdAt: Number(memory?.createdAt || memory?.ts || now),
    updatedAt: Number(memory?.updatedAt || memory?.ts || memory?.createdAt || now),
  };
};

const normalizeProjectMemory = (memory = [], projectId = "") => (Array.isArray(memory) ? memory : [])
  .map(item => normalizeMemory(item, projectId))
  .filter(item => item.content);

const getMemoryContent = (memory = {}) => String(memory?.content ?? memory?.text ?? "").trim();
const getProjectMemorySettings = (project = {}) => normalizeMemorySettings(project?.memorySettings);

const formatMemoryForModel = (memory = {}) => {
  const tags = Array.isArray(memory.tags) && memory.tags.length ? ` [tags: ${memory.tags.join(", ")}]` : "";
  const category = memory.category || "other";
  const importance = memory.importance || 3;
  return `- (${category}, importance ${importance}) ${getMemoryContent(memory)}${tags}`;
};

const normalizeLoreFile = (lore = {}, fallbackProjectId = "") => {
  const now = Date.now();
  return {
    id: lore?.id || makeId("lore"),
    projectId: lore?.projectId || fallbackProjectId || "",
    title: String(lore?.title ?? ""),
    restricted: !!lore?.restricted,
    restrictedReason: String(lore?.restrictedReason ?? lore?.reason ?? ""),
    lore: String(lore?.lore ?? lore?.content ?? lore?.text ?? ""),
    bannerImage: String(lore?.bannerImage ?? lore?.image ?? ""),
    createdAt: Number(lore?.createdAt || now),
    updatedAt: Number(lore?.updatedAt || lore?.createdAt || now),
  };
};

const normalizeProjectLoreFiles = (loreFiles = [], projectId = "") => (Array.isArray(loreFiles) ? loreFiles : [])
  .filter(item => item && typeof item === "object" && !Array.isArray(item))
  .map(item => normalizeLoreFile(item, projectId));

const formatLoreFileForModel = (lore = {}) => {
  const title = String(lore.title || "Untitled Lore File").trim() || "Untitled Lore File";
  const restrictedLine = lore.restricted ? `Restricted: yes${lore.restrictedReason ? ` (${lore.restrictedReason})` : ""}` : "Restricted: no";
  return `## LORE FILE: ${title}\n${restrictedLine}\n${String(lore.lore || "").trim() || "No lore text."}`;
};

const normalizeModelMeta = (meta = {}) => {
  const cleanProviderMeta = (items = {}) => Object.fromEntries(Object.entries(items || {}).map(([id, item]) => [id, {
    input: Number.isFinite(Number(item?.input)) ? Number(item.input) : null,
    cachedInput: Number.isFinite(Number(item?.cachedInput)) ? Number(item.cachedInput) : null,
    output: Number.isFinite(Number(item?.output)) ? Number(item.output) : null,
    context: Number.isFinite(Number(item?.context)) ? Number(item.context) : null,
    source: item?.source || "manual",
  }]));
  return {
    openrouter: cleanProviderMeta(meta?.openrouter),
    openai: { ...OPENAI_DEFAULT_MODEL_META, ...cleanProviderMeta(meta?.openai) },
  };
};

const getProviderModels = (settings = DEFAULT_SETTINGS, provider = settings?.apiProvider) => {
  const safeProvider = normalizeApiProvider(provider);
  const legacyCustom = Array.isArray(settings?.customModels) ? settings.customModels.filter(Boolean) : [];
  if (safeProvider === "openai") {
    const list = Array.isArray(settings?.openaiModels) ? settings.openaiModels.filter(Boolean) : [];
    return list.length ? list : [...OPENAI_BUILTIN_MODELS];
  }
  const explicit = Array.isArray(settings?.openrouterModels) ? settings.openrouterModels.filter(Boolean) : [];
  const legacy = Array.isArray(settings?.models) ? settings.models.filter(Boolean) : [];
  const list = explicit.length ? explicit : (legacy.length ? legacy : [...BUILTIN_MODELS]);
  return [...list, ...legacyCustom.filter(m => !list.includes(m))];
};

const getSettingsDefaultProvider = (settings = DEFAULT_SETTINGS) => normalizeApiProvider(settings?.defaultApiProvider || settings?.apiProvider);

const getSettingsDefaultModel = (settings = DEFAULT_SETTINGS, provider = getSettingsDefaultProvider(settings)) => {
  const safeProvider = normalizeApiProvider(provider);
  const models = getProviderModels(settings, safeProvider);
  const candidates = [
    settings?.defaultModel,
    safeProvider === normalizeApiProvider(settings?.apiProvider) ? settings?.model : null,
    models[0],
    safeProvider === "openai" ? OPENAI_BUILTIN_MODELS[0] : BUILTIN_MODELS[0],
  ].filter(Boolean);
  return candidates.find(model => models.includes(model)) || candidates[0] || "";
};

  const candidates = [
    project?.model,
    provider === getSettingsDefaultProvider(settings) ? getSettingsDefaultModel(settings, provider) : null,

    models[0],
    provider === "openai" ? OPENAI_BUILTIN_MODELS[0] : BUILTIN_MODELS[0],
  ].filter(Boolean);
  return candidates.find(model => models.includes(model)) || candidates[0] || "";
};

const formatCurrencyRate = (value) => {
  if (value == null || !Number.isFinite(Number(value))) return "?";
  const n = Number(value);
  if (n === 0) return "$0";
  if (n < 0.01) return `$${n.toFixed(4)}`;
  if (n < 0.1) return `$${n.toFixed(4).replace(/0+$/, "").replace(/\.$/, "")}`;
  if (n < 1) return `$${n.toFixed(2)}`;
  return `$${n.toFixed(2).replace(/\.00$/, "")}`;
};

const parseTokenPricePerMillion = (value) => {
  const n = Number(value);
  return Number.isFinite(n) ? n * 1000000 : null;
};

const formatModelPrice = (meta = null) => {
  if (!meta) return "";
  const hasInput = meta.input != null && Number.isFinite(Number(meta.input));

const isCompactionEmptyState = (compaction = {}) => {

const stripCompactionControlFlags = (compaction = {}) => {

};

const chunkIdentity = (chunk = {}) =>
  chunk.id || `${chunk.fromTs || ""}:${chunk.toTs || ""}:${chunk.count || ""}:${String(chunk.text || "").slice(0, 80)}`;

const rangesOverlap = (a = {}, b = {}) => {
  const aFrom = Number(a.fromTs) || 0;
  const aTo = Number(a.toTs) || aFrom;
  const bFrom = Number(b.fromTs) || 0;
  const bTo = Number(b.toTs) || bFrom;
  if (!aFrom || !bFrom) return false;
  return aFrom <= bTo && bFrom <= aTo;
};

const mergeCompactionStates = (existing = {}, incoming = {}) => {
  const current = normalizeCompactionState(existing);
  const next = normalizeCompactionState(incoming);
  const incomingChunks = next.chunks || [];
  const mergedIncomingRanges = incomingChunks.filter(chunk => chunk?.merged || chunk?.rollupOf || chunk?.rolloverThreshold);
  const keepExisting = (current.chunks || []).filter(oldChunk => {
    const oldId = chunkIdentity(oldChunk);
    if (incomingChunks.some(newChunk => chunkIdentity(newChunk) === oldId)) return false;
    if (mergedIncomingRanges.some(newChunk => rangesOverlap(oldChunk, newChunk))) return false;
    return true;
  });
  const byId = new Map();
  [...keepExisting, ...incomingChunks].forEach(chunk => byId.set(chunkIdentity(chunk), chunk));
  const chunks = Array.from(byId.values()).sort((a, b) => (Number(a.fromTs) || Number(a.createdAt) || 0) - (Number(b.fromTs) || Number(b.createdAt) || 0));
  return normalizeCompactionState({
    summary: next.summary || current.summary || "",
    chunks,
    compactedThroughTs: Math.max(Number(current.compactedThroughTs) || 0, Number(next.compactedThroughTs) || 0) || null,
    updatedAt: Math.max(Number(current.updatedAt) || 0, Number(next.updatedAt) || 0, Date.now()),
  });
};

  const imageModels = rawModels.filter(model => /^(gpt-image-|dall-e-)/i.test(String(model?.id || "")));
  return normalizeOpenAIImageModels(imageModels.length ? imageModels : OPENAI_IMAGE_MODEL_FALLBACK_OPTIONS);
};

const getOpenAIImageModelLabel = (id = "", models = OPENAI_IMAGE_MODEL_FALLBACK_OPTIONS) =>
  (models || []).find(model => model.id === id)?.label || id || "Image model";

const chooseDefaultOpenAIImageModel = (models = []) => {
  const list = normalizeOpenAIImageModels(models.length ? models : OPENAI_IMAGE_MODEL_FALLBACK_OPTIONS);
  const preferred = ["gpt-image-1.5", "gpt-image-1", "gpt-image-1-mini", "dall-e-3", "dall-e-2"];
  for (const id of preferred) {
    const match = list.find(model => model.id === id);
    if (match) return match.id;
  }
  return list[0]?.id || "";
};

const resolveOpenAIImageModel = async ({ apiKey = "", selectedModel = "", autoRoute = true } = {}) => {
  if (!autoRoute && selectedModel) return selectedModel;
  try {
    const liveModels = await fetchOpenAIImageModels(apiKey);
    const chosen = chooseDefaultOpenAIImageModel(liveModels);
    if (chosen) return chosen;
  } catch (error) {
    console.warn("Could not refresh OpenAI image models; using fallback list.", error);
  }
  return chooseDefaultOpenAIImageModel(OPENAI_IMAGE_MODEL_FALLBACK_OPTIONS);
};

const getProviderImageModelOptions = (provider, liveModels = []) => {
  const safeProvider = normalizeApiProvider(provider);
  if (safeProvider === "openai") return liveModels.length ? liveModels : OPENAI_IMAGE_MODEL_FALLBACK_OPTIONS;
  return liveModels.length ? liveModels : OPENROUTER_IMAGE_MODEL_FALLBACK_OPTIONS;
};

const chooseDefaultProviderImageModel = (provider, models = []) =>
  normalizeApiProvider(provider) === "openai" ? chooseDefaultOpenAIImageModel(models) : chooseDefaultOpenRouterImageModel(models);

const getProviderImageModelLabel = (provider, id = "", models = []) =>
  normalizeApiProvider(provider) === "openai" ? getOpenAIImageModelLabel(id, models) : getOpenRouterImageModelLabel(id, models);

const resolveProviderImageModel = async ({ provider = "openrouter", apiKey = "", selectedModel = "", autoRoute = true } = {}) =>
  normalizeApiProvider(provider) === "openai"
    ? resolveOpenAIImageModel({ apiKey, selectedModel, autoRoute })
    : resolveOpenRouterImageModel({ apiKey, selectedModel, autoRoute });

const dataUrlToBlob = async (dataUrl = "") => {
  const res = await fetch(dataUrl);
  if (!res.ok) throw new Error("Could not read attached image data.");
  return res.blob();
};

const getOpenAIImageQuality = (options = {}) => {
  const detail = normalizeImageSettings(options).imageInputDetail;
  if (detail === "low" || detail === "high") return detail;
  return "auto";
};
const normalizeImageSettings = (options = {}) => ({
  imageInputDetail: IMAGE_INPUT_DETAIL_OPTIONS.includes(options.imageInputDetail) ? options.imageInputDetail : DEFAULT_CHAT_OPTIONS.imageInputDetail,
  imageMaxSide: IMAGE_MAX_SIDE_OPTIONS.includes(Number(options.imageMaxSide)) ? Number(options.imageMaxSide) : DEFAULT_CHAT_OPTIONS.imageMaxSide,
  imageJpegQuality: Math.max(0.6, Math.min(0.95, Number(options.imageJpegQuality ?? DEFAULT_CHAT_OPTIONS.imageJpegQuality))),
  imageAutoRoute: options.imageAutoRoute == null ? DEFAULT_CHAT_OPTIONS.imageAutoRoute : !!options.imageAutoRoute,
  imageGenerationModel: String(options.imageGenerationModel || "").trim(),
});

const isImageFile = (file = {}) => IMAGE_ATTACHMENT_TYPES.includes(String(file.type || "").toLowerCase());
const makeImageAttachmentId = () => makeId("img");

const blobToDataUrl = (blob) => new Promise((resolve, reject) => {
  const reader = new FileReader();
  reader.onload = () => resolve(String(reader.result || ""));
  reader.onerror = () => reject(new Error("Failed to read image."));
  reader.readAsDataURL(blob);
});

const loadImageElement = (src) => new Promise((resolve, reject) => {
  const img = new Image();
  img.onload = () => resolve(img);
  img.onerror = () => reject(new Error("Failed to load image."));
  img.src = src;
});

const fileToImageAttachment = async (file, imageSettings = {}) => {
  if (!file) throw new Error("No image selected.");
  if (!isImageFile(file)) throw new Error("Use a PNG, JPG, WEBP, or GIF image.");
  if (file.size > IMAGE_ATTACHMENT_MAX_BYTES) throw new Error("Image is too large. Try an image under 20 MB.");
  const safeImageSettings = normalizeImageSettings(imageSettings);
  const originalDataUrl = await blobToDataUrl(file);
  const mime = String(file.type || "image/png").toLowerCase();
  if (mime === "image/gif") {
    return { id: makeImageAttachmentId(), type: "image", name: file.name || "image.gif", mime, size: file.size || 0, dataUrl: originalDataUrl, createdAt: Date.now() };
  }
  try {
    const img = await loadImageElement(originalDataUrl);
    const maxSide = Math.max(img.naturalWidth || img.width || 1, img.naturalHeight || img.height || 1);
    if (maxSide <= safeImageSettings.imageMaxSide && file.size <= 3 * 1024 * 1024) {
      return { id: makeImageAttachmentId(), type: "image", name: file.name || "image", mime, size: file.size || 0, dataUrl: originalDataUrl, createdAt: Date.now() };
    }
    const scale = Math.min(1, safeImageSettings.imageMaxSide / maxSide);
    const width = Math.max(1, Math.round((img.naturalWidth || img.width || 1) * scale));
    const height = Math.max(1, Math.round((img.naturalHeight || img.height || 1) * scale));
    const canvas = document.createElement("canvas");
    canvas.width = width; canvas.height = height;
    const ctx = canvas.getContext("2d");
    ctx.drawImage(img, 0, 0, width, height);
    const outputMime = mime === "image/png" ? "image/png" : "image/jpeg";
    const dataUrl = outputMime === "image/png" ? canvas.toDataURL(outputMime) : canvas.toDataURL(outputMime, safeImageSettings.imageJpegQuality);
    return { id: makeImageAttachmentId(), type: "image", name: file.name || "image", mime: outputMime, size: Math.round((dataUrl.length * 3) / 4), dataUrl, originalSize: file.size || 0, createdAt: Date.now(), compressed: true };
  } catch (error) {
    return { id: makeImageAttachmentId(), type: "image", name: file.name || "image", mime, size: file.size || 0, dataUrl: originalDataUrl, createdAt: Date.now() };
  }
};

const normalizeImageAttachments = (attachments = []) => (Array.isArray(attachments) ? attachments : [])
  .filter(item => item && item.type === "image" && item.dataUrl)
  .map(item => ({ ...item, id: item.id || makeImageAttachmentId(), name: item.name || "image", mime: item.mime || "image/png" }));

const hasImageAttachments = (messages = []) => (Array.isArray(messages) ? messages : []).some(m => normalizeImageAttachments(m.attachments).length);

const buildChatContentWithImages = (content = "", attachments = [], imageSettings = {}) => {
  const images = normalizeImageAttachments(attachments);
  const safeImageSettings = normalizeImageSettings(imageSettings);
  if (!images.length) return content || "";
  const parts = [];
  if (String(content || "").trim()) parts.push({ type: "text", text: String(content || "") });
  images.forEach(img => parts.push({ type: "image_url", image_url: { url: img.dataUrl, detail: safeImageSettings.imageInputDetail } }));
  return parts.length ? parts : [{ type: "text", text: "" }];
};

const looksLikeImageSupportError = (error) => /image|vision|multimodal|modality|modalities|unsupported|content type|image_url|input_image/i.test(String(error?.message || error || ""));
const looksLikeImageGenerationPrompt = (text = "") => /^(make|generate|create|draw|render|paint|produce)\b[\s\S]{0,160}\b(image|picture|portrait|illustration|art|photo|wallpaper|icon|banner)\b/i.test(String(text || "").trim());

const downloadDataUrl = (filename, dataUrl) => {
  if (!dataUrl) return;
  const link = document.createElement("a");
  link.href = dataUrl;
  link.download = filename || makeDownloadName("mirror-image", "png");
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
};

const PROJECT_ICON_SWATCHES = [
  "#C8C8C8", "#8FA8C7", "#6FA8DC", "#74D3C9", "#8BC68B", "#FFD166",
  "#E3A86B", "#D98C8C", "#C795D8", "#9C8AE6"
];

const getProjectIconDef = (key) => PROJECT_ICON_OPTIONS.find(icon => icon.key === key) || PROJECT_ICON_OPTIONS[0];

const normalizeHexColor = (value) => {
  if (!value) return "";
  let next = String(value).trim();
  if (!next) return "";
  if (!next.startsWith("#")) next = `#${next}`;
  if (/^#[0-9a-fA-F]{3}$/.test(next)) {
    next = `#${next[1]}${next[1]}${next[2]}${next[2]}${next[3]}${next[3]}`;
  }
  return /^#[0-9a-fA-F]{6}$/.test(next) ? next.toUpperCase() : "";
};

const hexToRgb = (value) => {
  const hex = normalizeHexColor(value);
  if (!hex) return null;
  return { r: parseInt(hex.slice(1, 3), 16), g: parseInt(hex.slice(3, 5), 16), b: parseInt(hex.slice(5, 7), 16) };
};

const colorWithAlpha = (value, alpha = 0.12) => {
  const rgb = hexToRgb(value);
  if (!rgb) return `rgba(200,200,200,${alpha})`;
  return `rgba(${rgb.r},${rgb.g},${rgb.b},${alpha})`;
};

const brightenHex = (value, amount = 24) => {
  const rgb = hexToRgb(value);
  if (!rgb) return value;
  const clamp = (n) => Math.max(0, Math.min(255, n));
  return `#${clamp(rgb.r + amount).toString(16).padStart(2, "0")}${clamp(rgb.g + amount).toString(16).padStart(2, "0")}${clamp(rgb.b + amount).toString(16).padStart(2, "0")}`.toUpperCase();
};

const buildResolvedTheme = (settings = {}) => {
  const themeKey = settings?.theme || "mono";
  const base = THEMES[themeKey] || THEMES.mono;
  const supportsCustomAccent = themeKey === "mono" || themeKey === "ivory" || themeKey === "pitch";
  if (!supportsCustomAccent) return base;
  const accent = normalizeHexColor(settings?.accentColor) || base.accent;
  const accentBright = themeKey === "ivory" ? brightenHex(accent, -24) : brightenHex(accent, themeKey === "pitch" ? 46 : 34);
  const borderAccent = themeKey === "ivory" ? accent : brightenHex(accent, themeKey === "pitch" ? 22 : 14);
  const accentGlow = colorWithAlpha(accent, themeKey === "ivory" ? 0.16 : themeKey === "pitch" ? 0.16 : 0.13);
  return { ...base, accent, accentBright, accentGlow, borderAccent };
};

const ProjectGlyph = ({ iconKey = "folder", color = "", size = 16, fallbackColor = "currentColor", title = "" }) => {
  const icon = getProjectIconDef(iconKey);
  const fillColor = normalizeHexColor(color) || fallbackColor;
  return (
    <svg width={size} height={size} viewBox={icon.viewBox} fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden={title ? undefined : "true"} style={{ display: "block", flexShrink: 0 }}>
      {title ? <title>{title}</title> : null}
      <path d={icon.d} fill={fillColor} />
    </svg>
  );
};

}

// ─── INVENTORY MODAL ─────────────────────────────────────────────────────────
function InventoryModal({ t, fonts, project, onClose, onUpdate }) {
  const [editCredits, setEditCredits] = useState(String(project.inventory.credits));
  const [newItem, setNewItem] = useState("");
  const [confirmDelete, setConfirmDelete] = useState(null);
  const items = project.inventory.items || [];

  const save = () => { onUpdate({ ...project.inventory, credits: parseInt(editCredits) || 0 }); };

  const addItem = () => {
    if (!newItem.trim()) return;
    onUpdate({ ...project.inventory, items: [...items, { id: Date.now(), name: newItem.trim(), qty: 1 }] });
    setNewItem("");
  };

  const removeItem = (id) => {
    const item = items.find(i => i.id === id);
    if (!item) return;
    setConfirmDelete({ message: `Remove "${item.name}" from inventory?`, action: () => { onUpdate({ ...project.inventory, items: items.filter(i => i.id !== id) }); setConfirmDelete(null); } });
  };

  const updateQty = (id, delta) => onUpdate({ ...project.inventory, items: items.map(i => i.id === id ? { ...i, qty: Math.max(0, i.qty + delta) } : i) });

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 9000, display: "flex", alignItems: "flex-end", background: "rgba(0,0,0,0.6)", backdropFilter: "blur(4px)" }}>
      <div style={{ width: "100%", maxHeight: "70vh", background: t.bgPanel, borderTop: `1px solid ${t.borderAccent}`, borderRadius: "16px 16px 0 0", overflow: "hidden", display: "flex", flexDirection: "column" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 14px 10px", borderBottom: `1px solid ${t.border}` }}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <BagIcon size={18} color={t.accent} />
            <span style={{ color: t.text, fontFamily: fonts.family, fontSize: 13, fontWeight: 600 }}>Inventory</span>
            <span style={{ color: t.textMuted, fontFamily: fonts.family, fontSize: 11 }}>— {project.name}</span>
          </div>
          <button onClick={onClose} style={{ background: "none", border: "none", cursor: "pointer", color: t.textMuted, padding: 4 }}><Icon d={ICONS.close} size={16} /></button>
        </div>
        <div style={{ overflowY: "auto", padding: 16, flex: 1 }}>
          <div style={{ marginBottom: 20 }}>
            <label style={{ color: t.textMuted, fontFamily: fonts.family, fontSize: 10, letterSpacing: "0.08em", textTransform: "uppercase", display: "block", marginBottom: 6, textAlign: "left" }}>Credits</label>
            <div style={{ display: "flex", gap: 8 }}>
              <input value={editCredits} onChange={e => setEditCredits(e.target.value)} style={{ flex: 1, background: t.bgInput, border: `1px solid ${t.border}`, borderRadius: 8, color: t.text, fontFamily: fonts.family, fontSize: 13, padding: "8px 12px", outline: "none" }} />
              <button onClick={save} style={{ padding: "8px 14px", background: t.accentGlow, border: `1px solid ${t.borderAccent}`, borderRadius: 8, color: t.accent, fontSize: 12, cursor: "pointer", fontFamily: fonts.family }}>Save</button>
            </div>
          </div>
          <div>
            <label style={{ color: t.textMuted, fontFamily: fonts.family, fontSize: 10, letterSpacing: "0.08em", textTransform: "uppercase", display: "block", marginBottom: 6, textAlign: "left" }}>Items</label>
            {items.length === 0 && <p style={{ color: t.textDim, fontFamily: fonts.family, fontSize: 11, marginBottom: 12 }}>No items.</p>}
            {items.map(item => (
              <div key={item.id} style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 8, background: t.bgCard, borderRadius: 8, padding: "8px 10px", border: `1px solid ${t.border}` }}>
                <span style={{ flex: 1, color: t.text, fontFamily: fonts.family, fontSize: 11 }}>{item.name}</span>
                <button onClick={() => updateQty(item.id, -1)} style={{ width: 22, height: 22, background: t.bgInput, border: `1px solid ${t.border}`, borderRadius: 4, color: t.textMuted, cursor: "pointer", fontSize: 12, display: "flex", alignItems: "center", justifyContent: "center" }}>−</button>
                <span style={{ color: t.accent, fontFamily: fonts.family, fontSize: 11, minWidth: 20, textAlign: "center" }}>{item.qty}</span>
                <button onClick={() => updateQty(item.id, 1)} style={{ width: 22, height: 22, background: t.bgInput, border: `1px solid ${t.border}`, borderRadius: 4, color: t.textMuted, cursor: "pointer", fontSize: 12, display: "flex", alignItems: "center", justifyContent: "center" }}>+</button>
                <button onClick={() => removeItem(item.id)} style={{ background: "none", border: "none", cursor: "pointer", color: t.dangerText, padding: 2 }}><Icon d={ICONS.trash} size={13} /></button>
              </div>
            ))}
            <div style={{ display: "flex", gap: 8, marginTop: 4 }}>
              <input value={newItem} onChange={e => setNewItem(e.target.value)} onKeyDown={e => e.key === "Enter" && addItem()} placeholder="Add item..." style={{ flex: 1, background: t.bgInput, border: `1px solid ${t.border}`, borderRadius: 8, color: t.text, fontFamily: fonts.family, fontSize: 11, padding: "7px 10px", outline: "none" }} />
              <button onClick={addItem} style={{ padding: "7px 12px", background: t.accentGlow, border: `1px solid ${t.borderAccent}`, borderRadius: 8, color: t.accent, fontSize: 12, cursor: "pointer" }}>Add</button>
            </div>
          </div>
        </div>
      </div>
      {confirmDelete && <ConfirmModal t={t} message={confirmDelete.message} danger onCancel={() => setConfirmDelete(null)} onConfirm={confirmDelete.action} />}
    </div>
  );
}

// ─── MEMORY PANEL ────────────────────────────────────────────────────────────
function MemoryPanel({ t, fonts, projects, activeProjectId, onUpdateProjectMemory, onUpdateProjectMemorySettings }) {
  const [selectedProjectId, setSelectedProjectId] = useState(activeProjectId || projects[0]?.id || "");
  const [statusFilter, setStatusFilter] = useState("pending");
  const [categoryFilter, setCategoryFilter] = useState("all");
  const [search, setSearch] = useState("");
  const [page, setPage] = useState(0);
  const [expandedId, setExpandedId] = useState(null);
  const [newMem, setNewMem] = useState("");
  const [newCategory, setNewCategory] = useState("other");
  const [newTags, setNewTags] = useState("");
  const selectedProject = projects.find(p => p.id === selectedProjectId) || null;
  const settings = getProjectMemorySettings(selectedProject || {});
  const allMems = normalizeProjectMemory(selectedProject?.memory || [], selectedProject?.id || "");
  const counts = MEMORY_STATUSES.reduce((acc, status) => ({ ...acc, [status]: allMems.filter(m => m.status === status).length }), {});
  const pendingFull = counts.pending >= settings.pendingLimit;

  useEffect(() => {
    if (activeProjectId && projects.some(p => p.id === activeProjectId)) setSelectedProjectId(activeProjectId);
  }, [activeProjectId, projects.length]);

  useEffect(() => { setPage(0); setExpandedId(null); }, [selectedProjectId, statusFilter, categoryFilter, search]);

  const updateSettings = (patch) => {
    if (!selectedProject) return;
    onUpdateProjectMemorySettings(selectedProject.id, normalizeMemorySettings({ ...settings, ...patch }));
  };

  const updateMemoryList = (next) => {
    if (!selectedProject) return;
    onUpdateProjectMemory(selectedProject.id, normalizeProjectMemory(next, selectedProject.id));
  };

  const addMem = () => {
    if (!selectedProject || !newMem.trim()) return;
    const tags = newTags.split(",").map(tag => tag.trim()).filter(Boolean).slice(0, 12);
    const next = [...allMems, normalizeMemory({ id: makeId("mem_manual"), projectId: selectedProject.id, content: newMem.trim(), category: newCategory, tags, importance: 3, status: "active", source: "manual", createdAt: Date.now(), updatedAt: Date.now() }, selectedProject.id)];
    updateMemoryList(next);
    setNewMem("");
    setNewTags("");
  };

  const setMemoryStatus = (id, status) => updateMemoryList(allMems.map(m => m.id === id ? { ...m, status, updatedAt: Date.now() } : m));
  const removeMem = (id) => updateMemoryList(allMems.filter(m => m.id !== id));
  const updateMem = (id, patch) => updateMemoryList(allMems.map(m => m.id === id ? normalizeMemory({ ...m, ...patch, updatedAt: Date.now() }, selectedProject.id) : m));

  const searchable = (m) => `${m.content} ${m.category} ${(m.tags || []).join(" ")} ${m.reason || ""}`.toLowerCase();
  const queryWords = search.toLowerCase().split(/\s+/).filter(Boolean);
  const filtered = allMems
    .filter(m => statusFilter === "all" || m.status === statusFilter)
    .filter(m => categoryFilter === "all" || m.category === categoryFilter)
    .filter(m => !queryWords.length || queryWords.every(word => searchable(m).includes(word)))
    .sort((a, b) => (b.importance - a.importance) || (b.createdAt - a.createdAt));
  const pageCount = Math.max(1, Math.ceil(filtered.length / MEMORY_PAGE_SIZE));
  const safePage = Math.min(page, pageCount - 1);
  const visible = filtered.slice(safePage * MEMORY_PAGE_SIZE, safePage * MEMORY_PAGE_SIZE + MEMORY_PAGE_SIZE);
  const newest = allMems.length ? Math.max(...allMems.map(m => m.createdAt || 0)) : null;
  const oldest = allMems.length ? Math.min(...allMems.map(m => m.createdAt || 0)) : null;

  const buttonStyle = (active) => ({
    padding: "8px 9px", background: active ? t.accentGlow : t.bgCard, border: `1px solid ${active ? t.accent : t.border}`,
    borderRadius: 9, color: active ? t.accentBright : t.textMuted, fontFamily: fonts.family, fontSize: 10, cursor: "pointer", textAlign: "left",
  });

  if (!projects.length) return <p style={{ color: t.textMuted, fontFamily: fonts.family, fontSize: 11 }}>No projects yet. Create a project before using memory.</p>;

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
      <div style={{ background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 12, padding: 12 }}>
        <SectionLabel t={t} fonts={fonts} label="Select Project" />
        <select value={selectedProjectId} onChange={e => setSelectedProjectId(e.target.value)} style={{ width: "100%", boxSizing: "border-box", background: t.bgInput, border: `1px solid ${t.border}`, borderRadius: 8, color: t.text, fontFamily: fonts.family, fontSize: 11, padding: "9px 10px", outline: "none", marginBottom: 10 }}>
          {projects.map(p => <option key={p.id} value={p.id}>{p.name || "Untitled Project"}</option>)}
        </select>
        <p style={{ color: t.textMuted, fontFamily: fonts.family, fontSize: 10, lineHeight: 1.45, margin: 0 }}>Project memories only apply inside the selected project. Other projects cannot call or review these memories.</p>
      </div>

      {selectedProject && (<>
        <div style={{ background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 12, padding: 12 }}>
          <SectionLabel t={t} fonts={fonts} label="Project Memory Type" />
          <div style={{ display: "grid", gridTemplateColumns: "repeat(2, minmax(0, 1fr))", gap: 8, marginBottom: 12 }}>
            {MEMORY_TYPES.map(opt => (
              <button key={opt.key} onClick={() => updateSettings({ type: opt.key })} style={buttonStyle(settings.type === opt.key)}>
                <strong style={{ display: "block", fontSize: 11, color: settings.type === opt.key ? t.accentBright : t.text }}>{opt.label}</strong>
                <span style={{ display: "block", marginTop: 4, lineHeight: 1.35, color: settings.type === opt.key ? t.text : t.textDim }}>{opt.sub}</span>

          </div>
          <SectionLabel t={t} fonts={fonts} label="Memory Retention Mode" />
          <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 12 }}>
            {MEMORY_RETENTION_MODES.map(opt => (
              <button key={opt.key} onClick={() => updateSettings({ retention: opt.key })} style={buttonStyle(settings.retention === opt.key)}>

            {[100, 250, 500, 1000, 2000].map(n => <option key={n} value={n}>{n} pending memories</option>)}

          {pendingFull && <p style={{ color: t.dangerText, fontFamily: fonts.family, fontSize: 10, lineHeight: 1.45, marginTop: 8 }}>Pending memory limit reached. Review, approve, archive, or delete pending memories before new review-mode proposals can be stored.</p>}

                    {expanded && m.reason ? <div style={{ color: t.textMuted, fontFamily: fonts.family, fontSize: 10, lineHeight: 1.35, marginTop: 6 }}>Reason: {m.reason}</div> : null}
                    {expanded && m.tags?.length ? <div style={{ color: t.textMuted, fontFamily: fonts.family, fontSize: 10, lineHeight: 1.35, marginTop: 4 }}>Tags: {m.tags.join(", ")}</div> : null}
                  </button>
                  <button onClick={() => removeMem(m.id)} style={{ background: "none", border: "none", color: t.dangerText, cursor: "pointer", padding: 2 }}><Icon d={ICONS.trash} size={13} /></button>
                </div>
                {expanded && <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6, marginTop: 8 }}>{m.status !== "active" && <button onClick={() => setMemoryStatus(m.id, "active")} style={buttonStyle(false)}>Approve</button>}{m.status !== "pending" && <button onClick={() => setMemoryStatus(m.id, "pending")} style={buttonStyle(false)}>Move to pending</button>}{m.status !== "archived" && <button onClick={() => setMemoryStatus(m.id, "archived")} style={buttonStyle(false)}>Archive</button>}<select value={m.category} onChange={e => updateMem(m.id, { category: e.target.value })} style={{ background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 8, color: t.text, fontFamily: fonts.family, fontSize: 10, padding: "8px" }}>{MEMORY_CATEGORIES.map(cat => <option key={cat} value={cat}>{cat}</option>)}</select></div>}
              </div>
            );
          })}
        </div>
      </>)}
    </div>
  );
}

const CHARACTER_STATUS_OPTIONS = ["active", "deceased", "missing", "unknown"];
const CHARACTER_STATUS_LABELS = { active: "Active", deceased: "Deceased", missing: "Missing", unknown: "Unknown" };
const getCharacterStatus = (char = {}) => {
  const raw = String(char?.status || "active").trim().toLowerCase();
  return CHARACTER_STATUS_OPTIONS.includes(raw) ? raw : "active";
};
const getCharacterStatusColor = (status, t = {}) => ({
  active: t.successText || "#7affa0",
  deceased: t.dangerText || "#ff8080",
  missing: "#f0c674",
  unknown: t.textDim || "#8a8a8a",
}[status] || t.textDim || "#8a8a8a");
const getCharacterClassSubtitle = (char = {}) => {
  const type = String(char?.classType || "").trim();
  const rank = String(char?.classRank ?? "").trim();
  if (type && rank && Number(rank) > 0) return `${type} ${rank}`;
  if (type) return type;
  return "Character file";
};
const getCharacterGalleryClass = (char = {}) => String(char?.classType || "").trim();
const createDefaultStats = () => DEFAULT_CHARACTER_STATS.reduce((acc, stat) => ({ ...acc, [stat]: 8 }), {});
const normalizeStats = (stats = {}) => {
  const next = createDefaultStats();
  DEFAULT_CHARACTER_STATS.forEach(stat => {
    const n = Number(stats?.[stat]);
    next[stat] = Math.max(POINT_BUY_MIN, Math.min(POINT_BUY_MAX, Number.isFinite(n) ? Math.round(n) : 8));
  });
  return next;
};
const parseClassList = (value) => String(value || "").split(",").map(part => part.trim()).filter(Boolean);
const clampTrainingBonusValue = (value) => Math.max(0, Math.min(TRAINING_BONUS_MAX, Math.round(Number(value) || 0)));
const createTrainingBonus = () => ({ id: makeId("bonus"), value: 0, stat: DEFAULT_CHARACTER_STATS[0], source: "" });
const normalizeTrainingBonus = (bonus = {}) => ({
  id: bonus?.id || makeId("bonus"),
  value: clampTrainingBonusValue(bonus?.value),
  stat: DEFAULT_CHARACTER_STATS.includes(String(bonus?.stat || "").toUpperCase()) ? String(bonus.stat).toUpperCase() : DEFAULT_CHARACTER_STATS[0],
  source: String(bonus?.source || bonus?.note || bonus?.label || ""),
});
const normalizeTrainingBonuses = (bonuses = []) => Array.isArray(bonuses) ? bonuses.map(normalizeTrainingBonus) : [];
const getTrainingBonuses = (char = {}) => normalizeTrainingBonuses(char.trainingBonuses);
const getTrainingBonusTotals = (char = {}) => getTrainingBonuses(char).reduce((acc, bonus) => ({ ...acc, [bonus.stat]: (acc[bonus.stat] || 0) + bonus.value }), DEFAULT_CHARACTER_STATS.reduce((acc, stat) => ({ ...acc, [stat]: 0 }), {}));
const getCharacterClassLevel = (char = {}, settings = {}) => {
  const maxLevel = clampClassLevelMax(settings?.maxClassLevel);
  const n = Math.round(Number(char?.classRank) || 0);
  return Math.max(0, Math.min(maxLevel, n));
};
const getScaledClassBonusValue = (slotKey, classLevel, maxLevel) => {
  const level = Math.max(0, Math.min(clampClassLevelMax(maxLevel), Math.round(Number(classLevel) || 0)));
  const max = clampClassLevelMax(maxLevel);
  if (slotKey === "primary") return 1 + (level >= max ? 1 : 0);
  if (slotKey === "secondary") return level >= Math.ceil(max * 0.6) ? 1 : 0;
  if (slotKey === "tertiary") return level >= Math.ceil(max * 0.8) ? 1 : 0;
  return 0;
};
const getClassBonusEntry = (settings = {}, classType = "") => {
  const className = String(classType || "").trim();
  const all = settings?.classBonuses || {};
  const key = Object.keys(all).find(k => k.toLowerCase() === className.toLowerCase());
  return key ? normalizeClassBonusEntry(all[key]) : normalizeClassBonusEntry();
};
const getClassBonuses = (settings = {}, classType = "", classLevel = 0) => {
  const entry = getClassBonusEntry(settings, classType);
  const useScaling = !!settings?.scaleClassBonusesToLevel && !entry.exemptFromScaling;
  const maxLevel = clampClassLevelMax(settings?.maxClassLevel);
  return CHARACTER_BONUS_SLOTS.reduce((acc, slot) => {
    const slotData = entry.slots?.[slot.key] || {};
    const stat = normalizeBonusStat(slotData.stat);
    if (stat === DISABLED_STAT_OPTION) return acc;
    const value = useScaling ? getScaledClassBonusValue(slot.key, classLevel, maxLevel) : (Number(slotData.value) || 0);
    if (!value) return acc;
    return { ...acc, [stat]: (acc[stat] || 0) + value };
  }, DEFAULT_CHARACTER_STATS.reduce((acc, stat) => ({ ...acc, [stat]: 0 }), {}));
};
const getClassDisplayLabel = (settings = {}) => settings?.classLabelAsLevel ? "Level" : "Class";

const formatClassBonusInline = (settings = {}, classType = "", classLevel = 0) => {
  const bonuses = getClassBonuses(settings, classType, classLevel);
  const parts = DEFAULT_CHARACTER_STATS
    .filter(stat => bonuses[stat])
    .map(stat => `${bonuses[stat] > 0 ? "+" : ""}${bonuses[stat]} ${stat.toUpperCase()}`);
  return parts.length ? ` (${parts.join(", ")})` : "";
};
const formatClassBonusDisplay = (settings = {}, classType = "", classLevel = 0) => {
  const type = String(classType || "").trim();
  const level = Math.round(Number(classLevel) || 0);
  if (!type && !level) return "";
  const label = level > 0 ? [getClassDisplayLabel(settings), level, type].filter(Boolean).join(" ") : type;
  return `${label}${formatClassBonusInline(settings, type, level)}`.trim();
};

const getTotalStats = (char = {}, settings = {}) => {
  const base = normalizeStats(char.stats);
  const classBonuses = getClassBonuses(settings, char.classType, char.classRank);
  const trainingBonuses = getTrainingBonusTotals(char);
  return DEFAULT_CHARACTER_STATS.reduce((acc, stat) => ({ ...acc, [stat]: base[stat] + classBonuses[stat] + trainingBonuses[stat] }), {});
};
const getPointBuySpent = (stats = {}) => {
  const base = normalizeStats(stats);
  return DEFAULT_CHARACTER_STATS.reduce((sum, stat) => sum + (POINT_BUY_COSTS[base[stat]] ?? 0), 0);
};
const hasCharacterStats = (char = {}) => !!char.stats;
const createEmptyCharacter = () => ({
  id: makeId("char"), excluded: false, active: true, mainAlias: "", otherAliases: "", senderId: "",
  realName: "", age: "", gender: "", faction: "", classType: "", classRank: 0, role: "", alignment: "",
  status: "active", summary: "", appearance: "", height: "", weight: "", personality: "", traits: "", tags: "",
  relationships: "", abilities: "", gear: "", backstory: "", notes: "", stats: null, trainingBonuses: [], restricted: {},
});
const splitListString = (value) => String(value || "").split(",").map(part => part.trim()).filter(Boolean);
const parseRelationshipLines = (value) => {
  if (Array.isArray(value)) {
    return value.map(rel => ({
      name: rel?.name || "",
      whatTheyCallThem: Array.isArray(rel?.whatTheyCallThem) ? rel.whatTheyCallThem : splitListString(rel?.whatTheyCallThem || rel?.callnames || ""),
      type: Array.isArray(rel?.type) ? rel.type : splitListString(rel?.type || ""),
    })).filter(rel => rel.name || rel.whatTheyCallThem.length || rel.type.length);
  }
  return String(value || "").split("\n").map(line => line.trim()).filter(Boolean).map(line => ({ name: line, whatTheyCallThem: [], type: [] }));
};
const formatRelationshipLines = (value) => {
  if (!Array.isArray(value)) return String(value || "");
  return parseRelationshipLines(value).map(rel => {
    const names = rel.whatTheyCallThem.join(", ");
    const type = rel.type.join(", ");
    return [rel.name, names, type].filter(Boolean).join(" — ");
  }).join("\n");
};

const getCharacterPrimaryName = (char = {}) =>
  char.mainAlias || char.name || char.senderId || char.otherAliases || char.realName || "Untitled";

const normalizeCharacterForEditor = (char = {}) => ({
  ...createEmptyCharacter(), ...char,
  mainAlias: char.mainAlias || char.name || "",
  otherAliases: Array.isArray(char.otherAliases) ? char.otherAliases.join(", ") : (char.otherAliases || ""),
  personality: Array.isArray(char.personality ?? char.traits) ? (char.personality ?? char.traits).join(", ") : ((char.personality ?? char.traits) || ""),
  traits: Array.isArray(char.traits) ? char.traits.join(", ") : (char.traits || ""),
  tags: Array.isArray(char.tags) ? char.tags.join(", ") : (char.tags || ""),
  relationships: formatRelationshipLines(char.relationships),
  stats: char.stats ? normalizeStats(char.stats) : null,
  trainingBonuses: normalizeTrainingBonuses(char.trainingBonuses),
  status: getCharacterStatus(char),
  excluded: char.excluded != null ? !!char.excluded : char.active === false,
  active: char.active !== false,
  restricted: typeof char.restricted === "object" && char.restricted ? char.restricted : {},
});

const getVisibleCharacterValue = (char = {}, key, includeRestricted = false) => {
  if (!includeRestricted && char?.restricted?.[key]) return "";
  if (key === "relationships") return formatRelationshipLines(char.relationships);
  if (key === "stats") return formatStatsForModel(char);
  const value = key === "personality" ? (char?.personality ?? char?.traits) : (key === "traits" ? (char?.traits ?? char?.personality) : char?.[key]);
  if (Array.isArray(value)) return value.join(", ");
  return String(value || "").trim();
};

const getSafeCharacterName = (char = {}, includeRestricted = false) => {
  for (const key of ["mainAlias", "otherAliases", "senderId", "realName"]) {
    const value = getVisibleCharacterValue(char, key, includeRestricted);
    if (value) return key === "otherAliases" ? value.split(",")[0].trim() : value;
  }
  return "Untitled Character";
};

const formatStatsForModel = (char = {}, settings = {}) => {
  if (!hasCharacterStats(char)) return "";
  const base = normalizeStats(char.stats);
  const classBonuses = getClassBonuses(settings, char.classType, char.classRank);
  const trainingBonuses = getTrainingBonusTotals(char);
  const trainingRows = getTrainingBonuses(char);
  const total = getTotalStats(char, settings);
  return DEFAULT_CHARACTER_STATS.map(stat => {
    const parts = [];
    if (classBonuses[stat]) parts.push(`${classBonuses[stat]} class bonus`);
    if (trainingBonuses[stat]) {
      const sources = trainingRows
        .filter(bonus => bonus.stat === stat && bonus.value > 0)
        .map(bonus => `+${bonus.value}${bonus.source.trim() ? ` ${bonus.source.trim()}` : ""}`)
        .join("; ");
      parts.push(`${trainingBonuses[stat]} training bonus${sources ? ` (${sources})` : ""}`);
    }
    const bonus = parts.length ? ` (${base[stat]} + ${parts.join(" + ")})` : "";
    return `${stat}: ${total[stat]}${bonus}`;
  }).join(", ");
};

const formatTrainingBonusesForModel = (char = {}) => {
  const bonuses = getTrainingBonuses(char).filter(bonus => bonus.value > 0 || bonus.source.trim());
  if (!bonuses.length) return "";
  return bonuses.map(bonus => {
    const source = bonus.source.trim() ? ` — ${bonus.source.trim()}` : "";
    return `+${bonus.value} ${bonus.stat}${source}`;
  }).join("; ");
};

const CHARACTER_LOOKUP_FIELDS = [
  ...CHARACTER_FIELDS.map(field => field.key),
  "stats",
  "trainingBonuses",
  "fullProfile",
];

const CHARACTER_LOOKUP_FIELD_LABELS = {
  ...Object.fromEntries(CHARACTER_FIELDS.map(field => [field.key, field.label])),
  stats: "Stats",
  trainingBonuses: "Bonuses",
  fullProfile: "Full Profile",
};

const getCharacterLookupFieldMenu = () => CHARACTER_LOOKUP_FIELDS
  .map(key => `${key} (${CHARACTER_LOOKUP_FIELD_LABELS[key] || key})`)
  .join(", ");

const normalizeCharacterLookupFields = (fields = []) => {
  const raw = Array.isArray(fields) ? fields : String(fields || "").split(",");
  const cleaned = raw.map(field => String(field || "").trim()).filter(Boolean);
  const valid = cleaned.filter(field => CHARACTER_LOOKUP_FIELDS.includes(field));
  return [...new Set(valid.length ? valid : ["mainAlias", "classType", "classRank"] )];
};

const formatCharacterForModel = (char = {}, includeRestricted = false, characterSettings = {}) => {
  const lines = [`## ${getSafeCharacterName(char, includeRestricted)}`];
  CHARACTER_FIELDS.forEach(field => {
    const value = getVisibleCharacterValue(char, field.key, includeRestricted);
    if (!value) return;
    if (field.key === "relationships") {
      const relLines = formatRelationshipLines(value).split("\n").filter(Boolean);
      if (!relLines.length) return;
      lines.push(`Relationships:\n${relLines.map(line => `- ${line}`).join("\n")}`);
    } else {
      lines.push(`${field.label}: ${value}`);
    }
  });
  const statsLine = formatStatsForModel(char, characterSettings);
  if (statsLine) lines.push(`Stats: ${statsLine}`);
  const trainingLine = formatTrainingBonusesForModel(char);
  if (trainingLine) lines.push(`Bonuses: ${trainingLine}`);
  return lines.join("\n");
};

const formatCharacterFieldsForModel = (char = {}, fields = [], includeRestricted = false, characterSettings = {}) => {
  const requestedFields = normalizeCharacterLookupFields(fields);
  if (requestedFields.includes("fullProfile")) return formatCharacterForModel(char, includeRestricted, characterSettings);

  const lines = [`## ${getSafeCharacterName(char, includeRestricted)}`];

  requestedFields.forEach(key => {
    if (key === "summary") {
      const summaryValue = getVisibleCharacterValue(char, "summary", includeRestricted);
      if (summaryValue) lines.push(`Summary: ${summaryValue}`);
      return;
    }
    if (key === "stats") {
      const statsLine = formatStatsForModel(char, characterSettings);
      if (statsLine) lines.push(`Stats: ${statsLine}`);
      return;
    }
    if (key === "trainingBonuses") {
      const trainingLine = formatTrainingBonusesForModel(char);
      if (trainingLine) lines.push(`Bonuses: ${trainingLine}`);
      return;
    }
    const field = CHARACTER_FIELDS.find(item => item.key === key);
    if (!field) return;
    const value = getVisibleCharacterValue(char, field.key, includeRestricted);
    if (!value) return;
    if (field.key === "relationships") {
      const relLines = formatRelationshipLines(value).split("\n").filter(Boolean);
      if (relLines.length) lines.push(`Relationships:\n${relLines.map(line => `- ${line}`).join("\n")}`);
      return;
    }
    lines.push(`${field.label}: ${value}`);
  });

  if (lines.length === 1) lines.push(`No visible data found for requested fields: ${requestedFields.join(", ")}.`);
  return lines.join("\n");
};

// FIX: Proper lookup text — lowercased concatenation of all visible fields for fuzzy matching
const getCharacterLookupText = (char = {}, includeRestricted = false, characterSettings = {}) => {
  const relationshipText = parseRelationshipLines(char.relationships)
    .map(rel => [rel.name, rel.whatTheyCallThem.join(" "), rel.type.join(" ")].filter(Boolean).join(" "))
    .join(" ");
  return [
    ...CHARACTER_FIELDS.map(f => getVisibleCharacterValue(char, f.key, includeRestricted)),
    relationshipText,
    formatStatsForModel(char, characterSettings),
    formatTrainingBonusesForModel(char),
  ].filter(Boolean).join(" ").toLowerCase();
};

          style={{ width: "100%", height: "100%", objectFit: "cover", display: "block", pointerEvents: suppressNativeImageActions ? "none" : "auto", WebkitTouchCallout: suppressNativeImageActions ? "none" : undefined, WebkitUserSelect: suppressNativeImageActions ? "none" : undefined, userSelect: suppressNativeImageActions ? "none" : undefined }}
        />
      ) : (
        <>
          {/* subtle grid/scan lines background pattern */}
          <div style={{ position: "absolute", inset: 0, backgroundImage: `repeating-linear-gradient(0deg, transparent, transparent 18px, ${t.accentGlow} 19px)`, opacity: 0.4, pointerEvents: "none" }} />
          <div style={{ position: "relative", display: "flex", flexDirection: "column", alignItems: "center", gap: compact ? 4 : 8 }}>
            <div style={{ color: t.accentBright, fontFamily: "monospace", fontSize: compact ? 20 : 38, fontWeight: 800, letterSpacing: "0.05em", textTransform: "uppercase", textShadow: `0 0 24px ${t.accentGlow}` }}>{initials}</div>
            {!compact && <div style={{ width: 28, height: 1, background: t.borderAccent, opacity: 0.6 }} />}
          </div>
        </>
      )}
      {/* character status indicator dot */}
      {!compact && (
        <div style={{ position: "absolute", bottom: 8, right: 8, width: 8, height: 8, borderRadius: "50%", background: statusColor, boxShadow: status === "unknown" ? "none" : `0 0 6px ${statusColor}`, border: `1.5px solid ${t.bg}` }} />
      )}
    </div>
  );
};

function CharacterModal({ t, fonts, project, onClose, onUpdate, onUpdateSettings, onUpdateLoreFiles, initialScreen = "gallery" }) {
  const [characters, setCharacters] = useState(() => (project.characters || []).map(normalizeCharacterForEditor));
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [activeId, setActiveId] = useState(() => (project.characters || [])[0]?.id || null);
  const [screen, setScreen] = useState(initialScreen);
  const [editMode, setEditMode] = useState(false);
  const [focusedImage, setFocusedImage] = useState(null);
  const [characterSettings, setCharacterSettings] = useState(() => normalizeCharacterSettings(project.characterSettings));
  const [characterImportStatus, setCharacterImportStatus] = useState(null);
  const [loreFiles, setLoreFiles] = useState(() => normalizeProjectLoreFiles(project.loreFiles, project.id));
  const [activeLoreId, setActiveLoreId] = useState(() => normalizeProjectLoreFiles(project.loreFiles, project.id)[0]?.id || null);
  const [loreEditMode, setLoreEditMode] = useState(false);
  const [loreImportStatus, setLoreImportStatus] = useState(null);
  const fileInputRef = useRef(null);
  const singleCharacterImportRef = useRef(null);
  const allCharactersImportRef = useRef(null);
  const loreBannerInputRef = useRef(null);
  const allLoreImportRef = useRef(null);
  const characterCardRefs = useRef({});
  const dragCharacterIdRef = useRef(null);
  const longPressTimerRef = useRef(null);
  const characterSwipeRef = useRef(null);
  const [characterSwipeState, setCharacterSwipeState] = useState({ offsetX: 0, dragging: false, settling: false, noTransition: false });
  const [dragCharacterId, setDragCharacterId] = useState(null);
  const [dragOverCharacterId, setDragOverCharacterId] = useState(null);

  useEffect(() => {
    const normalized = (project.characters || []).map(normalizeCharacterForEditor);
    setCharacters(normalized);
    setActiveId(prev => normalized.some(c => c.id === prev) ? prev : (normalized[0]?.id || null));
    setCharacterSettings(normalizeCharacterSettings(project.characterSettings));
    const normalizedLore = normalizeProjectLoreFiles(project.loreFiles, project.id);
    setLoreFiles(normalizedLore);
    setActiveLoreId(prev => normalizedLore.some(item => item.id === prev) ? prev : (normalizedLore[0]?.id || null));
    if (!normalized.length && screen !== "lore") { setScreen("gallery"); setEditMode(false); }
  }, [project.characters, project.characterSettings, project.loreFiles, project.id]);

  const save = (next) => { setCharacters(next); onUpdate(next); };
  const saveCharacterSettings = (next) => { setCharacterSettings(next); onUpdateSettings?.(next); };
  const saveLoreFiles = (next) => { const normalized = normalizeProjectLoreFiles(next, project.id); setLoreFiles(normalized); onUpdateLoreFiles?.(normalized); };
  const classOptions = parseClassList(characterSettings.classesText);
  const activeChar = characters.find(c => c.id === activeId) || null;
  const activeLore = loreFiles.find(item => item.id === activeLoreId) || loreFiles[0] || null;
  const getAdjacentCharacter = (direction = 1) => {
    if (!characters.length || !activeId) return null;
    const currentIndex = characters.findIndex(c => c.id === activeId);
    if (currentIndex < 0 || characters.length < 2) return null;
    return characters[(currentIndex + direction + characters.length) % characters.length] || null;
  };

  const navigateCharacter = (direction = 1) => {
    if (!characters.length || !activeId) return;
    const currentIndex = characters.findIndex(c => c.id === activeId);
    if (currentIndex < 0) return;
    const nextIndex = (currentIndex + direction + characters.length) % characters.length;
    const next = characters[nextIndex];
    if (!next) return;
    setActiveId(next.id);
    setScreen("detail");
    setEditMode(false);
  };

  const resetCharacterSwipe = (noTransition = false) => {
    setCharacterSwipeState({ offsetX: 0, dragging: false, settling: false, noTransition });
    if (noTransition) {
      requestAnimationFrame(() => requestAnimationFrame(() => {
        setCharacterSwipeState(state => ({ ...state, noTransition: false }));
      }));
    }
  };

  const handleCharacterDetailTouchStart = (event) => {
    if (screen !== "detail" || editMode || focusedImage || event.touches.length !== 1) return;
    const touch = event.touches[0];
    characterSwipeRef.current = { x: touch.clientX, y: touch.clientY, t: Date.now(), locked: null };
    setCharacterSwipeState({ offsetX: 0, dragging: true, settling: false, noTransition: false });
  };

  const handleCharacterDetailTouchMove = (event) => {
    const start = characterSwipeRef.current;
    if (!start || screen !== "detail" || editMode || focusedImage || event.touches.length !== 1) return;
    const touch = event.touches[0];
    const dx = touch.clientX - start.x;
    const dy = touch.clientY - start.y;
    if (!start.locked && (Math.abs(dx) > 8 || Math.abs(dy) > 8)) {
      start.locked = Math.abs(dx) > Math.abs(dy) * 1.15 ? "x" : "y";
    }
    if (start.locked !== "x") return;
    event.preventDefault?.();
    const width = Math.max(280, window.innerWidth || 360);
    const resistance = Math.abs(dx) > width * 0.72 ? 0.72 : 1;
    const eased = Math.max(-width * 0.92, Math.min(width * 0.92, dx * resistance));
    setCharacterSwipeState({ offsetX: eased, dragging: true, settling: false, noTransition: false });
  };

  const handleCharacterDetailTouchEnd = (event) => {
    const start = characterSwipeRef.current;
    characterSwipeRef.current = null;
    if (!start || screen !== "detail" || editMode || focusedImage) { resetCharacterSwipe(); return; }
    const touch = event.changedTouches?.[0];
    if (!touch) { resetCharacterSwipe(); return; }
    const dx = touch.clientX - start.x;
    const dy = touch.clientY - start.y;
    const elapsed = Math.max(1, Date.now() - start.t);
    const velocity = Math.abs(dx) / elapsed;
    const width = Math.max(280, window.innerWidth || 360);
    const shouldNavigate = start.locked === "x" && Math.abs(dx) > 70 && Math.abs(dx) > Math.abs(dy) * 1.25 && (Math.abs(dx) > width * 0.22 || velocity > 0.45);
    if (!shouldNavigate) {
      setCharacterSwipeState({ offsetX: 0, dragging: false, settling: true, noTransition: false });
      window.setTimeout(resetCharacterSwipe, 190);
      return;
    }
    const direction = dx < 0 ? 1 : -1;
    const exitX = direction === 1 ? -width * 1.08 : width * 1.08;
    setCharacterSwipeState({ offsetX: exitX, dragging: false, settling: true, noTransition: false });
    window.setTimeout(() => {
      const applySwipeNavigation = () => {
        resetCharacterSwipe(true);
        navigateCharacter(direction);
      };
      if (window.ReactDOM?.unstable_batchedUpdates) {
        window.ReactDOM.unstable_batchedUpdates(applySwipeNavigation);
      } else {
        applySwipeNavigation();
      }
    }, 170);
  };

  const updateRestricted = (id, key, value) => save(characters.map(c => c.id === id ? { ...c, restricted: { ...(c.restricted || {}), [key]: value } } : c));
  const moveCharacterBefore = (dragId, targetId) => {
    if (!dragId || !targetId || dragId === targetId) return;
    const fromIndex = characters.findIndex(c => c.id === dragId);
    const toIndex = characters.findIndex(c => c.id === targetId);
    if (fromIndex < 0 || toIndex < 0) return;
    const next = [...characters];
    const [moved] = next.splice(fromIndex, 1);
    next.splice(fromIndex < toIndex ? toIndex - 1 : toIndex, 0, moved);
    save(next);
  };
  const clearCharacterDrag = () => {
    clearTimeout(longPressTimerRef.current);
    dragCharacterIdRef.current = null;
    setDragCharacterId(null);
    setDragOverCharacterId(null);

  const beginTouchCharacterDrag = (id) => {

    setDragCharacterId(id);

  const handleCharacterPointerMove = (event) => {

    const hit = Object.entries(characterCardRefs.current).find(([id, node]) => {
      if (!node || id === dragCharacterIdRef.current) return false;
      const rect = node.getBoundingClientRect();

    });
    if (hit) setDragOverCharacterId(hit[0]);

  const handleCharacterPointerUp = () => {

    clearCharacterDrag();

  const addCharacter = () => {

    setActiveId(fresh.id);

    setEditMode(true);

  const openCharacter = (id) => {

    setScreen("detail");
    setEditMode(false);

        setEditMode(false);

    setCharacterImportStatus({ type: "ok", message: "All characters exported." });
  };

  const parseSingleCharacterBackup = (data) => {
    const raw = data?.type === "mirror-character-backup" ? data.character : data?.character || data;

  const parseAllCharactersBackup = (data) => {

      const projectsWithCharacters = data.data.projects.filter(p => Array.isArray(p?.characters) && p.characters.length);
      const matchingProject = projectsWithCharacters.find(p => p.id === project.id || (p.name && project.name && p.name === project.name));
      rawList = (matchingProject || projectsWithCharacters[0])?.characters || [];
    } else if (Array.isArray(data?.data?.characters)) {
      rawList = data.data.characters;
    }

    if (!Array.isArray(rawList)) throw new Error("That file is not a valid all-characters backup.");
    const normalized = rawList
      .filter(char => char && typeof char === "object" && !Array.isArray(char))
      .map((char, index) => normalizeCharacterForEditor({ ...char, id: char?.id || makeId("char_imp") }));

  const handleAllCharactersImport = async (event) => {

    }
  };

  const renderValue = (field, compact = false, sourceChar = activeChar) => {

const getStatGradient = (value) => {
  if (value <= 8) {

  }
  if (value <= 10) {
    return "linear-gradient(90deg, #5a4636, #8a6848)";
  }
  if (value <= 12) {
    return "linear-gradient(90deg, #9a5a2e, #d9823a)";
  }
  if (value <= 14) {
    return "linear-gradient(90deg, #d6a83a, #f0d66a)";
  }
  if (value <= 15) {
    return "linear-gradient(90deg, #6fa85f, #a8e28f)";
  }
  return "linear-gradient(90deg, #3ccfd8, #a8f7ff)";
};

  const getStatSegments = (baseValue = 0, classValue = 0, trainingValue = 0, cap = 20) => {
    let remaining = cap;
    const baseShown = Math.max(0, Math.min(Number(baseValue) || 0, remaining));
    remaining -= baseShown;
    const classShown = Math.max(0, Math.min(Number(classValue) || 0, remaining));
    remaining -= classShown;
    const trainingShown = Math.max(0, Math.min(Number(trainingValue) || 0, remaining));
    return [
      { key: "base", value: baseShown, width: (baseShown / cap) * 100 },
      { key: "class", value: classShown, width: (classShown / cap) * 100 },
      { key: "training", value: trainingShown, width: (trainingShown / cap) * 100 },
    ];
  };

  const renderSegmentedStatBar = ({ baseValue, classValue = 0, trainingValue = 0, totalValue, height = 6, compact = false }) => {

  const updateCharacterStat = (stat, delta) => {

    const smallButtonStyle = (disabled = false) => ({ height: 24, minWidth: 24, borderRadius: 7, border: `1px solid ${t.border}`, background: t.bgInput, color: disabled ? t.textDim : t.text, cursor: disabled ? "default" : "pointer", padding: "0 7px", fontFamily: "monospace", fontSize: 11, fontWeight: 800 });
    return (

  const renderCharacterSettings = () => {
