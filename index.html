      setProviderFetchStatus({ type: "error", message: `Add your ${getProviderLabel(provider)} API key before fetching models.` });
      return;
    }
    setProviderFetchStatus({ type: "ok", message: `Fetching ${getProviderLabel(provider)} models…` });
    try {
      const headers = { Authorization: `Bearer ${key}` };
      const url = provider === "openai" ? "https://api.openai.com/v1/models" : "https://openrouter.ai/api/v1/models";
      const res = await fetch(url, { method: "GET", headers });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data?.error?.message || `Could not fetch ${getProviderLabel(provider)} models.`);
      const rawList = Array.isArray(data?.data) ? data.data : [];
      const parsed = rawList.map(item => ({
        id: item.id,
        name: item.name || item.id,
        meta: provider === "openrouter" ? parseOpenRouterModelMeta(item) : (OPENAI_DEFAULT_MODEL_META[item.id] || { input: null, output: null, context: null, source: "OpenAI models API" }),
      })).filter(item => item.id).sort((a, b) => String(a.id).localeCompare(String(b.id)));
      setProviderModelResults(parsed);
      setProviderFetchStatus({ type: "ok", message: `Found ${parsed.length} ${getProviderLabel(provider)} models. Use search, then tap Add.` });
      if (provider === "openrouter") {
        setDraft(d => {
          const nextMeta = normalizeModelMeta(d.modelMeta);
          parsed.forEach(item => { nextMeta.openrouter[item.id] = item.meta; });
          return { ...d, modelMeta: nextMeta };
        });
      }
    } catch (error) {
      setProviderFetchStatus({ type: "error", message: error?.message || "Model fetch failed." });
    }
  };

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 8000, background: t.bg, display: "flex", flexDirection: "column" }}>
      {confirm && <ConfirmModal t={t} message={confirm.message} onConfirm={confirm.action} onCancel={() => setConfirm(null)} danger />}
      <div style={{ display: "flex", alignItems: "flex-start", gap: 12, padding: "14px 16px", borderBottom: `1px solid ${t.border}`, background: t.headerBg }}>
        <button onClick={() => { onSave(draft); onBack(); }} style={{ background: "none", border: "none", cursor: "pointer", color: t.textMuted, padding: 4, marginTop: 1 }}><Icon d={ICONS.back} size={18} /></button>
        <div style={{ flex: 1, display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 12 }}>
          <span style={{ color: t.text, fontFamily: fonts.family, fontSize: 13, fontWeight: 600, paddingTop: 2 }}>Settings</span>
          <div style={{ textAlign: "right", lineHeight: 1.25 }}>
            <div style={{ color: t.textMuted, fontFamily: fonts.family, fontSize: 10, fontStyle: "italic" }}>github.com/ozmone</div>
            <div style={{ color: t.textDim, fontFamily: fonts.family, fontSize: 9 }}>{APP_VERSION_LABEL}</div>
          </div>
        </div>
      </div>
      <div style={{ display: "flex", borderBottom: `1px solid ${t.border}`, background: t.headerBg }}>
        {tabs.map(tab_ => (
          <button key={tab_} onClick={() => setTab(tab_)} style={{ flex: 1, padding: "10px 4px", background: "none", border: "none", borderBottom: `2px solid ${tab === tab_ ? t.accent : "transparent"}`, color: tab === tab_ ? t.accent : t.textMuted, fontFamily: fonts.family, fontSize: 10, letterSpacing: "0.05em", textTransform: "uppercase", cursor: "pointer" }}>
            {tab_}
          </button>
        ))}
      </div>
      <div style={{ flex: 1, overflowY: "auto", padding: 16 }}>
        {tab === "theme" && (
          <div>
            <SectionLabel t={t} fonts={fonts} label="Theme" />
            <div style={{ display: "grid", gridTemplateColumns: "repeat(2, minmax(0, 1fr))", gap: 10, marginBottom: 20 }}>
              {THEME_OPTIONS.map(({ key, label, swatch }) => (
                <button key={key} onClick={() => setDraft(d => ({ ...d, theme: key }))}
                  style={{ padding: "10px 8px", background: draft.theme === key ? previewTheme.accentGlow : t.bgCard, border: `1px solid ${draft.theme === key ? previewTheme.accent : t.border}`, borderRadius: 10, color: draft.theme === key ? previewTheme.accentBright : t.textMuted, fontFamily: fonts.family, fontSize: 11, cursor: "pointer" }}>
                  <div style={{ width: 28, height: 28, borderRadius: 7, margin: "0 auto 6px", background: swatch, border: `1px solid ${t.border}` }} />
                  {label}
                </button>
              ))}
            </div>
            {(draft.theme === "mono" || draft.theme === "ivory" || draft.theme === "pitch") && (
              <>
                <SectionLabel t={t} fonts={fonts} label={draft.theme === "ivory" ? "Ivory Accent" : draft.theme === "pitch" ? "Pitch Black Accent" : "Dark Slate Accent"} />
                <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 20 }}>
                  {(draft.theme === "ivory" ? IVORY_LIGHT_ACCENTS : draft.theme === "pitch" ? PITCH_BLACK_ACCENTS : DARK_SLATE_ACCENTS).map(color => {
                    const active = (normalizeHexColor(draft.accentColor) || THEMES[draft.theme]?.accent || THEMES.mono.accent) === color;
                    return (
                      <button key={color} onClick={() => setDraft(d => ({ ...d, accentColor: color }))} title={color}
                        style={{ width: 28, height: 28, borderRadius: 999, background: color, border: `2px solid ${active ? previewTheme.accentBright : t.border}`, boxShadow: active ? `0 0 0 2px ${previewTheme.accentGlow}` : "none", cursor: "pointer" }} />
                    );
                  })}
                </div>
              </>
            )}
            <SectionLabel t={t} fonts={fonts} label="Font Family" />
            <div style={{ display: "flex", gap: 8, marginBottom: 20, flexDirection: "column" }}>
              {Object.entries(FONTS).map(([key, f]) => (
                <button key={key} onClick={() => setDraft(d => ({ ...d, fontFamily: key }))}
                  style={{ padding: "7px 10px", background: draft.fontFamily === key ? previewTheme.accentGlow : t.bgCard, border: `1px solid ${draft.fontFamily === key ? previewTheme.accent : t.border}`, borderRadius: 8, color: draft.fontFamily === key ? previewTheme.accentBright : t.textMuted, fontFamily: f.family, fontSize: 12, cursor: "pointer", textAlign: "left" }}>
                  {f.label} <span style={{ opacity: 0.65, fontFamily: f.family, fontSize: 10 }}>— Aa Bb Cc 123</span>
                </button>
              ))}
            </div>
            <SectionLabel t={t} fonts={fonts} label={`Font Size — ${draft.fontSize}px`} />
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 20 }}>
              <span style={{ color: t.textMuted, fontFamily: fonts.family, fontSize: 10 }}>8</span>
              <input className="rrp-range" type="range" min={8} max={16} value={draft.fontSize} onChange={e => setDraft(d => ({ ...d, fontSize: Number(e.target.value) }))}
                style={{ width: "100%", background: "transparent", appearance: "none", WebkitAppearance: "none", cursor: "pointer", height: 24, '--range-progress': `${((draft.fontSize - 8) / 8) * 100}%`, '--range-accent': previewTheme.accent, '--range-track': previewTheme.bgInput, '--range-track-border': previewTheme.border, '--range-thumb': previewTheme.bgPanel, '--range-thumb-border': previewTheme.borderAccent, '--range-thumb-glow': previewTheme.accentGlow }} />
              <span style={{ color: t.textMuted, fontFamily: fonts.family, fontSize: 10 }}>16</span>
            </div>
            <SectionLabel t={t} fonts={fonts} label={`Chat Bubble Width — ${draft.chatBubbleMaxWidth || DEFAULT_SETTINGS.chatBubbleMaxWidth}%`} />
            <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 14 }}>
              <span style={{ color: t.textMuted, fontFamily: fonts.family, fontSize: 10 }}>55</span>
              <input className="rrp-range" type="range" min={55} max={100} value={draft.chatBubbleMaxWidth || DEFAULT_SETTINGS.chatBubbleMaxWidth} onChange={e => setDraft(d => ({ ...d, chatBubbleMaxWidth: Number(e.target.value) }))}
                style={{ width: "100%", background: "transparent", appearance: "none", WebkitAppearance: "none", cursor: "pointer", height: 24, '--range-progress': `${(((draft.chatBubbleMaxWidth || DEFAULT_SETTINGS.chatBubbleMaxWidth) - 55) / 45) * 100}%`, '--range-accent': previewTheme.accent, '--range-track': previewTheme.bgInput, '--range-track-border': previewTheme.border, '--range-thumb': previewTheme.bgPanel, '--range-thumb-border': previewTheme.borderAccent, '--range-thumb-glow': previewTheme.accentGlow }} />
              <span style={{ color: t.textMuted, fontFamily: fonts.family, fontSize: 10 }}>100</span>
            </div>
            <label style={{ display: "flex", alignItems: "center", gap: 10, background: t.bgCard, border: `1px solid ${draft.userBubbleAccentTab ? previewTheme.accent : t.border}`, borderRadius: 10, padding: "10px 12px", marginBottom: 20, cursor: "pointer" }}>
              <input type="checkbox" checked={!!draft.userBubbleAccentTab} onChange={e => setDraft(d => ({ ...d, userBubbleAccentTab: e.target.checked }))} />
              <div>
                <div style={{ color: t.text, fontFamily: fonts.family, fontSize: 11.5, fontWeight: 800 }}>User bubble accent tab</div>
                <div style={{ color: t.textDim, fontFamily: fonts.family, fontSize: 10, lineHeight: 1.35 }}>Shows your accent color as a slim tab line on the right side of user messages only.</div>
              </div>
            </label>
            <p style={{ color: t.textMuted, fontFamily: fonts.family, fontSize: 10, lineHeight: 1.5 }}>
              Preview: <span style={{ fontFamily: previewFont.family, fontSize: draft.fontSize, color: previewTheme.text }}>The veil hums at the edge of perception.</span>
            </p>
            <button onClick={() => setTab("memory")} style={{ width: "100%", padding: "11px 12px", background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 10, color: t.text, fontFamily: fonts.family, fontSize: 12, fontWeight: 700, cursor: "pointer", marginTop: 16, textAlign: "left" }}>
              Memory Management
              <span style={{ display: "block", color: t.textMuted, fontSize: 10, fontWeight: 400, marginTop: 4, lineHeight: 1.35 }}>Review, approve, archive, and delete memories by project. Keep memories maintained so stale facts do not affect future chats.</span>
            </button>
          </div>
        )}

        {tab === "api" && (
          <div>
            <SectionLabel t={t} fonts={fonts} label="API Provider" />
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8, marginBottom: 16 }}>
              {API_PROVIDERS.map(provider => {
                const active = activeProvider === provider.key;
                return (
                  <button key={provider.key} onClick={() => setDraft(d => {
                    const nextProvider = provider.key;
                    const nextModels = getProviderModels(d, nextProvider);
                    return normalizeSettings({ ...d, apiProvider: nextProvider, model: nextModels.includes(d.model) ? d.model : nextModels[0] });
                  })}
                    style={{ padding: "10px 12px", background: active ? t.accentGlow : t.bgCard, border: `1px solid ${active ? t.accent : t.border}`, borderRadius: 10, color: active ? t.accentBright : t.textMuted, fontFamily: fonts.family, fontSize: 12, fontWeight: 800, cursor: "pointer" }}>
                    {provider.label}
                  </button>
                );
              })}
            </div>

            <SectionLabel t={t} fonts={fonts} label={`${getProviderLabel(activeProvider)} API Key`} />
            <div style={{ display: "flex", gap: 8, marginBottom: 12 }}>
              <input type={showKey ? "text" : "password"} value={activeProviderKey} onChange={e => setDraft(d => ({ ...d, [getProviderKeyField(activeProvider)]: e.target.value, ...(activeProvider === "openrouter" ? { apiKey: e.target.value } : {}) }))} placeholder={API_PROVIDERS.find(p => p.key === activeProvider)?.keyPlaceholder || "sk-..."} style={{ flex: 1, background: t.bgInput, border: `1px solid ${t.border}`, borderRadius: 8, color: t.text, fontFamily: "monospace", fontSize: 11, padding: "9px 12px", outline: "none" }} />
              <button onClick={() => setShowKey(s => !s)} style={{ background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 8, color: t.textMuted, padding: "0 10px", cursor: "pointer" }}>
                <Icon d={showKey ? ICONS.eyeOff : ICONS.eye} size={14} />
              </button>
            </div>
            <p style={{ color: t.textDim, fontFamily: fonts.family, fontSize: 10, marginBottom: 16, lineHeight: 1.5 }}>Stored locally only. Requests are sent to the selected provider: {getProviderApiBase(activeProvider)}.</p>

            {activeProvider === "openrouter" && (
              <>
                <SectionLabel t={t} fonts={fonts} label="Privacy Routing" />
                <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: 18 }}>
                  {OPENROUTER_PRIVACY_MODES.map(opt => {
                    const active = draft.openRouterPrivacyMode === opt.key;
                    return (
                      <button key={opt.key} onClick={() => setDraft(d => ({ ...d, openRouterPrivacyMode: opt.key }))}
                        style={{ textAlign: "left", padding: "10px 12px", background: active ? t.accentGlow : t.bgCard, border: `1px solid ${active ? t.accent : t.border}`, borderRadius: 10, color: active ? t.accentBright : t.textMuted, fontFamily: fonts.family, cursor: "pointer" }}>
                        <div style={{ fontSize: 11, fontWeight: 800, letterSpacing: "0.03em", textTransform: "uppercase", marginBottom: 4 }}>{opt.label}</div>
                        <div style={{ fontSize: 10, lineHeight: 1.45, color: active ? t.text : t.textDim }}>{opt.sub}</div>
                      </button>
                    );
                  })}
                </div>
                <p style={{ color: t.textDim, fontFamily: fonts.family, fontSize: 10, marginBottom: 20, lineHeight: 1.5 }}>Privacy routing is OpenRouter-only. “Zero data retention” is strict and may make some models unavailable.</p>
              </>
            )}

            <SectionLabel t={t} fonts={fonts} label="Global Fallback Model" />
            <div style={{ background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 10, padding: 12, marginBottom: 18 }}>
              <p style={{ color: t.textDim, fontFamily: fonts.family, fontSize: 10, margin: "0 0 10px", lineHeight: 1.45 }}>Used when a project has no model chosen. New projects copy this model into their own project settings. Tap a model below to set this fallback.</p>
              <div style={{ color: t.text, fontFamily: "monospace", fontSize: 11, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{getProviderLabel(getSettingsDefaultProvider(draft))} · {getSettingsDefaultModel(draft)}</div>
            </div>

            <SectionLabel t={t} fonts={fonts} label={`${getProviderLabel(activeProvider)} Models`} />
            <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
              <input value={newModel} onChange={e => setNewModel(e.target.value)} onKeyDown={e => e.key === "Enter" && addModel()} placeholder={activeProvider === "openai" ? "Add OpenAI model id..." : "Add OpenRouter model id..."} style={{ flex: 1, background: t.bgInput, border: `1px solid ${t.border}`, borderRadius: 8, color: t.text, fontFamily: "monospace", fontSize: 11, padding: "9px 12px", outline: "none" }} />
              <button onClick={addModel} style={{ width: 40, background: t.accentGlow, border: `1px solid ${t.accent}`, borderRadius: 8, color: t.accentBright, fontSize: 16, fontWeight: 700, cursor: "pointer" }}>+</button>
            </div>
            <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
              <input value={modelSearch} onChange={e => setModelSearch(e.target.value)} placeholder="Search saved/fetched models..." style={{ flex: 1, background: t.bgInput, border: `1px solid ${t.border}`, borderRadius: 8, color: t.text, fontFamily: "monospace", fontSize: 11, padding: "9px 12px", outline: "none" }} />
              <button onClick={fetchProviderModels} style={{ padding: "0 12px", background: t.bgCard, border: `1px solid ${t.borderAccent}`, borderRadius: 8, color: t.text, fontFamily: fonts.family, fontSize: 11, fontWeight: 800, cursor: "pointer", whiteSpace: "nowrap" }}>Fetch</button>
            </div>
            {providerFetchStatus && <p style={{ color: providerFetchStatus.type === "error" ? t.dangerText : t.textMuted, fontFamily: fonts.family, fontSize: 10, margin: "0 0 10px", lineHeight: 1.45 }}>{providerFetchStatus.message}</p>}

            {filteredProviderResults.length > 0 && (
              <div style={{ background: t.bgPanel, border: `1px solid ${t.border}`, borderRadius: 10, padding: 8, marginBottom: 14, maxHeight: 220, overflowY: "auto" }}>
                <div style={{ color: t.textMuted, fontFamily: fonts.family, fontSize: 10, fontWeight: 800, letterSpacing: "0.06em", textTransform: "uppercase", marginBottom: 7 }}>Fetched models</div>
                {filteredProviderResults.map(item => (
                  <div key={item.id} style={{ display: "flex", gap: 6, alignItems: "stretch", marginBottom: 6 }}>
                    <div style={{ flex: 1, position: "relative", padding: "8px 10px", paddingRight: formatModelPrice(item.meta) ? 92 : 10, background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 8, color: t.textMuted, fontFamily: "monospace", fontSize: 10, minWidth: 0 }}>
                      <div style={{ color: t.text, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{item.id}</div>
                      {formatModelPrice(item.meta) && <div style={{ position: "absolute", right: 10, bottom: 8, color: t.textDim, fontSize: 9, whiteSpace: "nowrap" }}>{formatModelPrice(item.meta)}</div>}
                    </div>
                    <button onClick={() => addModelWithMeta(item.id, item.meta)} style={{ width: 50, background: t.accentGlow, border: `1px solid ${t.accent}`, borderRadius: 8, color: t.accentBright, fontFamily: fonts.family, fontSize: 11, fontWeight: 800, cursor: "pointer" }}>Add</button>
                  </div>
                ))}
              </div>
            )}

            <div style={{ display: "flex", flexDirection: "column", gap: 6, marginBottom: 20 }}>
              {filteredModelList.map((m, index, arr) => (
                  <div key={m} style={{ display: "flex", gap: 6, alignItems: "stretch" }}>
                    <button onClick={() => setDraft(d => normalizeSettings({ ...d, apiProvider: activeProvider, model: m, defaultApiProvider: activeProvider, defaultModel: m }))} style={{ flex: 1, position: "relative", padding: "8px 12px", paddingRight: getModelPriceLabel(draft, m, activeProvider) ? 96 : 12, background: draft.model === m ? t.accentGlow : t.bgCard, border: `1px solid ${draft.model === m ? t.accent : t.border}`, borderRadius: 8, color: draft.model === m ? t.accentBright : t.textMuted, fontFamily: "monospace", fontSize: 11, cursor: "pointer", textAlign: "left", minWidth: 0 }}>
                      <span style={{ display: "block", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{m}</span>
                      {getModelPriceLabel(draft, m, activeProvider) && <span style={{ position: "absolute", right: 10, bottom: 8, color: t.textDim, fontSize: 9, whiteSpace: "nowrap" }}>{getModelPriceLabel(draft, m, activeProvider)}</span>}
                    </button>
                    <button onClick={() => moveModel(m, -1)} disabled={index === 0} style={{ width: 34, background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 8, color: index === 0 ? t.textDim : t.textMuted, cursor: index === 0 ? "default" : "pointer", fontSize: 13, fontWeight: 700, opacity: index === 0 ? 0.45 : 1 }}>^</button>
                    <button onClick={() => moveModel(m, 1)} disabled={index === arr.length - 1} style={{ width: 34, background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 8, color: index === arr.length - 1 ? t.textDim : t.textMuted, cursor: index === arr.length - 1 ? "default" : "pointer", fontSize: 13, fontWeight: 700, opacity: index === arr.length - 1 ? 0.45 : 1 }}>v</button>
                    <button onClick={() => setConfirm({ message: `Delete model "${m}"?`, action: () => removeModel(m) })} style={{ width: 38, background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 8, color: t.dangerText, cursor: "pointer", fontSize: 16, fontWeight: 700 }}>−</button>
                  </div>
              ))}
            </div>
          </div>
        )}

        {tab === "memory" && (
          <MemoryPanel t={t} fonts={fonts} projects={projects} activeProjectId={activeProjectId} onUpdateProjectMemory={onUpdateProjectMemory} onUpdateProjectMemorySettings={onUpdateProjectMemorySettings} />
        )}

        {tab === "data" && (
          <div>
            <SectionLabel t={t} fonts={fonts} label="Chat Context Export" />
            <div style={{ width: "100%", padding: "12px", boxSizing: "border-box", background: t.bgCard, border: `1px solid ${t.borderAccent}`, borderRadius: 12, marginBottom: 16 }}>
              <div style={{ color: t.text, fontFamily: fonts.family, fontSize: 12, fontWeight: 800, marginBottom: 5 }}>Export a project context pack</div>
              <div style={{ color: t.textDim, fontFamily: fonts.family, fontSize: 10.5, lineHeight: 1.45, marginBottom: 9 }}>Creates a readable Markdown pack for one selected project. Use it when you want to paste or upload world info, prompt, memories, characters, lore, files, inventory, and recent chat turns into another chat app.</div>
              <div style={{ color: t.dangerText, fontFamily: fonts.family, fontSize: 10.5, lineHeight: 1.45, fontWeight: 800, marginBottom: 10 }}>This is not a full backup and cannot restore your app data. For real backup/recovery, use the Backup All Data button in the Full Backup section below.</div>
              <select value={contextExportProjectId} onChange={e => { setContextExportProjectId(e.target.value); setContextExportStatus(null); }} style={{ width: "100%", boxSizing: "border-box", background: t.bgInput, border: `1px solid ${t.border}`, borderRadius: 8, color: t.text, fontFamily: fonts.family, fontSize: 11, padding: "9px 10px", outline: "none", marginBottom: 8 }}>
                {projects.length === 0 ? <option value="">No projects available</option> : projects.map(project => <option key={project.id} value={project.id}>{project.name || "Untitled Project"}</option>)}
              </select>
              <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                <button type="button" onClick={copyChatContextExport} disabled={!contextExportProjectId} style={{ padding: "10px 12px", background: t.bgPanel, border: `1px solid ${t.borderAccent}`, borderRadius: 10, color: contextExportProjectId ? t.accentBright : t.textDim, fontFamily: fonts.family, fontSize: 11, fontWeight: 700, cursor: contextExportProjectId ? "pointer" : "default", textAlign: "center", opacity: contextExportProjectId ? 1 : 0.55 }}>Copy Context</button>
                <button type="button" onClick={downloadChatContextExport} disabled={!contextExportProjectId} style={{ padding: "10px 12px", background: t.accentGlow, border: `1px solid ${t.accent}`, borderRadius: 10, color: contextExportProjectId ? t.accentBright : t.textDim, fontFamily: fonts.family, fontSize: 11, fontWeight: 700, cursor: contextExportProjectId ? "pointer" : "default", textAlign: "center", opacity: contextExportProjectId ? 1 : 0.55 }}>Download Markdown</button>
              </div>
              {contextExportStatus ? <div style={{ color: contextExportStatus.type === "error" ? t.dangerText : t.successText, fontFamily: fonts.family, fontSize: 10, lineHeight: 1.4, marginTop: 8 }}>{contextExportStatus.message}</div> : null}
            </div>

            <div style={{ height: 1, background: t.borderAccent, opacity: 0.75, margin: "2px 0 16px" }} />

            <SectionLabel t={t} fonts={fonts} label="Full Backup" />
            <p style={{ color: t.textMuted, fontFamily: fonts.family, fontSize: 11, marginBottom: 12, lineHeight: 1.5 }}>All data is stored in IndexedDB on this device. Use this section for real backup, restore, and recovery.</p>
            <button onClick={backupAllData} style={{ width: "100%", padding: "11px 12px", background: t.accentGlow, border: `1px solid ${t.accent}`, borderRadius: 10, color: t.accentBright, fontFamily: fonts.family, fontSize: 12, fontWeight: 700, cursor: "pointer", marginBottom: 8, textAlign: "left" }}>
              Backup All Data
              <span style={{ display: "block", color: t.textMuted, fontSize: 10, fontWeight: 400, marginTop: 4, lineHeight: 1.35 }}>Exports projects, chats, messages, settings, active selection, characters, memories, files, and compaction chunks into one JSON file.</span>
            </button>
            {backupStatus ? (
              <div style={{ width: "100%", boxSizing: "border-box", padding: "9px 10px", background: t.bgCard, border: `1px solid ${t.borderAccent}`, borderRadius: 10, color: backupStatus.type === "error" ? t.dangerText : t.successText, fontFamily: fonts.family, fontSize: 10, lineHeight: 1.45, marginBottom: 10 }}>
                {backupStatus.message}
              </div>
            ) : null}
            <div style={{ width: "100%", padding: "11px 12px", boxSizing: "border-box", background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 10, marginBottom: 10 }}>
              <div style={{ color: t.text, fontFamily: fonts.family, fontSize: 12, fontWeight: 700, marginBottom: 7 }}>Import / Restore Full Backup</div>
              <select value={restoreMode} onChange={e => setRestoreMode(e.target.value)} style={{ width: "100%", boxSizing: "border-box", background: t.bgInput, border: `1px solid ${t.border}`, borderRadius: 8, color: t.text, fontFamily: fonts.family, fontSize: 11, padding: "9px 10px", outline: "none", marginBottom: 8 }}>
                <option value="add">Add as New Copy — safest</option>
                <option value="merge">Merge — update matching IDs, add missing</option>
                <option value="replace">Replace All — disaster recovery</option>
              </select>
              <button type="button" onClick={triggerRestorePicker} style={{ width: "100%", padding: "10px 12px", background: restoreMode === "replace" ? t.bgPanel : t.accentGlow, border: `1px solid ${restoreMode === "replace" ? t.dangerText : t.accent}`, borderRadius: 10, color: restoreMode === "replace" ? t.dangerText : t.accentBright, fontFamily: fonts.family, fontSize: 12, fontWeight: 700, cursor: "pointer", textAlign: "left" }}>
                Import Backup JSON
                <span style={{ display: "block", color: t.textMuted, fontSize: 10, fontWeight: 400, marginTop: 4, lineHeight: 1.35 }}>
                  {restoreMode === "add" ? "Keeps current data and imports backup projects/chats with new IDs and imported names." : restoreMode === "merge" ? "Keeps current settings, updates matching project/chat/message IDs, and adds missing ones." : "Replaces projects, chats, messages, settings, and active selection with the backup."}
                </span>
              </button>
              <input ref={restoreInputRef} type="file" accept="application/json,.json" onChange={handleRestoreBackupChange} style={{ display: "none" }} />
              {restoreStatus ? <div style={{ color: restoreStatus.type === "error" ? t.dangerText : t.textMuted, fontFamily: fonts.family, fontSize: 10, lineHeight: 1.4, marginTop: 8 }}>{restoreStatus.message}</div> : null}
            </div>
            <DangerButton t={t} fonts={fonts} label="Clear All Chats" sub="Removes chat history. Projects and settings kept." onClick={() => setConfirm({ message: "Clear all chat history? This cannot be undone.", action: clearChats })} />
            <DangerButton t={t} fonts={fonts} label="Clear All Data" sub="Resets everything including projects and settings." onClick={() => setConfirm({ message: "Clear ALL app data? This permanently resets the app.", action: clearAll })} />
          </div>
        )}
      </div>
      <div style={{ padding: "12px 16px", borderTop: `1px solid ${t.border}`, background: t.headerBg }}>
        <button onClick={() => { onSave(draft); onBack(); }} style={{ width: "100%", padding: "11px", background: t.accentGlow, border: `1px solid ${t.accent}`, borderRadius: 10, color: t.accentBright, fontFamily: fonts.family, fontSize: 12, fontWeight: 600, cursor: "pointer", letterSpacing: "0.03em" }}>Save & Close</button>
      </div>
    </div>
  );
}

// ─── PROJECT ICON PICKER ──────────────────────────────────────────────────────
function ProjectIconPickerModal({ t, fonts, iconKey, iconColor, onSelectIcon, onSelectColor, onClose }) {
  const selectedIcon = getProjectIconDef(iconKey);
  const selectedColor = normalizeHexColor(iconColor) || PROJECT_ICON_SWATCHES[0];
  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 9200, display: "flex", alignItems: "center", background: "rgba(0,0,0,0.6)", backdropFilter: "blur(4px)" }}>
      <div style={{ width: "100%", maxHeight: "78vh", background: t.bgPanel, borderTop: `1px solid ${t.borderAccent}`, borderRadius: "16px 16px 0 0", overflow: "hidden", display: "flex", flexDirection: "column" }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "14px 16px 10px", borderBottom: `1px solid ${t.border}` }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <ProjectGlyph iconKey={selectedIcon.key} color={selectedColor} size={24} fallbackColor={t.accent} title={selectedIcon.label} />
            <div>
              <div style={{ color: t.text, fontFamily: fonts.family, fontSize: 13, fontWeight: 600 }}>Project Icon</div>
              <div style={{ color: t.textDim, fontFamily: "monospace", fontSize: 10 }}>{selectedIcon.label} · {normalizeHexColor(iconColor) || "theme default"}</div>
            </div>
          </div>
          <button onClick={onClose} style={{ background: "none", border: "none", cursor: "pointer", color: t.textMuted, padding: 4 }}><Icon d={ICONS.close} size={16} /></button>
        </div>
        <div style={{ overflowY: "auto", padding: 14, flex: 1 }}>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(5, minmax(0, 1fr))", gap: 6, marginBottom: 14 }}>
            {PROJECT_ICON_OPTIONS.map(icon => {
              const selected = icon.key === selectedIcon.key;
              return (
                <button key={icon.key} onClick={() => onSelectIcon(icon.key)} title={icon.label} aria-label={icon.label}
                  style={{ background: selected ? t.accentGlow : "transparent", border: "none", borderRadius: 10, padding: "10px 6px", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", boxShadow: selected ? `inset 0 0 0 1px ${t.accent}` : "none" }}>
                  <ProjectGlyph iconKey={icon.key} color={selectedColor} size={22} fallbackColor={selected ? t.accent : t.textMuted} title={icon.label} />
                </button>
              );
            })}
          </div>
          <SectionLabel t={t} fonts={fonts} label="Preset Colors" />
          <div style={{ display: "flex", flexWrap: "wrap", gap: 8, marginBottom: 2, justifyContent: "center" }}>
            {PROJECT_ICON_SWATCHES.map(swatch => {
              const selected = swatch === selectedColor;
              return (
                <button key={swatch} onClick={() => onSelectColor(swatch)} title={swatch}
                  style={{ width: 28, height: 28, borderRadius: 999, background: swatch, border: `2px solid ${selected ? t.accentBright : t.border}`, boxShadow: selected ? `0 0 0 2px ${t.accentGlow}` : "none", cursor: "pointer" }} />
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── PROJECT SCREEN ───────────────────────────────────────────────────────────
function Field({ t, fonts, label, value, onChange, multiline }) {
  return (
    <div style={{ marginBottom: 16 }}>
      <label style={{ color: t.textMuted, fontFamily: fonts.family, fontSize: 10, letterSpacing: "0.08em", textTransform: "uppercase", display: "block", marginBottom: 6, textAlign: "left" }}>{label}</label>
      {multiline
        ? <textarea value={value} onChange={e => onChange(e.target.value)} rows={5} style={{ width: "100%", background: t.bgInput, border: `1px solid ${t.border}`, borderRadius: 8, color: t.text, fontFamily: fonts.family, fontSize: 11, padding: "9px 12px", outline: "none", resize: "vertical", lineHeight: 1.5, boxSizing: "border-box" }} />
        : <input value={value} onChange={e => onChange(e.target.value)} style={{ width: "100%", background: t.bgInput, border: `1px solid ${t.border}`, borderRadius: 8, color: t.text, fontFamily: fonts.family, fontSize: 11, padding: "9px 12px", outline: "none", boxSizing: "border-box" }} />
      }
    </div>
  );
}

function ProjectScreen({ t, fonts, projects, setProjects, activeProjectId, setActiveProjectId, settings, onEnter, onBack }) {
  const [editingId, setEditingId] = useState(null);
  const [draftProject, setDraftProject] = useState(null);
  const [confirm, setConfirm] = useState(null);
  const [showIconPicker, setShowIconPicker] = useState(false);
  const fileInputRef = useRef(null);

  const openEditor = (project) => { setEditingId(project.id); setDraftProject(normalizeProject(JSON.parse(JSON.stringify(project)))); setShowIconPicker(false); };
  const newProject = () => {
    const provider = getSettingsDefaultProvider(settings);
    const p = normalizeProject({
      id: `proj_${Date.now()}`,
      name: "New Project",
      lore: "",
      systemPrompt: "",
      apiProvider: provider,
      model: getSettingsDefaultModel(settings, provider),
      createdAt: Date.now(),
    });
    setEditingId(p.id); setDraftProject(p); setShowIconPicker(false);
  };

  const saveDraftProject = () => {
    if (!draftProject) return;
    const existingProject = projects.find(p => p.id === draftProject.id);
    const exists = !!existingProject;
    const nextProject = exists
      ? normalizeProject({
          ...existingProject,
          ...draftProject,
          memory: existingProject.memory,
          projectCompaction: existingProject.projectCompaction,
          characters: existingProject.characters,
          loreFiles: existingProject.loreFiles,
          files: existingProject.files,
          inventory: existingProject.inventory,
          memorySettings: normalizeMemorySettings(draftProject.memorySettings || existingProject.memorySettings),
        })
      : normalizeProject(draftProject);
    const next = exists ? projects.map(p => p.id === nextProject.id ? nextProject : p) : [...projects, nextProject];
    setProjects(next); storage.set(STORAGE_KEYS.PROJECTS, next);
    if (!activeProjectId) setActiveProjectId(nextProject.id);
    setEditingId(null); setDraftProject(null); setShowIconPicker(false);
  };

  const deleteProject = (id) => {
    const next = projects.filter(p => p.id !== id);
    setProjects(next); storage.set(STORAGE_KEYS.PROJECTS, next);
    if (activeProjectId === id) setActiveProjectId(next[0]?.id || null);
    setConfirm(null);
  };

  const updateDraft = (field, value) => setDraftProject(prev => ({ ...prev, [field]: value }));
  const updateDraftProjectProvider = (provider) => setDraftProject(prev => {
    const safeProvider = normalizeApiProvider(provider);
    const models = getProviderModels(settings, safeProvider);
    const currentModel = models.includes(prev?.model) ? prev.model : getSettingsDefaultModel(settings, safeProvider);
    return normalizeProject({ ...prev, apiProvider: safeProvider, model: currentModel });
  });
  const updateDraftProjectModel = (model) => setDraftProject(prev => normalizeProject({ ...prev, model }));
  const updateDraftInventory = (inventory) => setDraftProject(prev => ({ ...prev, inventory }));
  const updateDraftIcon = (field, value) => setDraftProject(prev => ({ ...prev, [field]: field === "iconColor" ? normalizeHexColor(value) || "" : value }));

  const addCharacter = () => setDraftProject(prev => ({ ...prev, characters: [...(prev.characters || []), createEmptyCharacter()] }));
  const updateCharacter = (id, field, value) => setDraftProject(prev => ({ ...prev, characters: (prev.characters || []).map(c => c.id === id ? { ...c, [field]: value } : c) }));
  const deleteCharacter = (id) => setDraftProject(prev => ({ ...prev, characters: (prev.characters || []).filter(c => c.id !== id) }));

  const handleFiles = async (event) => {
    const selected = Array.from(event.target.files || []);
    if (!selected.length) return;
    const existing = draftProject?.files || [];
    const remaining = Math.max(0, 20 - existing.length);
    const loaded = await Promise.all(selected.slice(0, remaining).map(async (file) => ({
      id: makeId("file"), name: file.name, type: file.type || "text/plain",
      size: file.size, text: await file.text(), active: true, uploadedAt: Date.now(),
    })));
    setDraftProject(prev => ({ ...prev, files: [...(prev.files || []), ...loaded] }));
    event.target.value = "";
  };

  const toggleFile = (id, active) => setDraftProject(prev => ({ ...prev, files: (prev.files || []).map(f => f.id === id ? { ...f, active } : f) }));
  const deleteFile = (id) => setDraftProject(prev => ({ ...prev, files: (prev.files || []).filter(f => f.id !== id) }));

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 7000, background: t.bg, display: "flex", flexDirection: "column" }}>
      {confirm && <ConfirmModal t={t} message={confirm.message} onConfirm={confirm.action} onCancel={() => setConfirm(null)} danger />}
      {showIconPicker && draftProject && (
        <ProjectIconPickerModal t={t} fonts={fonts} iconKey={draftProject.iconKey} iconColor={draftProject.iconColor}
          onSelectIcon={(key) => updateDraftIcon("iconKey", key)} onSelectColor={(color) => updateDraftIcon("iconColor", color)}
          onClose={() => setShowIconPicker(false)} />
      )}
      <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "14px 16px", borderBottom: `1px solid ${t.border}`, background: t.headerBg }}>
        <button onClick={onBack} style={{ background: "none", border: "none", cursor: "pointer", color: t.textMuted }}><Icon d={ICONS.back} size={18} /></button>
        <span style={{ color: t.text, fontFamily: fonts.family, fontSize: 13, fontWeight: 600 }}>{editingId ? "Edit Project" : "Projects"}</span>
        {!editingId && <button onClick={newProject} style={{ marginLeft: "auto", background: t.accentGlow, border: `1px solid ${t.borderAccent}`, borderRadius: 8, color: t.accent, padding: "6px 12px", fontFamily: fonts.family, fontSize: 11, cursor: "pointer" }}>+ New</button>}
        {editingId && (
          <div style={{ marginLeft: "auto", display: "flex", gap: 8 }}>
            <button onClick={() => { setEditingId(null); setDraftProject(null); setShowIconPicker(false); }} style={{ background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 8, color: t.textMuted, padding: "6px 12px", fontFamily: fonts.family, fontSize: 11, cursor: "pointer" }}>Cancel</button>
            <button onClick={saveDraftProject} style={{ background: t.accentGlow, border: `1px solid ${t.accent}`, borderRadius: 8, color: t.accentBright, padding: "6px 12px", fontFamily: fonts.family, fontSize: 11, cursor: "pointer", fontWeight: 600 }}>Save</button>
          </div>
        )}
      </div>

      <div style={{ flex: 1, overflowY: "auto", padding: 16 }}>
        {!editingId && projects.map(p => {
          const isActiveProject = activeProjectId === p.id;
          return (
            <div key={p.id} onClick={() => { setActiveProjectId(p.id); onEnter(p.id); }}
              style={{ background: isActiveProject ? t.success : t.bgCard, border: `1px solid ${isActiveProject ? t.successText : t.border}`, borderRadius: 10, padding: "12px 14px", marginBottom: 10, cursor: "pointer" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                <span style={{ width: 14, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}>{isActiveProject ? <Icon d={ICONS.check} size={13} stroke={t.successText} /> : null}</span>
                <ProjectGlyph iconKey={p.iconKey} color={p.iconColor} size={16} fallbackColor={isActiveProject ? t.successText : t.textMuted} title={p.name} />
                <span style={{ flex: 1, color: isActiveProject ? t.successText : t.text, fontFamily: fonts.family, fontSize: 12, fontWeight: 600 }}>{p.name}</span>
                <button onClick={e => { e.stopPropagation(); openEditor(p); }} style={{ background: "none", border: "none", cursor: "pointer", color: isActiveProject ? t.successText : t.textMuted, padding: 4 }}><Icon d={ICONS.edit} size={13} /></button>
                <button onClick={e => { e.stopPropagation(); setConfirm({ message: `Delete "${p.name}"? All chats in this project will be removed.`, action: () => deleteProject(p.id) }); }} style={{ background: "none", border: "none", cursor: "pointer", color: isActiveProject ? t.successText : t.textDim, padding: 4 }}><Icon d={ICONS.trash} size={13} /></button>
              </div>
              <p style={{ color: isActiveProject ? t.successText : t.textMuted, opacity: isActiveProject ? 0.88 : 1, fontFamily: fonts.family, fontSize: 10, marginTop: 6, lineHeight: 1.4, display: "-webkit-box", WebkitLineClamp: 2, WebkitBoxOrient: "vertical", overflow: "hidden" }}>{p.lore || "No lore set."}</p>
            </div>
          );
        })}

        {editingId && draftProject && (
          <div>
            <div style={{ marginBottom: 16 }}>
              <label style={{ color: t.textMuted, fontFamily: fonts.family, fontSize: 10, letterSpacing: "0.08em", textTransform: "uppercase", display: "block", marginBottom: 6, textAlign: "left" }}>Project Name</label>
              <div style={{ display: "flex", gap: 10, alignItems: "stretch" }}>
                <button onClick={() => setShowIconPicker(true)} aria-label="Choose project icon"
                  style={{ width: 48, minWidth: 48, background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 10, color: t.textMuted, display: "flex", alignItems: "center", justifyContent: "center", cursor: "pointer" }}>
                  <ProjectGlyph iconKey={draftProject.iconKey} color={draftProject.iconColor} size={22} fallbackColor={t.accent} title={draftProject.name || "Project icon"} />
                </button>
                <input value={draftProject.name} onChange={e => updateDraft("name", e.target.value)}
                  style={{ flex: 1, background: t.bgInput, border: `1px solid ${t.border}`, borderRadius: 8, color: t.text, fontFamily: fonts.family, fontSize: 11, padding: "9px 12px", outline: "none", boxSizing: "border-box" }} />
              </div>
            </div>
            <Field t={t} fonts={fonts} label="Lore / World Info" value={draftProject.lore} onChange={v => updateDraft("lore", v)} multiline />
            <Field t={t} fonts={fonts} label="System Prompt" value={draftProject.systemPrompt} onChange={v => updateDraft("systemPrompt", v)} multiline />

            <div style={{ marginBottom: 18 }}>
              <SectionLabel t={t} fonts={fonts} label="Project Context" />
              <label style={{ display: "flex", alignItems: "center", gap: 10, background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 10, padding: "10px 12px", cursor: "pointer" }}>
                <input type="checkbox" checked={!!draftProject.projectGlobalContextWindow} onChange={e => updateDraft("projectGlobalContextWindow", e.target.checked)} />
                <div style={{ minWidth: 0 }}>
                  <div style={{ color: t.text, fontFamily: fonts.family, fontSize: 11, fontWeight: 800 }}>Project-global context window</div>
                  <div style={{ color: t.textDim, fontFamily: fonts.family, fontSize: 10, lineHeight: 1.35 }}>Off by default. When enabled, compaction chunks are stored on the project and shared by every chat in this project. Recent live messages still come from the current chat.</div>
                </div>
              </label>
            </div>

            <div style={{ marginBottom: 18 }}>
              <SectionLabel t={t} fonts={fonts} label="Project Default Model" />
              <div style={{ background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 10, padding: 12, display: "flex", flexDirection: "column", gap: 10 }}>
                <p style={{ color: t.textDim, fontFamily: fonts.family, fontSize: 10, margin: 0, lineHeight: 1.45 }}>This model is used for chats in this project only. New projects start with your API fallback model.</p>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
                  {API_PROVIDERS.map(provider => {
                    const active = getEffectiveProjectProvider(draftProject, settings) === provider.key;
                    return (
                      <button key={provider.key} onClick={() => updateDraftProjectProvider(provider.key)}
                        style={{ padding: "9px 10px", background: active ? t.accentGlow : t.bgInput, border: `1px solid ${active ? t.accent : t.border}`, borderRadius: 8, color: active ? t.accentBright : t.textMuted, fontFamily: fonts.family, fontSize: 11, fontWeight: 800, cursor: "pointer" }}>
                        {provider.label}
                      </button>
                    );
                  })}
                </div>
                <select value={getEffectiveProjectModel(draftProject, settings)} onChange={e => updateDraftProjectModel(e.target.value)}
                  style={{ width: "100%", background: t.bgInput, border: `1px solid ${t.border}`, borderRadius: 8, color: t.text, fontFamily: "monospace", fontSize: 11, padding: "9px 10px", outline: "none" }}>
                  {getProviderModels(settings, getEffectiveProjectProvider(draftProject, settings)).map(model => <option key={model} value={model}>{formatModelOptionLabel(settings, model, getEffectiveProjectProvider(draftProject, settings))}</option>)}
                </select>
              </div>
            </div>

            <div style={{ marginBottom: 18 }}>
              <SectionLabel t={t} fonts={fonts} label="Project Memory Type" />
              <div style={{ background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 10, padding: 12 }}>
                <div style={{ display: "grid", gridTemplateColumns: "repeat(2, minmax(0, 1fr))", gap: 8 }}>
                  {MEMORY_TYPES.map(opt => {
                    const current = getProjectMemorySettings(draftProject).type;
                    const active = current === opt.key;
                    return (
                      <button key={opt.key} onClick={() => {
                          const currentSettings = getProjectMemorySettings(draftProject);
                          updateDraft("memorySettings", normalizeMemorySettings({ ...currentSettings, type: opt.key, allowInventoryUpdates: opt.key === "fiction" ? currentSettings.allowInventoryUpdates !== false : false }));
                        }}
                        style={{ textAlign: "left", padding: "9px 10px", background: active ? t.accentGlow : t.bgInput, border: `1px solid ${active ? t.accent : t.border}`, borderRadius: 8, color: active ? t.accentBright : t.textMuted, fontFamily: fonts.family, fontSize: 10, cursor: "pointer" }}>
                        <strong style={{ display: "block", fontSize: 11, color: active ? t.accentBright : t.text }}>{opt.label}</strong>
                        <span style={{ display: "block", marginTop: 4, lineHeight: 1.3 }}>{opt.sub}</span>
                      </button>
                    );
                  })}
                </div>
              </div>
            </div>

            <div style={{ marginBottom: 18 }}>
              <SectionLabel t={t} fonts={fonts} label="Inventory" />
              <div style={{ background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 10, padding: 12 }}>
                <div style={{ display: "flex", gap: 8, marginBottom: 10 }}>
                  <input value={String(draftProject.inventory?.credits ?? 0)} onChange={e => updateDraftInventory({ ...(draftProject.inventory || { items: [] }), credits: parseInt(e.target.value || "0", 10) || 0 })} placeholder="Credits"
                    style={{ width: 140, background: t.bgInput, border: `1px solid ${t.border}`, borderRadius: 8, color: t.text, fontFamily: fonts.family, fontSize: 12, padding: "8px 10px", outline: "none" }} />
                  <span style={{ color: t.textMuted, fontFamily: fonts.family, fontSize: 11, alignSelf: "center" }}>Edit items from the main chat inventory modal.</span>
                </div>
                <label style={{ display: "flex", alignItems: "center", gap: 10, background: t.bgInput, border: `1px solid ${t.border}`, borderRadius: 8, padding: "9px 10px", cursor: getProjectMemorySettings(draftProject).type === "fiction" ? "pointer" : "default", opacity: getProjectMemorySettings(draftProject).type === "fiction" ? 1 : 0.55 }}>
                  <input type="checkbox" disabled={getProjectMemorySettings(draftProject).type !== "fiction"} checked={!!getProjectMemorySettings(draftProject).allowInventoryUpdates && getProjectMemorySettings(draftProject).type === "fiction"} onChange={e => updateDraft("memorySettings", normalizeMemorySettings({ ...getProjectMemorySettings(draftProject), allowInventoryUpdates: e.target.checked }))} />

// ─── CHAT UTILITIES ───────────────────────────────────────────────────────────
const formatMessageTime = (ts) => new Date(ts).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
const formatMessageDate = (ts) => new Date(ts).toLocaleDateString("en-GB");
const estimateTokens = (text = "") => Math.max(1, Math.ceil(String(text || "").trim().length / 4));

async function copyMessageText(text) {
  const value = String(text || "");
  try { if (navigator?.clipboard?.writeText) { await navigator.clipboard.writeText(value); return true; } } catch {}
  try {
    const fallback = document.createElement("textarea");
    fallback.value = value; fallback.setAttribute("readonly", ""); fallback.style.position = "fixed"; fallback.style.opacity = "0";
    document.body.appendChild(fallback); fallback.select(); document.execCommand("copy"); document.body.removeChild(fallback); return true;
  } catch { return false; }
}

const stripOocBlocks = (content = "") =>
  String(content || "").replace(/\(\([\s\S]*?\)\)/g, "").trim();

const escapeHtml = (value = "") => String(value || "")
  .replace(/&/g, "&amp;")
  .replace(/</g, "&lt;")
  .replace(/>/g, "&gt;")
  .replace(/\"/g, "&quot;")
  .replace(/'/g, "&#39;");

const renderInlineMarkdown = (text = "") => {
  let html = escapeHtml(text);
  html = html.replace(/`([^`]+)`/g, '<code class="chat-md-code">$1</code>');
  html = html.replace(/\*\*([\s\S]+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/__([\s\S]+?)__/g, '<strong>$1</strong>');
  html = html.replace(/(^|[^*])\*([^*\n]+?)\*/g, '$1<em>$2</em>');
  html = html.replace(/(^|[^_])_([^_\n]+?)_/g, '$1<em>$2</em>');
  return html;
};

const renderChatMarkdownHtml = (content = "") => {
  const tokenStore = [];
  const stash = (html) => {
    const key = '§CHAT' + tokenStore.length + '§';
    tokenStore.push([key, html]);
    return key;
  };
  let text = String(content || "")
    .replace(/```([\s\S]*?)```/g, (_, code) => stash('<pre class="chat-md-pre"><code>' + escapeHtml(code.trim()) + '</code></pre>'))
    .replace(/\{\{([\s\S]*?)\}\}/g, (_, inner) => stash('<span class="chat-terminal-text">' + escapeHtml(inner.trim()) + '</span>'))
    .replace(/\(\(([\s\S]*?)\)\)/g, (_, inner) => stash('<span class="chat-ooc-text">' + renderInlineMarkdown(inner.trim()) + '</span>'));

  const lines = text.split(/\r?\n/);
  let inList = false;
  const out = [];
  const closeList = () => { if (inList) { out.push("</ul>"); inList = false; } };

  lines.forEach((line) => {
    const trimmed = line.trim();
    if (!trimmed) { closeList(); out.push('<div class="chat-md-spacer"></div>'); return; }
    const heading = trimmed.match(/^(#{1,3})\s+(.+)$/);
    if (heading) { closeList(); out.push('<div class="chat-md-heading chat-md-h' + heading[1].length + '">' + renderInlineMarkdown(heading[2]) + '</div>'); return; }
    const bullet = trimmed.match(/^[-*]\s+(.+)$/);
    if (bullet) {
      if (!inList) { out.push('<ul class="chat-md-list">'); inList = true; }
      out.push('<li>' + renderInlineMarkdown(bullet[1]) + '</li>');
      return;
    }
    closeList();
    out.push('<div>' + renderInlineMarkdown(line) + '</div>');
  });
  closeList();

  let html = out.join("");
  tokenStore.forEach(([key, value]) => { html = html.split(key).join(value); });
  return html;
};

// ─── CHAT BUBBLE ─────────────────────────────────────────────────────────────
function ChatBubble({ t, fonts, msg, isMenuOpen, onToggleMenu, onCopy, onEdit, onRegenerate, onOpenImage, bubbleMaxWidth = 97, userAccentTab = false }) {
  const isUser = msg.role === "user";
  const isSystem = msg.role === "system";
  const isTool = msg.role === "tool";
  const tokenValue = Number.isFinite(msg.tokenCount) ? `${msg.tokenCount}t` : null;
  const generatedImages = normalizeImageAttachments(msg.images);
  const attachedImages = normalizeImageAttachments(msg.attachments);
  const rawContent = String(msg.content || "").trim();
  const displayContent = generatedImages.length && /^generated image$/i.test(rawContent) ? "" : rawContent;

  if (isSystem) return null;
  if (msg.role === "assistant" && !displayContent && !generatedImages.length && Array.isArray(msg.tool_calls) && msg.tool_calls.length) return null;

  if (isTool) return (
    <div style={{ display: "flex", justifyContent: "center", marginBottom: 8 }}>

        <span style={{ color: t.tagText, fontFamily: fonts.family, fontSize: 10 }}>Tool: {msg.tool_name || "function"} → {typeof msg.content === "string" ? msg.content.slice(0, 60) : "..."}</span>

    width: 24, height: 24, borderRadius: 999, border: `1px solid ${enabled ? t.borderAccent : t.border}`,
    background: enabled ? t.bgInput : t.bgCard, color: enabled ? t.text : t.textDim,
    opacity: enabled ? 1 : 0.42, cursor: enabled ? "pointer" : "default",
    display: "flex", alignItems: "center", justifyContent: "center", padding: 0, flexShrink: 0,
  });

  return (
    <div style={{ display: "flex", justifyContent: isUser ? "flex-end" : "flex-start", marginBottom: 12, padding: "0 4px" }}>
      <div style={{ maxWidth: `${safeBubbleMaxWidth}%`, width: "fit-content" }}>
        <div onClick={e => { e.stopPropagation(); onToggleMenu?.(); }}
          style={{ maxWidth: "100%", background: isUser ? t.userBubble : t.aiBubble, border: `1px solid ${t.border}`, borderRadius: isUser ? "14px 14px 4px 14px" : "14px 14px 14px 4px", padding: isUser && userAccentTab ? "6px 12px 6px 9px" : "6px 9px", cursor: "pointer", boxShadow: isUser && userAccentTab ? `inset -3px 0 0 ${t.accent}` : "none" }}>

                  <img src={img.dataUrl} alt={img.name || "attached image"} style={{ width: "100%", maxHeight: 160, objectFit: "cover", borderRadius: 9, border: `1px solid ${t.border}`, display: "block" }} />
                </button>
              ))}
            </div>
          )}
          {!!generatedImages.length && (
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(180px,260px))", gap: 10, marginBottom: displayContent ? 8 : 0 }}>
              {generatedImages.map((img, idx) => (
                <button key={img.id || idx} type="button" onClick={(e) => { e.stopPropagation(); onOpenImage?.(img); }} style={{ border: "none", background: "transparent", padding: 0, margin: 0, cursor: "zoom-in", textAlign: "left" }}>
                  <img src={img.dataUrl} alt={img.name || "generated image"} style={{ width: "100%", maxHeight: 360, objectFit: "contain", borderRadius: 10, border: `1px solid ${t.border}`, background: t.bgInput, display: "block" }} />

function CompactionChunksScreen({ t, fonts, chat, onBack, onSave }) {
  const initialCompaction = { ...DEFAULT_CHAT_COMPACTION, ...(chat?.compaction || {}) };
  const initialChunks = Array.isArray(initialCompaction.chunks) ? initialCompaction.chunks : [];
  const [draftChunks, setDraftChunks] = useState(() => initialChunks.map(chunk => ({ ...chunk, text: String(chunk?.text || "") })));
  const [legacySummary, setLegacySummary] = useState(() => String(initialCompaction.summary || ""));

  useEffect(() => {
    const next = { ...DEFAULT_CHAT_COMPACTION, ...(chat?.compaction || {}) };
    setDraftChunks((Array.isArray(next.chunks) ? next.chunks : []).map(chunk => ({ ...chunk, text: String(chunk?.text || "") })));
    setLegacySummary(String(next.summary || ""));
  }, [chat?.id, chat?.compaction?.updatedAt, chat?.compaction?.compactedThroughTs]);

  const formatTs = (ts) => {
    if (!ts) return "—";
    try { return new Date(ts).toLocaleString(); } catch { return "—"; }
  };
  const estimateChunkTokens = (text) => estimateTokens(String(text || ""));
  const totalTokens = draftChunks.reduce((sum, chunk) => sum + estimateChunkTokens(chunk.text), 0) + estimateChunkTokens(legacySummary);
  const updateChunkText = (id, value) => setDraftChunks(prev => prev.map(chunk => chunk.id === id ? { ...chunk, text: value, editedAt: Date.now() } : chunk));
  const saveAndBack = () => {
    const compactedThroughTs = draftChunks.reduce((latest, chunk) => Math.max(latest, Number(chunk.toTs) || 0), Number(initialCompaction.compactedThroughTs) || 0) || null;
    onSave?.({ ...DEFAULT_CHAT_COMPACTION, ...initialCompaction, summary: legacySummary, chunks: draftChunks, compactedThroughTs, updatedAt: Date.now() });
    onBack?.();
  };
  const cardStyle = { background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 12, padding: 10, display: "flex", flexDirection: "column", gap: 8 };
  const tinyLabelStyle = { color: t.textDim, fontFamily: fonts.family, fontSize: 9.5, letterSpacing: "0.08em", textTransform: "uppercase" };
  const metaStyle = { color: t.textDim, fontFamily: fonts.family, fontSize: 10, lineHeight: 1.45 };
  const textAreaStyle = { width: "100%", minHeight: 150, resize: "vertical", boxSizing: "border-box", background: t.bgInput, border: `1px solid ${t.border}`, borderRadius: 10, color: t.text, fontFamily: fonts.family, fontSize: 12, lineHeight: 1.55, padding: 10, outline: "none" };

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 9300, background: t.bg, display: "flex", flexDirection: "column" }}>
      <div style={{ display: "flex", alignItems: "center", gap: 12, padding: "14px 16px", borderBottom: `1px solid ${t.border}`, background: t.headerBg }}>
        <button type="button" onClick={saveAndBack} style={{ background: "none", border: "none", cursor: "pointer", color: t.textMuted, padding: 4 }}><Icon d={ICONS.back} size={18} /></button>
        <div style={{ minWidth: 0, flex: 1 }}>
          <div style={{ color: t.text, fontFamily: fonts.family, fontSize: 13, fontWeight: 700 }}>Compaction Chunks</div>
          <div style={{ color: t.textDim, fontFamily: fonts.family, fontSize: 10, marginTop: 2 }}>Current stored chunks for this chat only.</div>
        </div>
        <button type="button" onClick={saveAndBack} style={{ padding: "8px 12px", background: t.accent, border: `1px solid ${t.accent}`, borderRadius: 10, color: t.headerBg, fontFamily: fonts.family, fontSize: 12, fontWeight: 700, cursor: "pointer" }}>Save</button>
      </div>
      <div style={{ overflowY: "auto", padding: 16, display: "flex", flexDirection: "column", gap: 12 }}>
        <div style={cardStyle}>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(3,minmax(0,1fr))", gap: 8 }}>
            <div><div style={tinyLabelStyle}>Chunks</div><div style={{ color: t.text, fontFamily: fonts.family, fontSize: 16, fontWeight: 700 }}>{draftChunks.length}</div></div>
            <div><div style={tinyLabelStyle}>Approx Tokens</div><div style={{ color: t.text, fontFamily: fonts.family, fontSize: 16, fontWeight: 700 }}>{totalTokens.toLocaleString()}</div></div>
            <div><div style={tinyLabelStyle}>Compacted Through</div><div style={{ color: t.text, fontFamily: fonts.family, fontSize: 11, lineHeight: 1.3 }}>{formatTs(initialCompaction.compactedThroughTs)}</div></div>
          </div>
          <div style={metaStyle}>When old chunks are merged, their separate fields are replaced by one merged archive chunk. The old individual fields disappear from this page because they are no longer stored separately.</div>
        </div>

        {legacySummary.trim() ? (
          <div style={cardStyle}>
            <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", gap: 8 }}>
              <span style={{ color: t.text, fontFamily: fonts.family, fontSize: 12, fontWeight: 700 }}>Legacy Summary</span>
              <span style={metaStyle}>{estimateChunkTokens(legacySummary).toLocaleString()} approx tokens</span>
            </div>
            <textarea value={legacySummary} onChange={e => setLegacySummary(e.target.value)} style={textAreaStyle} />
          </div>
        ) : null}

        {draftChunks.length === 0 ? (
          <div style={{ ...cardStyle, textAlign: "center", color: t.textDim, fontFamily: fonts.family, fontSize: 12, lineHeight: 1.5 }}>No stored compaction chunks yet. Once enough old messages are compacted, they will show up here.</div>
        ) : draftChunks.map((chunk, index) => (
          <div key={chunk.id || index} style={cardStyle}>
            <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", gap: 10 }}>
              <div style={{ minWidth: 0 }}>
                <div style={{ color: t.text, fontFamily: fonts.family, fontSize: 12, fontWeight: 700 }}>{chunk.merged ? "Merged Archive Chunk" : "Summary Chunk"} {index + 1}</div>
                <div style={metaStyle}>Messages: {Number(chunk.count) || "—"} · {formatTs(chunk.fromTs)} → {formatTs(chunk.toTs)}</div>
              </div>
              <div style={{ color: chunk.merged ? t.accent : t.textDim, border: `1px solid ${chunk.merged ? t.borderAccent : t.border}`, borderRadius: 999, padding: "4px 8px", fontFamily: fonts.family, fontSize: 9, textTransform: "uppercase", letterSpacing: "0.08em", whiteSpace: "nowrap" }}>{chunk.merged ? "merged" : "stored"}</div>
            </div>
            <textarea value={chunk.text || ""} onChange={e => updateChunkText(chunk.id, e.target.value)} style={textAreaStyle} />
            <div style={{ display: "flex", justifyContent: "space-between", gap: 8, color: t.textDim, fontFamily: fonts.family, fontSize: 10 }}>
              <span>ID: {chunk.id || `chunk-${index + 1}`}</span>
              <span>{estimateChunkTokens(chunk.text).toLocaleString()} approx tokens</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function ChatScreen({ t, fonts, project, chat, messages, setMessages, settings, onUpdateInventory, onUpdateMemory, onUpdateCharacters, onUpdateProjectSettings, onUpdateLoreFiles, onSaveChatOptions, onUpdateChatCompaction, onUpdateProjectCompaction, onImportChat, onPersistMessagesForChat }) {
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [showInv, setShowInv] = useState(false);
  const [showChars, setShowChars] = useState(false);
  const [showTune, setShowTune] = useState(false);
  const [showImageSettings, setShowImageSettings] = useState(false);
  const [showCompactionChunks, setShowCompactionChunks] = useState(false);
  const [activeBubbleMenuId, setActiveBubbleMenuId] = useState(null);
  const [importStatus, setImportStatus] = useState(null);
  const bottomRef = useRef(null);
  const textareaRef = useRef(null);
  const imageInputRef = useRef(null);
  const [pendingAttachments, setPendingAttachments] = useState([]);
  const [imageMode, setImageMode] = useState(false);
  const [showInputMenu, setShowInputMenu] = useState(false);
  const [attachmentError, setAttachmentError] = useState("");
  const [focusedChatImage, setFocusedChatImage] = useState(null);
  const [focusedChatImageZoom, setFocusedChatImageZoom] = useState(1);
  const chatOptions = { ...DEFAULT_CHAT_OPTIONS, ...(chat?.options || {}) };
  const projectGlobalContextEnabled = !!project?.projectGlobalContextWindow;
  const chatCompaction = { ...DEFAULT_CHAT_COMPACTION, ...(chat?.compaction || {}), chunks: Array.isArray(chat?.compaction?.chunks) ? chat.compaction.chunks : [] };
  const projectCompaction = { ...DEFAULT_CHAT_COMPACTION, ...(project?.projectCompaction || {}), chunks: Array.isArray(project?.projectCompaction?.chunks) ? project.projectCompaction.chunks : [] };
  const activeCompactionState = projectGlobalContextEnabled ? projectCompaction : chatCompaction;
  const activeCompactionRef = useRef(activeCompactionState);
  useEffect(() => { activeCompactionRef.current = activeCompactionState; }, [activeCompactionState]);

  const getActiveCompactionSnapshot = () => normalizeCompactionState(activeCompactionRef.current || activeCompactionState);

  const updateActiveCompaction = (nextCompaction, options = {}) => {
    const forceEmpty = !!nextCompaction?.__forceEmpty || !!options.forceEmpty;
    const normalized = normalizeCompactionState(stripCompactionControlFlags(nextCompaction));

    // Blank/default compaction is allowed as a read fallback, but it must never be
    // persisted as real project/chat state unless an intentional reset says so.
    if (isCompactionEmptyState(normalized) && !forceEmpty) return;

    // Keep a synchronous copy for the current send/edit cycle. React state updates
    // do not land immediately, so editing then sending could otherwise read the
    // old chunks and hang in compaction against a stale branch.
    activeCompactionRef.current = normalized;

    const payload = { ...normalized, __merge: !options.replace, __replace: !!options.replace, __forceEmpty: forceEmpty };
    if (projectGlobalContextEnabled) onUpdateProjectCompaction?.(payload);
    else onUpdateChatCompaction?.(payload);
  };

  useEffect(() => { bottomRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);
  useEffect(() => { setPendingAttachments([]); setImageMode(false); setShowInputMenu(false); setShowImageSettings(false); setAttachmentError(""); setFocusedChatImage(null); setFocusedChatImageZoom(1); }, [chat?.id]);

  useEffect(() => {
    const el = textareaRef.current;
    if (!el) return;
    const computed = getComputedStyle(el);
    const lineHeight = parseFloat(computed.lineHeight) || 18;
    const verticalPadding = 16;
    const minHeight = Math.round(lineHeight + verticalPadding + 2);
    const maxHeight = Math.round(lineHeight * 6 + verticalPadding + 2);
    el.style.height = `${minHeight}px`;
    const nextHeight = Math.min(Math.max(el.scrollHeight, minHeight), maxHeight);
    el.style.height = `${nextHeight}px`;
    el.style.overflowY = el.scrollHeight > maxHeight ? "auto" : "hidden";
  }, [input, settings.fontSize]);

  const persistMessages = (msgs) => {
    if (!chat?.id) return;
    if (typeof onPersistMessagesForChat === "function") {
      onPersistMessagesForChat(chat.id, msgs);
      return;
    }
    const cachedAll = (typeof window !== "undefined" && window.__mirrorMessagesCache) ? window.__mirrorMessagesCache : storage.get(STORAGE_KEYS.MESSAGES, {});
    const nextAll = { ...(cachedAll || {}), [chat.id]: msgs };
    if (typeof window !== "undefined") window.__mirrorMessagesCache = nextAll;
    storage.set(STORAGE_KEYS.MESSAGES, nextAll);
  };

  const activeCharacters = (project.characters || []).filter(c => !c.excluded);
  const activeFiles = (project.files || []).filter(f => f.active !== false);
  const activeLoreFiles = normalizeProjectLoreFiles(project.loreFiles, project.id);

  // FIX: Memory is NO LONGER injected into system prompt every turn.
  // Instead, we tell the model memories exist and it can call lookup_memory when it needs them.
  const buildSystemPrompt = () => {
    const blocks = [];
    if (project.systemPrompt) blocks.push(project.systemPrompt);
    if (project.lore) blocks.push(`## World Lore\n${project.lore}`);

    // Inventory (still inline if enabled — it's small)
    if (chatOptions.includeInventoryInPrompt) {
      blocks.push(`## Current Inventory\nCredits: ${project.inventory?.credits ?? 0}\nItems: ${(project.inventory?.items || []).map(i => `${i.name} x${i.qty}`).join(", ") || "none"}`);
    }

    // Characters — only if "include all" is on; otherwise they're on-demand via lookup
    if (chatOptions.includeCharactersInPrompt && activeCharacters.length) {
      const visibleCharacters = activeCharacters.map(c => formatCharacterForModel(c, false, project.characterSettings)).filter(Boolean);
      if (visibleCharacters.length) blocks.push(`## Active Characters\n${visibleCharacters.join("\n\n")}`);
    }

    // Files — only if "include all" is on
    if (chatOptions.includeProjectFilesInPrompt && activeFiles.length) {
      blocks.push(`## Active Project Files\n${activeFiles.map(f => `### FILE: ${f.name}\n${f.text || ""}`).join("\n\n")}`);
    }

    // Tell model what's available via tools
    const availableTools = [];
    const memorySettings = getProjectMemorySettings(project);
    const activeMemories = normalizeProjectMemory(project.memory || [], project.id).filter(m => m.status === "active");
    const pendingMemories = normalizeProjectMemory(project.memory || [], project.id).filter(m => m.status === "pending");
    if (memorySettings.type === "fiction" && memorySettings.allowInventoryUpdates !== false) {
      availableTools.push("Inventory updates are enabled for this fiction project. Use update_inventory only when fictional events clearly add/remove credits or items.");
    }
    if (memorySettings.allowLookup && chatOptions.allowMemoryLookup && activeMemories.length) {
      availableTools.push(`Project memories available for lookup (${activeMemories.length} active). Use lookup_memory with a broad semantic query when durable project/user context may help. This only searches the current project.`);
    }
    if (memorySettings.retention !== "manual") {
      const modeLabel = memorySettings.retention === "review" ? "review queue" : "autonomous active memory";
      const typeLabel = memorySettings.type === "fiction" ? "fiction/canon" : "factual/user";
      availableTools.push(`Memory retention is enabled for this project: ${modeLabel}, ${typeLabel} mode. At most 3 memory tool calls per response. Save only durable, reusable details; skip temporary mood, ordinary scene actions, and duplicates.`);
    }
    if (memorySettings.retention === "review" && pendingMemories.length >= memorySettings.pendingLimit) {
      availableTools.push(`Pending memory queue is full (${pendingMemories.length}/${memorySettings.pendingLimit}). Do not propose new memories until the user reviews this project.`);
    }
    if (chatOptions.allowCharacterLookup && activeCharacters.length && !chatOptions.includeCharactersInPrompt) {
      availableTools.push(`Characters available for lookup: ${activeCharacters.map(c => getSafeCharacterName(c)).join(", ")}. Use lookup_character to request only the fields needed instead of full profiles. Request summary only when narrative context is needed. Available character fields: ${getCharacterLookupFieldMenu()}. Use stats for checks/rolls; stats includes class bonuses plus training bonus totals and sources. Use trainingBonuses when you need only the bonus rows.`);
    }
    if (chatOptions.allowProjectFileLookup && activeFiles.length && !chatOptions.includeProjectFilesInPrompt) {
      availableTools.push(`Project files available for lookup: ${activeFiles.map(f => f.name).join(", ")}`);
    }
    if (chatOptions.allowLoreFileLookup && activeLoreFiles.length) {
      availableTools.push(`Lore files available for lookup: ${activeLoreFiles.map(item => item.title).join(", ")}. Use lookup_lore_file for worldbuilding, hidden canon, setting notes, faction lore, history, or restricted lore access notes.`);
    }
    if (availableTools.length) {
      blocks.push(`## Available Lookup Tools\nUse these tools when you need specific details — do not guess.\n${availableTools.map(l => `- ${l}`).join("\n")}`);
      blocks.push("## Tool Follow-Through\nTool results are intermediate information, not the final answer. After any lookup or tool result, continue the user's original request in the same response. Use the returned data to complete the action, calculation, narration, comparison, edit, explanation, or next requested step. Do not stop after merely repeating what the tool returned.");
    }

    if (memorySettings.retention !== "manual") {
      blocks.push("## Memory Autonomy\nMemory retention is enabled. Preserve durable, reusable information without waiting for the user to repeat it. When the user explicitly says to remember/save/note something, save it. When important canon, preferences, settings, relationships, decisions, or long-term project facts emerge, save them. Skip ordinary temporary actions, filler, and duplicates.");
    }

    return blocks.filter(Boolean).join("\n\n");
  };

  // FIX: All tools properly defined and wired
  const inventoryMemorySettings = getProjectMemorySettings(project);
  const allowInventoryTool = inventoryMemorySettings.type === "fiction" && inventoryMemorySettings.allowInventoryUpdates !== false;
  const tools = [
    ...(allowInventoryTool ? [{
      type: "function",
      function: {
        name: "update_inventory",
        description: "Update the player's inventory (credits or items) based on fictional narrative events in this project. Only use when the scene clearly changes inventory.",
        parameters: {
          type: "object",
          properties: {
            credits_delta: { type: "number", description: "Change in credits (positive or negative)." },
            add_items: { type: "array", items: { type: "string" }, description: "Items to add." },
            remove_items: { type: "array", items: { type: "string" }, description: "Items to remove by name." },
          },
        },
      },
    }] : []),
    ...(() => {
      const memorySettings = getProjectMemorySettings(project);
      const mems = normalizeProjectMemory(project.memory || [], project.id);
      const pendingCount = mems.filter(m => m.status === "pending").length;
      if (memorySettings.retention === "manual") return [];
      if (memorySettings.retention === "review" && pendingCount >= memorySettings.pendingLimit) return [];
      return [{
        type: "function",
        function: {
          name: memorySettings.retention === "review" ? "propose_project_memory" : "save_project_memory",
          description: memorySettings.retention === "review" ? "Propose a durable memory for the current project. It will stay pending until the user approves it. Use at most 3 times per response." : "Save a durable memory directly to the current project's active memory. Use at most 3 times per response.",
          parameters: {
            type: "object",
            properties: {
              content: { type: "string", description: "Concise memory text. Use User... for factual user facts, or direct canon wording for fiction projects." },
              category: { type: "string", enum: MEMORY_CATEGORIES },
              tags: { type: "array", items: { type: "string" }, description: "Broad search tags/synonyms so future lookup can find this without exact wording." },
              importance: { type: "integer", minimum: 1, maximum: 5 },
              reason: { type: "string", description: "Short reason this is useful later." },
            },
            required: ["content", "category", "tags", "importance"],
          },
        },
      }];
    })(),
    // NEW: on-demand memory lookup
    ...(chatOptions.allowMemoryLookup && getProjectMemorySettings(project).allowLookup && normalizeProjectMemory(project.memory || [], project.id).some(m => m.status === "active") ? [{
      type: "function",
      function: {
        name: "lookup_memory",
        description: "Search active memories in the current project only. Use broad semantic queries for user facts, preferences, routines, project details, lore, or continuity instead of guessing.",
        parameters: {
          type: "object",
          properties: { query: { type: "string", description: "Broad search phrase/topic. Include synonyms such as work/job/schedule or canon/lore/relationship when useful." }, categories: { type: "array", items: { type: "string", enum: MEMORY_CATEGORIES }, description: "Optional category filters." }, limit: { type: "integer", minimum: 1, maximum: 10 } },
          required: ["query"],
        },
      },
    }] : []),
    ...(chatOptions.allowCharacterLookup ? [{
      type: "function",
      function: {
        name: "lookup_character",
        description: "Search the active project's character database and return only the requested character fields. Request summary only when summary is needed. Choose field names from the provided enum instead of asking for the whole profile unless fullProfile is truly needed.",
        parameters: {
          type: "object",
          properties: {
            query: { type: "string", description: "Alias, sender ID, role, faction, tag, or any descriptive phrase." },
            fields: {
              type: "array",
              description: "Specific fields to retrieve. Request the smallest useful set. Use stats for checks, rolls, and mechanics. Request summary only when narrative context is needed. The stats field includes training bonus totals and sources. Use fullProfile only when broad continuity context is needed.",
              items: { type: "string", enum: CHARACTER_LOOKUP_FIELDS },
            },
          },
          required: ["query", "fields"],
        },
      },
    }] : []),
    ...(chatOptions.allowLoreFileLookup && activeLoreFiles.length ? [{
      type: "function",
      function: {
        name: "lookup_lore_file",
        description: "Search the active project's Lore Files by title, restriction reason, or lore text. Use this for setting canon, hidden lore, history, factions, worldbuilding, or continuity notes.",
        parameters: {
          type: "object",
          properties: { query: { type: "string", description: "Lore file title or broad lore search phrase." }, limit: { type: "integer", minimum: 1, maximum: 5 } },
          required: ["query"],
        },
      },
    }] : []),
    ...(chatOptions.allowProjectFileLookup ? [{
      type: "function",
      function: {
        name: "lookup_project_file",
        description: "Search project files for content by filename or text content.",
        parameters: {
          type: "object",
          properties: { query: { type: "string", description: "File name or search phrase to find within file contents." } },
          required: ["query"],
        },
      },
    }] : []),
  ];

  // FIX: All tool handlers properly implemented and returning real data
  const handleToolCall = (toolCall) => {
    const name = toolCall.function?.name;
    let args;
    try {
      args = JSON.parse(toolCall.function?.arguments || "{}");
    } catch {
