  const handleToolCall = (toolCall) => {
    const name = toolCall.function?.name;
    let args;
    try {
      args = JSON.parse(toolCall.function?.arguments || "{}");
    } catch {
      return `Tool "${name}" failed: invalid arguments JSON.`;
    }

    if (name === "update_inventory") {
      if (!allowInventoryTool) return "Inventory updates are disabled for this project.";
      const inv = { ...(project.inventory || { credits: 0, items: [] }), items: [...(project.inventory?.items || [])] };
      if (typeof args.credits_delta === "number") inv.credits = (inv.credits || 0) + args.credits_delta;
      if (Array.isArray(args.add_items)) {
        args.add_items.forEach(item => {
          const existing = inv.items.find(i => i.name.toLowerCase() === String(item).toLowerCase());
          if (existing) existing.qty = (existing.qty || 0) + 1;
          else inv.items.push({ id: Date.now() + Math.random(), name: String(item), qty: 1 });
        });
      }
      if (Array.isArray(args.remove_items)) {
        inv.items = inv.items.filter(i => !args.remove_items.some(r => String(r).toLowerCase() === i.name.toLowerCase()));
      }
      onUpdateInventory(inv);
      return `Inventory updated. Credits: ${inv.credits}. Items: ${inv.items.map(i => `${i.name} x${i.qty}`).join(", ") || "none"}.`;
    }

    if (name === "propose_project_memory" || name === "save_project_memory") {
      const memorySettings = getProjectMemorySettings(project);
      if (memorySettings.retention === "manual") return "Memory retention is set to manual only for this project.";
      const isReview = memorySettings.retention === "review" || name === "propose_project_memory";
      const mems = normalizeProjectMemory(project.memory || [], project.id);
      const pendingCount = mems.filter(m => m.status === "pending").length;
      if (isReview && pendingCount >= memorySettings.pendingLimit) return `Pending memory queue is full (${pendingCount}/${memorySettings.pendingLimit}). Ask the user to review memories first.`;
      if (!args.content) return `${name} failed: no content provided.`;
      const now = Date.now();
      const incoming = normalizeMemory({ id: makeId(isReview ? "mem_pending" : "mem_auto"), projectId: project.id, content: String(args.content).trim(), category: args.category || (memorySettings.type === "fiction" ? "world" : "other"), tags: Array.isArray(args.tags) ? args.tags : [], importance: args.importance || 3, status: isReview ? "pending" : "active", source: isReview ? "auto-review" : "auto", reason: args.reason || "", createdAt: now, updatedAt: now }, project.id);
      const duplicate = mems.some(m => getMemoryContent(m).toLowerCase() === incoming.content.toLowerCase());
      if (duplicate) return "Memory not stored: duplicate already exists in this project.";
      onUpdateMemory([...mems, incoming]);
      return isReview ? `Memory proposed for review: "${incoming.content}"` : `Memory saved: "${incoming.content}"`;
    }

    if (name === "lookup_memory") {
      const query = String(args.query || "").toLowerCase().trim();
      if (!query) return "lookup_memory failed: empty query.";
      const memorySettings = getProjectMemorySettings(project);
      if (!memorySettings.allowLookup) return "Memory lookup is disabled for this project.";
      const mems = normalizeProjectMemory(project.memory || [], project.id).filter(m => m.status === "active");
      if (!mems.length) return "No active memories stored for this project.";

      const queryWords = query.split(/\s+/).filter(Boolean);
      const wantedCategories = Array.isArray(args.categories) ? args.categories.map(c => String(c).toLowerCase()).filter(c => MEMORY_CATEGORIES.includes(c)) : [];
      const limit = Math.max(1, Math.min(10, Math.round(Number(args.limit) || 5)));
      const scored = mems.map(m => {
        const text = `${m.content} ${m.category} ${(m.tags || []).join(" ")} ${m.reason || ""}`.toLowerCase();
        const wordScore = queryWords.reduce((score, w) => score + (text.includes(w) ? 1 : 0), 0);
        const categoryScore = wantedCategories.length && wantedCategories.includes(m.category) ? 3 : 0;
        const tagScore = (m.tags || []).reduce((score, tag) => score + (query.includes(String(tag).toLowerCase()) ? 2 : 0), 0);
        return { m, score: wordScore + categoryScore + tagScore + (m.importance || 3) * 0.1 };
      }).filter(({ score }) => score > 0 || wantedCategories.length).sort((a, b) => b.score - a.score);

      if (!scored.length) return `No active memories matched "${args.query}" in this project.`;
      return `Matching project memories:\n${scored.slice(0, limit).map(({ m }) => formatMemoryForModel(m)).join("\n")}`;
    }

    if (name === "lookup_character") {
      const query = String(args.query || "").toLowerCase().trim();
      if (!query) return "lookup_character failed: empty query.";
      if (!activeCharacters.length) return "No active characters in this project.";

      // Score each character by how many query words appear in their lookup text
      const queryWords = query.split(/\s+/).filter(Boolean);
      const scored = activeCharacters.map(c => {
        const text = getCharacterLookupText(c, false, project.characterSettings);
        const score = queryWords.filter(w => text.includes(w)).length;
        return { c, score };
      }).filter(({ score }) => score > 0).sort((a, b) => b.score - a.score);

      if (!scored.length) {
        // Return list of available characters so model knows what exists
        return `No active characters matched "${args.query}". Active characters: ${activeCharacters.map(c => getSafeCharacterName(c)).join(", ")}.`;
      }
      const requestedFields = normalizeCharacterLookupFields(args.fields);
      return scored.slice(0, 3).map(({ c }) => formatCharacterFieldsForModel(c, requestedFields, false, project.characterSettings)).join("\n\n");
    }

    if (name === "lookup_project_file") {
      const query = String(args.query || "").toLowerCase().trim();
      if (!query) return "lookup_project_file failed: empty query.";
      if (!activeFiles.length) return "No active project files in this project.";

      const matches = activeFiles.filter(f =>
        (f.name || "").toLowerCase().includes(query) ||
        (f.text || "").toLowerCase().includes(query)
      ).slice(0, 3);

      if (!matches.length) return `No active project files matched "${args.query}". Available files: ${activeFiles.map(f => f.name).join(", ")}.`;
      return matches.map(f => `## FILE: ${f.name}\n${f.text || ""}`).join("\n\n");
    }

    return `Unknown tool "${name}".`;
  };

  const isAssistantToolCallMessage = (m) => (
    m?.role === "assistant" &&
    Array.isArray(m.tool_calls) &&
    m.tool_calls.length > 0
  );

  const toRequestMessage = (m) => ({
    role: m.role,
    content: m.content || "",
    ...(m.tool_call_id ? { tool_call_id: m.tool_call_id } : {}),
    ...(m.tool_calls ? { tool_calls: m.tool_calls } : {}),
  });

  const getContextSlices = (baseMessages = []) => {
    // Do not carry old tool-call plumbing into future requests.
    // The real assistant answer after a lookup is already saved as a normal assistant message,
    // so keeping stale assistant tool_calls / tool result messages only risks invalid API order
    // when Max Message Count slices the history.
    const visibleMessages = baseMessages.filter(m => m.role !== "tool" && !isAssistantToolCallMessage(m));
    const rawLimit = chatOptions.maxContextMessages;
    if (rawLimit == null) {
      return { visibleMessages, compactableMessages: [], recentMessages: visibleMessages, maxVisible: null };
    }
    const maxVisible = Math.max(0, Number(rawLimit));
    const splitIndex = Math.max(0, visibleMessages.length - maxVisible);
    return {
      visibleMessages,
      compactableMessages: visibleMessages.slice(0, splitIndex),
      recentMessages: maxVisible === 0 ? [] : visibleMessages.slice(-maxVisible),
      maxVisible,
    };
  };

  const enforceCompactionBudget = (text, maxTokens = chatOptions.compactionMaxTokens) => {
    const safeMaxTokens = normalizeSummaryTokenBudget(maxTokens);
    const maxChars = Math.max(1000, safeMaxTokens * 5);
    let output = String(text || "").trim();
    while (estimateTokens(output) > safeMaxTokens && output.length > 600) {
      output = output.slice(0, Math.floor(output.length * 0.88)).trim();
    }
    if (output.length > maxChars) output = output.slice(0, maxChars).trim();
    return output;
  };

  const serializeCompactionChunks = (compaction = {}) => {
    const chunks = Array.isArray(compaction.chunks) ? compaction.chunks : [];
    const chunkText = chunks.map((chunk, index) => {
      const from = chunk.fromTs ? new Date(chunk.fromTs).toISOString() : "unknown-start";
      const to = chunk.toTs ? new Date(chunk.toTs).toISOString() : "unknown-end";
      return "### Chunk " + (index + 1) + " | " + from + " → " + to + "\n" + String(chunk.text || "").trim();
    }).filter(Boolean).join("\n\n");
    const legacySummary = String(compaction.summary || "").trim();
    return [legacySummary ? "### Legacy Summary\n" + legacySummary : "", chunkText].filter(Boolean).join("\n\n").trim();
  };

  const getContextMessages = (baseMessages = [], compactionOverride = null, pendingMessages = []) => {
    const { recentMessages } = getContextSlices(baseMessages);
    const compaction = { ...chatCompaction, ...(compactionOverride || {}) };
    const summary = chatOptions.compactionEnabled && chatOptions.maxContextMessages != null ? serializeCompactionChunks(compaction) : "";
    const summaryMessages = summary ? [{
      role: "system",
      content: "## Hidden Conversation Summary\nThis is private chunked context from earlier chat history. Use it only as background continuity. Prefer newer chunks over older chunks if details conflict.\n\n" + summary,
    }] : [];
    return [...summaryMessages, ...pendingMessages.map(toRequestMessage), ...recentMessages.map(toRequestMessage)];
  };

  const formatMessageForCompaction = (m, index = 0) => {
    const content = stripOocBlocks(m.content || "");
    if (!content) return "";
    const role = String(m.role || "message").toUpperCase();
    const stamp = m.ts ? new Date(m.ts).toISOString() : "message-" + (index + 1);
    return ("### " + role + " | " + stamp + "\n" + content).trim();
  };

  const requestChunkSummary = async ({ messagesToCompact, maxTokens }) => {
    const safeMaxTokens = normalizeSummaryTokenBudget(maxTokens);
    const serializedMessages = messagesToCompact.map(formatMessageForCompaction).filter(Boolean).join("\n\n");
    if (!serializedMessages) return "";
    const payload = {
      model: requestModel || settings.model || "openai/gpt-4o-2024-11-20",
      messages: [
        { role: "system", content: "You create one hidden continuity chunk for a roleplay/chat client. Summarize only the supplied messages. Preserve durable facts, character state, user preferences, unresolved goals, scene position, promises, and decisions. Do not reinterpret earlier history. Do not mention that this is a summary. Return only the chunk text." },
        { role: "user", content: "Messages to compact into one standalone chunk:\n" + serializedMessages + "\n\nMaximum output budget: " + safeMaxTokens + " tokens." },
      ],
      temperature: 0, top_p: 1, max_tokens: safeMaxTokens, ...providerPrivacyFields,
    };
    const res = await fetch(apiUrl, { method: "POST", headers, body: JSON.stringify(payload) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || "Compaction API error");
    return enforceCompactionBudget(data.choices?.[0]?.message?.content || "", safeMaxTokens);
  };

  const requestChunkMerge = async ({ chunksToMerge, maxTokens }) => {
    const safeMaxTokens = normalizeSummaryTokenBudget(maxTokens);
    const serializedChunks = chunksToMerge.map((chunk, index) => {
      const from = chunk.fromTs ? new Date(chunk.fromTs).toISOString() : "unknown-start";
      const to = chunk.toTs ? new Date(chunk.toTs).toISOString() : "unknown-end";
      return "### Existing Chunk " + (index + 1) + " | " + from + " → " + to + "\n" + (chunk.text || "");
    }).join("\n\n");
    const payload = {
      model: requestModel || settings.model || "openai/gpt-4o-2024-11-20",
      messages: [
        { role: "system", content: "You merge old hidden continuity chunks for a roleplay/chat client. Preserve concrete facts, chronology, character state, unresolved threads, and user preferences. Remove only duplication and filler. Do not invent or reinterpret. Return only the merged chunk text." },
        { role: "user", content: "Old chunks to merge:\n" + serializedChunks + "\n\nMerge them into one faithful chunk. Maximum output budget: " + safeMaxTokens + " tokens." },
      ],
      temperature: 0, top_p: 1, max_tokens: safeMaxTokens, ...providerPrivacyFields,
    };
    const res = await fetch(apiUrl, { method: "POST", headers, body: JSON.stringify(payload) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || "Chunk merge API error");
    const fallback = chunksToMerge.map(c => c.text || "").join("\n\n");
    return enforceCompactionBudget(data.choices?.[0]?.message?.content || fallback, safeMaxTokens);
  };

  const enforceChunkLimit = async (chunks, maxChunks, maxTokens) => {
    const safeMaxChunks = Math.max(1, Number(maxChunks) || DEFAULT_CHAT_OPTIONS.compactionMaxChunks);
    let nextChunks = Array.isArray(chunks) ? [...chunks] : [];

    // Max Summary Chunks is the rollover threshold, not the final stored count.
    // Example: max 5 means chunks 1-5 collapse into one rolling master chunk,
    // leaving 4 clear slots for fresh batch summaries. Then master + 4 fresh chunks
    // collapse again. This prevents endless 5/6/10 chunk buildup.
    const shouldRollUp = () => {
      if (nextChunks.length <= 1) return false;
      return safeMaxChunks <= 1 ? nextChunks.length > 1 : nextChunks.length >= safeMaxChunks;
    };

    while (shouldRollUp()) {
      const chunksToMerge = nextChunks;
      const mergedText = await requestChunkMerge({ chunksToMerge, maxTokens });
      const mergedChunk = {
        id: makeId("cmp_chunk"),
        fromTs: chunksToMerge[0]?.fromTs || null,
        toTs: chunksToMerge[chunksToMerge.length - 1]?.toTs || null,
        count: chunksToMerge.reduce((sum, chunk) => sum + (Number(chunk.count) || 0), 0),
        text: mergedText,
        createdAt: Date.now(),
        merged: true,
        rolloverThreshold: safeMaxChunks,
      };
      nextChunks = [mergedChunk];
    }

    return nextChunks;
  };

  const compactMessagesIntoChunks = async (existingChunks, messagesToCompact, maxTokens, maxChunks) => {
    const text = await requestChunkSummary({ messagesToCompact, maxTokens });
    if (!String(text || "").trim()) return Array.isArray(existingChunks) ? existingChunks : [];
    const chunk = { id: makeId("cmp_chunk"), fromTs: Number(messagesToCompact[0]?.ts) || Date.now(), toTs: Number(messagesToCompact[messagesToCompact.length - 1]?.ts) || Date.now(), count: messagesToCompact.length, text, createdAt: Date.now() };
    return enforceChunkLimit([...(existingChunks || []), chunk], maxChunks, maxTokens);
  };

  const prepareRequestMessages = async (baseMessages = []) => {
    const { compactableMessages, maxVisible } = getContextSlices(baseMessages);
    if (!chatOptions.compactionEnabled || chatOptions.maxContextMessages == null || maxVisible == null || !compactableMessages.length) return getContextMessages(baseMessages);

    const safeMaxTokens = normalizeSummaryTokenBudget(chatOptions.compactionMaxTokens);
    const safeMaxChunks = Math.max(1, Number(chatOptions.compactionMaxChunks) || DEFAULT_CHAT_OPTIONS.compactionMaxChunks);
    let activeCompaction = { ...DEFAULT_CHAT_COMPACTION, ...chatCompaction, chunks: Array.isArray(chatCompaction.chunks) ? chatCompaction.chunks : [] };

    const existingChunksNeedRollup = activeCompaction.chunks.length > 1 && (safeMaxChunks <= 1 ? activeCompaction.chunks.length > 1 : activeCompaction.chunks.length >= safeMaxChunks);
    if (existingChunksNeedRollup) {
      try {
        const rolledChunks = await enforceChunkLimit(activeCompaction.chunks, safeMaxChunks, safeMaxTokens);
        activeCompaction = { ...activeCompaction, chunks: rolledChunks, updatedAt: Date.now() };
        onUpdateChatCompaction?.(activeCompaction);
      } catch (error) {
        console.warn("Stored chunk rollup failed; continuing with existing chunks.", error);
      }
    }

    const compactedThroughTs = Number(activeCompaction.compactedThroughTs) || 0;
    let unCompactedMessages = compactableMessages.filter(m => (Number(m.ts) || 0) > compactedThroughTs);
    if (!activeCompaction.summary && !activeCompaction.chunks.length && !unCompactedMessages.length && compactableMessages.length) unCompactedMessages = compactableMessages;
    if (!unCompactedMessages.length) return getContextMessages(baseMessages, activeCompaction);
    const safeBatchSize = Math.max(1, Number(chatOptions.compactionBatchMessages) || DEFAULT_CHAT_OPTIONS.compactionBatchMessages);
    const compactCount = Math.floor(unCompactedMessages.length / safeBatchSize) * safeBatchSize;
    const messagesToCompact = unCompactedMessages.slice(0, compactCount);
    const pendingMessages = unCompactedMessages.slice(compactCount);
    if (!messagesToCompact.length) return getContextMessages(baseMessages, activeCompaction, pendingMessages);
    try {
      const chunks = await compactMessagesIntoChunks(activeCompaction.chunks || [], messagesToCompact, safeMaxTokens, safeMaxChunks);
      const nextCompaction = { summary: activeCompaction.summary || "", chunks, compactedThroughTs: Number(messagesToCompact[messagesToCompact.length - 1]?.ts) || Date.now(), updatedAt: Date.now() };
      onUpdateChatCompaction?.(nextCompaction);
      return getContextMessages(baseMessages, nextCompaction, pendingMessages);
    } catch (error) {
      console.warn("Chat compaction failed; continuing with existing context.", error);
      return getContextMessages(baseMessages, activeCompaction, unCompactedMessages);
    }
  };
  const resetChatCompaction = () => onUpdateChatCompaction?.({ ...DEFAULT_CHAT_COMPACTION });

  const buildRequestPayload = (requestMessages) => {
    const payload = {
      model: requestModel || settings.model || "openai/gpt-4o-2024-11-20",
      messages: [{ role: "system", content: buildSystemPrompt() }, ...requestMessages],
      ...providerPrivacyFields,
      temperature: clampNumber(chatOptions.temperature ?? DEFAULT_CHAT_OPTIONS.temperature, 0, 2, DEFAULT_CHAT_OPTIONS.temperature),
      top_p: clampNumber(chatOptions.topP ?? DEFAULT_CHAT_OPTIONS.topP, 0, 1, DEFAULT_CHAT_OPTIONS.topP),
      ...(chatOptions.maxOutputTokens ? { max_tokens: Number(chatOptions.maxOutputTokens) } : {}),
      ...(chatOptions.streamOutput ? { stream: true } : {}),
    };
    if (tools.length) { payload.tools = tools; payload.tool_choice = "auto"; }
    return payload;
  };

  const apiProvider = getEffectiveProjectProvider(project, settings);
  const requestModel = getEffectiveProjectModel(project, settings);
  const apiKey = getProviderApiKey(settings, apiProvider);
  const apiBase = getProviderApiBase(apiProvider);
  const apiUrl = `${apiBase}/chat/completions`;
  const providerPrivacyFields = apiProvider === "openrouter" ? buildOpenRouterPrivacyFields(settings) : {};
  const headers = {
    "Content-Type": "application/json",
    Authorization: `Bearer ${apiKey}`,
    ...(apiProvider === "openrouter" ? { "HTTP-Referer": "https://localhost", "X-Title": "Roleplay App" } : {}),
  };

  const toAssistantMessage = (content, tokenCount, tokenEstimated, extra = {}) => ({
    role: "assistant", content: content || "", ts: Date.now(),
    tokenCount: tokenCount ?? estimateTokens(content || ""),
    tokenEstimated, ...extra,
  });

  const streamChatCompletion = async ({ requestMessages, uiBaseMessages }) => {
    const res = await fetch(apiUrl, { method: "POST", headers, body: JSON.stringify(buildRequestPayload(requestMessages)) });
    if (!res.ok) {
      let errText = "API error";
      try { const errData = await res.json(); errText = errData.error?.message || errText; }
      catch { const text = await res.text(); if (text) errText = text; }
      throw new Error(errText);
    }
    if (!res.body) throw new Error("Streaming response body was empty.");

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = "", content = "", usage = null;
    const toolCallMap = new Map();
    let renderedPartial = false;

    const getToolCalls = () => Array.from(toolCallMap.entries()).sort((a, b) => a[0] - b[0]).map(([, value]) => ({
      id: value.id || `tool_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`,
      type: "function",
      function: { name: value.function?.name || "", arguments: value.function?.arguments || "{}" },
    }));

    const renderPartial = () => {
      if (!content) return;
      renderedPartial = true;
      const partial = toAssistantMessage(content, usage?.completion_tokens, usage?.completion_tokens == null, { _streaming: true });
      const partialMessages = [...uiBaseMessages, partial];
      setMessages(partialMessages); persistMessages(partialMessages);
    };

    const processChunk = (data) => {
      if (!data || data === "[DONE]") return;
      const parsed = JSON.parse(data);
      if (parsed.error) throw new Error(parsed.error.message || "Streaming error");
      if (parsed.usage) usage = parsed.usage;
      const choice = parsed.choices?.[0];
      const delta = choice?.delta || {};
      if (typeof delta.content === "string") { content += delta.content; renderPartial(); }
      if (Array.isArray(delta.tool_calls)) {
        delta.tool_calls.forEach((call, index) => {
          const mapIndex = call.index ?? index;
          const current = toolCallMap.get(mapIndex) || { id: "", type: "function", function: { name: "", arguments: "" } };
          if (call.id) current.id = `${current.id || ""}${call.id}`;
          if (call.type) current.type = call.type;
          if (call.function?.name) current.function.name = `${current.function.name || ""}${call.function.name}`;
          if (call.function?.arguments) current.function.arguments = `${current.function.arguments || ""}${call.function.arguments}`;
          toolCallMap.set(mapIndex, current);
        });
      }
    };

    while (true) {
      const { value, done } = await reader.read();
      buffer += decoder.decode(value || new Uint8Array(), { stream: !done });
      let boundary = buffer.indexOf("\n\n");
      while (boundary !== -1) {
        const rawEvent = buffer.slice(0, boundary);
        buffer = buffer.slice(boundary + 2);
        const dataLines = rawEvent.split(/\r?\n/).filter(line => line.startsWith("data:")).map(line => line.slice(5).trim());
        if (dataLines.length) processChunk(dataLines.join("\n"));
        boundary = buffer.indexOf("\n\n");
      }
      if (done) {
        const tail = buffer.trim();
        if (tail) tail.split(/\r?\n/).filter(line => line.startsWith("data:")).map(line => line.slice(5).trim()).forEach(processChunk);
        break;
      }
    }

    const toolCalls = getToolCalls();
    const assistantMsg = toAssistantMessage(content, usage?.completion_tokens, usage?.completion_tokens == null, toolCalls.length ? { tool_calls: toolCalls } : {});
    if (renderedPartial || assistantMsg.content) {
      const finalUiMessages = [...uiBaseMessages, assistantMsg];
      setMessages(finalUiMessages); persistMessages(finalUiMessages);
    }
    return assistantMsg;
  };

  const requestAssistant = async (baseMessages) => {
    const requestMessages = await prepareRequestMessages(baseMessages);

    if (chatOptions.streamOutput) {
      const assistantMsg = await streamChatCompletion({ requestMessages, uiBaseMessages: baseMessages });
      if (assistantMsg.tool_calls?.length) {
        const toolMessages = assistantMsg.tool_calls.map(tc => ({
          role: "tool", tool_call_id: tc.id, tool_name: tc.function?.name,
          content: handleToolCall(tc), ts: Date.now(),
        }));
        const withTools = [...baseMessages, assistantMsg, ...toolMessages];
        setMessages(withTools); persistMessages(withTools);
        const followRequestMessages = [
          ...requestMessages,
          { role: "assistant", content: assistantMsg.content, ...(assistantMsg.tool_calls ? { tool_calls: assistantMsg.tool_calls } : {}) },
          ...toolMessages.map(m => ({ role: "tool", tool_call_id: m.tool_call_id, content: m.content })),
        ];
        const followAssistant = await streamChatCompletion({ requestMessages: followRequestMessages, uiBaseMessages: withTools });
        const finalMessages = [...withTools, followAssistant];
        setMessages(finalMessages); persistMessages(finalMessages);
        return finalMessages;
      }
      const finalMessages = [...baseMessages, assistantMsg];
      setMessages(finalMessages); persistMessages(finalMessages);
      return finalMessages;
    }

    const payload = buildRequestPayload(requestMessages);
    const res = await fetch(apiUrl, { method: "POST", headers, body: JSON.stringify(payload) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error?.message || "API error");

    const choice = data.choices?.[0];
    const assistantMsg = choice?.message;
    const firstPassTokens = data.usage?.completion_tokens;

    if (assistantMsg?.tool_calls?.length) {
      const assistantToolMsg = {
        role: "assistant", content: assistantMsg.content || "",
        tool_calls: assistantMsg.tool_calls, ts: Date.now(),
        tokenCount: firstPassTokens ?? estimateTokens(assistantMsg.content || ""),
        tokenEstimated: firstPassTokens == null,
      };
      const toolMessages = assistantMsg.tool_calls.map(tc => ({
        role: "tool", tool_call_id: tc.id, tool_name: tc.function?.name,
        content: handleToolCall(tc), ts: Date.now(),
      }));
      const withTools = [...baseMessages, assistantToolMsg, ...toolMessages];
      setMessages(withTools); persistMessages(withTools);

      const followUp = await fetch(apiUrl, {
        method: "POST", headers,
        body: JSON.stringify({
          ...payload,
          messages: [
            { role: "system", content: buildSystemPrompt() },
            ...requestMessages,
            { role: "assistant", content: assistantToolMsg.content, ...(assistantToolMsg.tool_calls ? { tool_calls: assistantToolMsg.tool_calls } : {}) },
            ...toolMessages.map(m => ({ role: "tool", tool_call_id: m.tool_call_id, content: m.content })),
          ],
        }),
      });
      const followData = await followUp.json();
      if (!followUp.ok) throw new Error(followData.error?.message || "API error");

      const finalMsg = followData.choices?.[0]?.message?.content || "";
      const followTokens = followData.usage?.completion_tokens;
      const finalMessages = [...withTools, { role: "assistant", content: finalMsg, ts: Date.now(), tokenCount: followTokens ?? estimateTokens(finalMsg), tokenEstimated: followTokens == null }];
      setMessages(finalMessages); persistMessages(finalMessages);
      return finalMessages;
    }

    const aiText = assistantMsg?.content || "";
    const aiMsg = { role: "assistant", content: aiText, ts: Date.now(), tokenCount: firstPassTokens ?? estimateTokens(aiText), tokenEstimated: firstPassTokens == null };
    const finalMessages = [...baseMessages, aiMsg];
    setMessages(finalMessages); persistMessages(finalMessages);
    return finalMessages;
  };

  const handleCopyMessage = async (content) => { setActiveBubbleMenuId(null); await copyMessageText(content || ""); };

  const handleEditMessage = (index) => {
    const target = messages[index];
    if (!target || target.role !== "user") return;
    const trimmedMessages = messages.slice(0, index);
    resetChatCompaction();
    setMessages(trimmedMessages); persistMessages(trimmedMessages);
    setInput(target.content || ""); setActiveBubbleMenuId(null);
    requestAnimationFrame(() => textareaRef.current?.focus());
  };

  const handleRegenerateMessage = async (index) => {
    if (loading || !getProviderApiKey(settings)) return;
    const target = messages[index];
    if (!target) return;
    const baseMessages = target.role === "user" ? messages.slice(0, index + 1) : messages.slice(0, index);
    resetChatCompaction();
    setActiveBubbleMenuId(null); setLoading(true); setMessages(baseMessages); persistMessages(baseMessages);
    try { await requestAssistant(baseMessages); }
    catch (err) {
      const errMsg = { role: "assistant", content: `⚠ Error: ${err.message}`, ts: Date.now(), tokenCount: estimateTokens(`⚠ Error: ${err.message}`), tokenEstimated: true };
      const finalMessages = [...baseMessages, errMsg];
      setMessages(finalMessages); persistMessages(finalMessages);
    }
    setLoading(false);
  };

  const sendMessage = async () => {
    const trimmedInput = input.trim();
    if (!trimmedInput || loading) return;
    if (!getProviderApiKey(settings)) { alert(`Add your ${getProviderLabel(settings.apiProvider)} API key in Settings → API.`); return; }
    const userMsg = { role: "user", content: trimmedInput, ts: Date.now(), tokenCount: estimateTokens(trimmedInput), tokenEstimated: true };
    const newMessages = [...messages, userMsg];
    setMessages(newMessages); persistMessages(newMessages); setInput(""); setActiveBubbleMenuId(null); setLoading(true);
    try { await requestAssistant(newMessages); }
    catch (err) {
      const errText = `⚠ Error: ${err.message}`;
      const errMsg = { role: "assistant", content: errText, ts: Date.now(), tokenCount: estimateTokens(errText), tokenEstimated: true };
      const finalMessages = [...newMessages, errMsg];
      setMessages(finalMessages); persistMessages(finalMessages);
    }
    setLoading(false);
  };

  const handleExportChat = () => {
    if (!chat?.id) return;
    const payload = {
      type: 'mirror-chat-backup',
      version: 1,
      exportedAt: Date.now(),
      chat: { ...normalizeChat(chat), projectId: null },
      messages: Array.isArray(messages) ? messages : [],
    };
    const safeTitle = (chat.title || 'chat').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') || 'chat';
    downloadJsonFile(makeDownloadName(`mirror-chat-${safeTitle}`), payload);
    setImportStatus({ type: 'success', message: 'Chat exported.' });
  };

  const handleImportChat = async (file) => {
    try {
      const data = await readJsonFile(file);
      if (data?.type !== 'mirror-chat-backup' || !data?.chat || !Array.isArray(data?.messages)) {
        throw new Error('That file is not a valid single-chat backup.');
      }
      await onImportChat?.(data);
      setImportStatus({ type: 'success', message: `Imported as a new chat: ${data.chat.title || 'Untitled Chat'}` });
    } catch (error) {
      setImportStatus({ type: 'error', message: error.message || 'Import failed.' });
    }
  };

  return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column", overflow: "hidden" }} onClick={() => setActiveBubbleMenuId(null)}>
      {showInv && <InventoryModal t={t} fonts={fonts} project={project} onClose={() => setShowInv(false)} onUpdate={(inv) => { onUpdateInventory(inv); }} />}
      {showChars && <CharacterModal t={t} fonts={fonts} project={project} onClose={() => setShowChars(false)} onUpdate={(chars) => onUpdateCharacters(chars)} onUpdateSettings={(settings) => onUpdateProjectSettings?.(settings)} />}
      {showTune && <ChatTuneModal t={t} fonts={fonts} options={chatOptions} onClose={() => setShowTune(false)} onSave={(nextOptions) => onSaveChatOptions(nextOptions)} onExportChat={handleExportChat} onImportChat={handleImportChat} importStatus={importStatus} onManageCompaction={() => { setShowTune(false); setShowCompactionChunks(true); }} />}
      {showCompactionChunks && <CompactionChunksScreen t={t} fonts={fonts} chat={chat} onBack={() => setShowCompactionChunks(false)} onSave={(nextCompaction) => onUpdateChatCompaction(nextCompaction)} />}

      <div style={{ flex: 1, overflowY: "auto", padding: "12px 8px 8px" }}>
        {messages.filter(m => m.role !== "system").length === 0 && (
          <div style={{ textAlign: "center", padding: "40px 20px" }}>
            <Icon d={ICONS.chat} size={28} stroke={t.textDim} />
            <p style={{ color: t.textDim, fontFamily: fonts.family, fontSize: 11, marginTop: 12, lineHeight: 1.6 }}>{project.name}<br />STANDBY // New chat</p>
          </div>
        )}
        {messages.map((msg, i) => (
          <ChatBubble key={`${msg.ts || i}_${msg.role}_${i}`} t={t} fonts={{ ...fonts, size: settings.fontSize || 10 }} msg={msg}
            isMenuOpen={activeBubbleMenuId === i}
            onToggleMenu={() => setActiveBubbleMenuId(activeBubbleMenuId === i ? null : i)}
            onCopy={() => handleCopyMessage(msg.content || "")}
            onEdit={msg.role === "user" ? () => handleEditMessage(i) : null}
            onRegenerate={() => handleRegenerateMessage(i)}
            bubbleMaxWidth={settings.chatBubbleMaxWidth}
            userAccentTab={!!settings.userBubbleAccentTab} />
        ))}
        {loading && !messages.some(m => m._streaming) && (
          <div style={{ display: "flex", justifyContent: "flex-start", marginBottom: 12, padding: "0 4px" }}>
            <div style={{ background: t.aiBubble, border: `1px solid ${t.border}`, borderRadius: "14px 14px 14px 4px", padding: "7px 10px", display: "flex", gap: 4, alignItems: "center" }}>
              {[0, 1, 2].map(i => (<div key={i} style={{ width: 5, height: 5, borderRadius: "50%", background: t.textMuted, animation: `pulse 1.2s ease-in-out ${i * 0.2}s infinite` }} />))}
            </div>
          </div>
        )}
        <div ref={bottomRef} />
      </div>

      {/* FIX: Input row — removed translateY transforms that were breaking button hit areas */}
      <div style={{ borderTop: `1px solid ${t.border}`, padding: "10px 12px", background: t.headerBg, display: "flex", gap: 8, alignItems: "flex-end", position: "relative", zIndex: 10 }}>
        <button
          onClick={() => setShowTune(true)}
          style={{ width: 36, height: 36, borderRadius: 10, background: t.bgCard, border: `1px solid ${t.border}`, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, position: "relative", zIndex: 11 }}
        >
          <Icon d={ICONS.tune} size={14} stroke={t.textMuted} />
        </button>
        <textarea
          ref={textareaRef}
          value={input}
          onChange={e => setInput(e.target.value)}
          onKeyDown={e => { if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) { e.preventDefault(); sendMessage(); } }}
          placeholder="Write a message..."
          rows={1}
          style={{ flex: 1, boxSizing: "border-box", display: "block", background: t.bgInput, border: `1px solid ${t.border}`, borderRadius: 10, color: t.text, fontFamily: fonts.family, fontSize: settings.fontSize || 10, padding: "7px 11px", outline: "none", resize: "none", lineHeight: 1.35, minHeight: 34, maxHeight: 118, overflowY: "hidden" }}
        />
        <button
          onClick={sendMessage}
          disabled={loading || !input.trim()}
          style={{ width: 36, height: 36, borderRadius: 10, background: loading || !input.trim() ? t.bgCard : t.accentGlow, border: `1px solid ${loading || !input.trim() ? t.border : t.accent}`, cursor: loading || !input.trim() ? "default" : "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, transition: "all 0.15s", position: "relative", zIndex: 11 }}
        >
          <Icon d={ICONS.send} size={14} stroke={loading || !input.trim() ? t.textDim : t.accent} />
        </button>
      </div>
    </div>
  );
}

// ─── SIDEBAR ──────────────────────────────────────────────────────────────────
function Sidebar({ t, fonts, open, onClose, projects, chats, activeProjectId, activeChatId, onSelectChat, onNewChat, onDeleteChat, onRenameChat, onTogglePinChat, onSetActiveProject, onOpenProjects, onOpenSettings, confirm, setConfirm }) {
  const projectChats = sortChatsForProject(chats, activeProjectId);
  const activeProject = projects.find(p => p.id === activeProjectId);
  const projectPreview = [...(activeProject ? [activeProject] : []), ...projects.filter(p => p.id !== activeProjectId)].slice(0, 4);
  const [menuChat, setMenuChat] = useState(null);
  const [renameChat, setRenameChat] = useState(null);
  const [renameValue, setRenameValue] = useState("");
  const longPressTimerRef = useRef(null);
  const longPressTriggeredRef = useRef(false);
  const pointerStartRef = useRef({ x: 0, y: 0 });

  useEffect(() => { if (!open) { setMenuChat(null); setRenameChat(null); } }, [open]);

  const clearLongPress = () => { if (longPressTimerRef.current) { clearTimeout(longPressTimerRef.current); longPressTimerRef.current = null; } };
  const openChatMenu = (chat) => { clearLongPress(); longPressTriggeredRef.current = true; setMenuChat(chat); };
  const beginLongPress = (chat, event) => {
    const x = event?.clientX ?? 0, y = event?.clientY ?? 0;
    pointerStartRef.current = { x, y }; longPressTriggeredRef.current = false; clearLongPress();
    longPressTimerRef.current = setTimeout(() => openChatMenu(chat), 475);
  };
  const cancelLongPress = () => clearLongPress();
  const moveLongPress = (event) => {
    if (!longPressTimerRef.current) return;
    const dx = Math.abs((event?.clientX ?? 0) - pointerStartRef.current.x);
    const dy = Math.abs((event?.clientY ?? 0) - pointerStartRef.current.y);
    if (dx > 10 || dy > 10) clearLongPress();
  };
  const handleRowClick = (chatId) => {
    if (longPressTriggeredRef.current) { longPressTriggeredRef.current = false; return; }
    onSelectChat(chatId); onClose();
  };
  const startRename = () => { if (!menuChat) return; setRenameChat(menuChat); setRenameValue(menuChat.title || ""); setMenuChat(null); };
  const submitRename = () => { if (!renameChat) return; onRenameChat(renameChat.id, renameValue.trim() || "Untitled"); setRenameChat(null); setRenameValue(""); };
  const togglePin = () => { if (!menuChat) return; onTogglePinChat(menuChat.id); setMenuChat(null); };
  const requestDelete = () => {
    if (!menuChat) return;
    setConfirm({ message: `Delete chat "${menuChat.title || "Untitled"}"? This cannot be undone.`, action: () => { onDeleteChat(menuChat.id); setMenuChat(null); setConfirm(null); } });
  };

  return (
    <>
      {open && <div onClick={onClose} style={{ position: "fixed", inset: 0, zIndex: 3000, background: "rgba(0,0,0,0.5)" }} />}
      <div style={{ position: "fixed", top: 0, left: 0, bottom: 0, width: 260, zIndex: 3001, background: t.sidebarBg, borderRight: `1px solid ${t.border}`, transform: open ? "translateX(0)" : "translateX(-100%)", transition: "transform 0.25s cubic-bezier(0.4,0,0.2,1)", display: "flex", flexDirection: "column" }}>
        <div style={{ padding: "16px 14px 12px", borderBottom: `1px solid ${t.border}` }}>
          <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", marginBottom: 10 }}>
            <div style={{ minWidth: 0 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 5, minWidth: 0, marginBottom: 2 }}>
                <MirrorLogo size={22} color={t.accent} />
                <span style={{ color: t.textMuted, fontFamily: fonts.family, fontSize: 12, fontWeight: 500, whiteSpace: "nowrap" }}>Mirror</span>
              </div>
              <div style={{ color: t.textDim, fontFamily: fonts.family, fontSize: 9, fontStyle: "italic", lineHeight: 1.2, paddingLeft: 27, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>and still, the world was made of light.</div>
            </div>
            <button onClick={onClose} style={{ background: "none", border: "none", cursor: "pointer", color: t.textDim, padding: 2, marginTop: 1 }}><Icon d={ICONS.close} size={14} /></button>
          </div>
          <div style={{ height: 0, borderTop: `1px solid ${t.border}`, margin: "10px -14px 12px" }} />
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
            <div style={{ color: t.textMuted, fontFamily: fonts.family, fontSize: 9, letterSpacing: "0.1em", textTransform: "uppercase" }}>Projects</div>
            <button onClick={onOpenProjects} style={{ background: "none", border: "none", padding: 0, color: t.accent, fontFamily: fonts.family, fontSize: 9, letterSpacing: "0.08em", cursor: "pointer" }}>SEE ALL</button>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {projectPreview.length === 0 && <p style={{ color: t.textDim, fontFamily: fonts.family, fontSize: 10 }}>No projects yet.</p>}
            {projectPreview.map(p => {
              const isActiveProject = p.id === activeProjectId;
              return (
                <button key={p.id} onClick={() => { onSetActiveProject(p.id); onClose(); }}
                  style={{ width: "100%", background: isActiveProject ? t.accentGlow : "transparent", border: `1px solid ${isActiveProject ? t.borderAccent : "transparent"}`, borderRadius: 8, padding: "8px 10px", cursor: "pointer", textAlign: "left", display: "flex", alignItems: "center", gap: 8, opacity: isActiveProject ? 1 : 0.64 }}>
                  <ProjectGlyph iconKey={p.iconKey} color={p.iconColor} size={15} fallbackColor={isActiveProject ? t.accent : t.textDim} title={p.name} />
                  <span style={{ color: isActiveProject ? t.text : t.textDim, fontFamily: fonts.family, fontSize: 11, fontWeight: 600, flex: 1, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.name}</span>
                  {isActiveProject && <Icon d={ICONS.check} size={11} stroke={t.accent} />}
                </button>
              );
            })}
          </div>
        </div>

        <div style={{ flex: 1, overflowY: "auto", padding: "10px 8px" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8, padding: "0 6px" }}>
            <span style={{ color: t.textDim, fontFamily: fonts.family, fontSize: 9, letterSpacing: "0.1em", textTransform: "uppercase" }}>Chats</span>
            <button onClick={onNewChat} style={{ background: "none", border: `1px solid ${t.border}`, borderRadius: 5, color: t.textMuted, padding: "3px 7px", cursor: "pointer", display: "flex", alignItems: "center", gap: 3 }}>
              <Icon d={ICONS.plus} size={10} />
              <span style={{ fontFamily: fonts.family, fontSize: 9 }}>New</span>
            </button>
          </div>
          {projectChats.length === 0 && <p style={{ color: t.textDim, fontFamily: fonts.family, fontSize: 10, padding: "4px 6px" }}>No chats yet.</p>}
          {projectChats.map(c => (
            <div key={c.id} onClick={() => handleRowClick(c.id)} onContextMenu={e => { e.preventDefault(); openChatMenu(c); }}
              onPointerDown={e => beginLongPress(c, e)} onPointerUp={cancelLongPress} onPointerLeave={cancelLongPress} onPointerCancel={cancelLongPress} onPointerMove={moveLongPress}
              style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 10px", borderRadius: 8, marginBottom: 2, background: c.id === activeChatId ? t.accentGlow : c.pinned ? t.bgCard : "transparent", border: `1px solid ${c.id === activeChatId ? t.borderAccent : c.pinned ? t.border : "transparent"}`, cursor: "pointer", userSelect: "none", WebkitUserSelect: "none", opacity: c.id === activeChatId ? 1 : 0.62 }}>
              <Icon d={ICONS.chat} size={12} stroke={c.id === activeChatId ? t.accent : c.pinned ? t.textMuted : t.textDim} />
              <span style={{ flex: 1, color: c.id === activeChatId ? t.text : t.textDim, fontFamily: fonts.family, fontSize: 11, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", textAlign: "left", display: "block" }}>{c.title || "Untitled"}</span>
              {c.pinned && <Icon d={ICONS.pin} size={11} stroke={c.id === activeChatId ? t.accent : t.textDim} />}
            </div>
          ))}
        </div>

        <div style={{ borderTop: `1px solid ${t.border}`, padding: "10px 8px" }}>
          <button onClick={onOpenSettings} style={{ width: "100%", display: "flex", alignItems: "center", gap: 8, padding: "9px 10px", background: "none", border: "none", cursor: "pointer", borderRadius: 8 }}>
            <Icon d={ICONS.settings} size={14} stroke={t.textMuted} />
            <span style={{ color: t.textMuted, fontFamily: fonts.family, fontSize: 11 }}>Settings</span>
            <span style={{ marginLeft: "auto", color: t.textDim, fontFamily: fonts.family, fontSize: 10, fontStyle: "italic" }}>github.com/ozmone/mirror-public</span>
          </button>
        </div>
      </div>

      {menuChat && (
        <div style={{ position: "fixed", inset: 0, zIndex: 3050, display: "flex", alignItems: "flex-end", background: "rgba(0,0,0,0.35)" }}>
          <div onClick={() => setMenuChat(null)} style={{ position: "absolute", inset: 0 }} />
          <div style={{ position: "relative", width: "100%", background: t.bgPanel, borderTop: `1px solid ${t.borderAccent}`, borderRadius: "16px 16px 0 0", padding: 16 }}>
            <div style={{ color: t.textMuted, fontFamily: fonts.family, fontSize: 10, letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 6 }}>Chat</div>
            <div style={{ color: t.text, fontFamily: fonts.family, fontSize: 13, fontWeight: 600, marginBottom: 12, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{menuChat.title || "Untitled"}</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
              <button onClick={startRename} style={{ width: "100%", padding: "10px 12px", background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 10, color: t.text, fontFamily: fonts.family, fontSize: 12, cursor: "pointer", textAlign: "left" }}>Rename</button>
              <button onClick={togglePin} style={{ width: "100%", padding: "10px 12px", background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 10, color: t.text, fontFamily: fonts.family, fontSize: 12, cursor: "pointer", textAlign: "left" }}>{menuChat.pinned ? "Unpin" : "Pin"}</button>
              <button onClick={requestDelete} style={{ width: "100%", padding: "10px 12px", background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 10, color: t.dangerText, fontFamily: fonts.family, fontSize: 12, cursor: "pointer", textAlign: "left" }}>Delete</button>
              <button onClick={() => setMenuChat(null)} style={{ width: "100%", padding: "10px 12px", background: "none", border: `1px solid ${t.border}`, borderRadius: 10, color: t.textMuted, fontFamily: fonts.family, fontSize: 12, cursor: "pointer" }}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {renameChat && (
        <div style={{ position: "fixed", inset: 0, zIndex: 3060, display: "flex", alignItems: "center", justifyContent: "center", background: "rgba(0,0,0,0.65)", backdropFilter: "blur(4px)" }}>
          <div style={{ width: 300, maxWidth: "calc(100vw - 32px)", background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 12, padding: 18 }}>
            <div style={{ color: t.text, fontFamily: fonts.family, fontSize: 13, fontWeight: 600, marginBottom: 10 }}>Rename Chat</div>
            <div style={{ color: t.textMuted, fontFamily: fonts.family, fontSize: 10, marginBottom: 10, lineHeight: 1.5 }}>Current: {renameChat.title || "Untitled"}</div>
            <input autoFocus value={renameValue} onChange={e => setRenameValue(e.target.value)}
              onKeyDown={e => { if (e.key === "Enter") submitRename(); if (e.key === "Escape") { setRenameChat(null); setRenameValue(""); } }}
              placeholder="Chat name..."
              style={{ width: "100%", boxSizing: "border-box", background: t.bgInput, border: `1px solid ${t.border}`, borderRadius: 8, color: t.text, fontFamily: fonts.family, fontSize: 12, padding: "10px 12px", outline: "none", marginBottom: 12 }} />
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={() => { setRenameChat(null); setRenameValue(""); }} style={{ flex: 1, padding: "9px 0", background: t.bgInput, border: `1px solid ${t.border}`, borderRadius: 8, color: t.textMuted, fontSize: 12, cursor: "pointer" }}>Cancel</button>
              <button onClick={submitRename} style={{ flex: 1, padding: "9px 0", background: t.accentGlow, border: `1px solid ${t.accent}`, borderRadius: 8, color: t.accentBright, fontSize: 12, cursor: "pointer", fontWeight: 600 }}>Save</button>
            </div>
          </div>
        </div>
      )}
    </>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [isBooting, setIsBooting] = useState(true);
  const [settings, setSettings] = useState(() => normalizeSettings(DEFAULT_SETTINGS));
  const [projects, setProjects] = useState(() => []);
  const [chats, setChats] = useState(() => []);
  const [allMessages, setAllMessages] = useState(() => ({}));
  const [activeProjectId, setActiveProjectId] = useState(() => null);
  const [activeChatId, setActiveChatId] = useState(() => null);
  const [sidebarOpen, setSidebarOpen] = useState(false);
  const [showInv, setShowInv] = useState(false);
  const [showChars, setShowChars] = useState(false);
  const [screen, setScreen] = useState("chat");
  const [confirm, setConfirm] = useState(null);
  const [showModelPicker, setShowModelPicker] = useState(false);

  const theme = buildResolvedTheme(settings);
  const fontConfig = FONTS[settings.fontFamily] || FONTS.inter;
  const fonts = { family: fontConfig.family, size: settings.fontSize || 10 };
  const activeProject = projects.find(p => p.id === activeProjectId) || projects[0];
  const activeChat = chats.find(c => c.id === activeChatId);
  const messages = allMessages[activeChatId] || [];
  const activeModelProvider = getEffectiveProjectProvider(activeProject, settings);
  const activeModel = getEffectiveProjectModel(activeProject, settings);
  const MODELS = getProviderModels(settings, activeModelProvider);

  useEffect(() => {
    const id = "rp-font";
    let el = document.getElementById(id);
    if (!el) { el = document.createElement("link"); el.id = id; el.rel = "stylesheet"; document.head.appendChild(el); }
    el.href = fontConfig.url;
  }, [fontConfig.url]);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      await initStorageCache();
      if (cancelled) return;
      const storedProjectsRaw = storage.get(STORAGE_KEYS.PROJECTS, null);
      const storedProjects = (Array.isArray(storedProjectsRaw) ? storedProjectsRaw : []).map(normalizeProject);
      const storedSettings = normalizeSettings(storage.get(STORAGE_KEYS.SETTINGS, DEFAULT_SETTINGS));
      const storedChats = (storage.get(STORAGE_KEYS.CHATS, []) || []).map(normalizeChat);
      const storedMessages = storage.get(STORAGE_KEYS.MESSAGES, {}) || {};
      const storedActiveProjectId = storage.get(STORAGE_KEYS.ACTIVE + "_proj", null) || (storedProjects[0]?.id ?? null);
      const storedActiveChatId = storage.get(STORAGE_KEYS.ACTIVE + "_chat", null);
      setSettings(storedSettings);
      setProjects(storedProjects);
      setChats(storedChats);
      setAllMessages(storedMessages);
      const resolvedActiveProjectId = storedProjects.some(p => p.id === storedActiveProjectId) ? storedActiveProjectId : (storedProjects[0]?.id ?? null);
      setActiveProjectId(resolvedActiveProjectId);
      setActiveChatId(storedActiveChatId);
      setIsBooting(false);
    })();
    return () => { cancelled = true; };
  }, []);

  useEffect(() => {
    const existing = document.getElementById("rp-anim");
    if (existing) existing.remove();
    const style = document.createElement("style");
    style.id = "rp-anim";
    style.textContent = `@keyframes pulse { 0%,80%,100%{transform:scale(0.6);opacity:0.3} 40%{transform:scale(1);opacity:1} }
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:${theme.scrollbar};border-radius:2px}
.rrp-range{appearance:none;-webkit-appearance:none;background:transparent;outline:none}
.rrp-range::-webkit-slider-runnable-track{height:6px;border-radius:999px;border:1px solid var(--range-track-border);background:linear-gradient(90deg,var(--range-accent) 0%,var(--range-accent) var(--range-progress),var(--range-track) var(--range-progress),var(--range-track) 100%)}
.rrp-range::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:16px;height:16px;border-radius:4px;border:1px solid var(--range-thumb-border);background:var(--range-thumb);box-shadow:0 0 0 3px var(--range-thumb-glow);margin-top:-6px}
.rrp-range::-moz-range-track{height:6px;border-radius:999px;border:1px solid var(--range-track-border);background:linear-gradient(90deg,var(--range-accent) 0%,var(--range-accent) var(--range-progress),var(--range-track) var(--range-progress),var(--range-track) 100%)}
.rrp-range::-moz-range-thumb{width:16px;height:16px;border-radius:4px;border:1px solid var(--range-thumb-border);background:var(--range-thumb);box-shadow:0 0 0 3px var(--range-thumb-glow)}
.rrp-range::-moz-range-progress{height:6px;border-radius:999px;background:var(--range-accent)}
.rrp-range:focus::-webkit-slider-thumb,.rrp-range:focus::-moz-range-thumb{border-color:${theme.accentBright}}
`;
    document.head.appendChild(style);
    return () => document.getElementById("rp-anim")?.remove();
  }, [theme.scrollbar, theme.accentBright]);

  useEffect(() => { if (isBooting) return; storage.set(STORAGE_KEYS.SETTINGS, settings); }, [isBooting, settings]);
  useEffect(() => { if (isBooting) return; storage.set(STORAGE_KEYS.PROJECTS, projects); }, [isBooting, projects]);
  useEffect(() => { if (isBooting) return; storage.set(STORAGE_KEYS.CHATS, chats); }, [isBooting, chats]);
  useEffect(() => { if (isBooting) return; storage.set(STORAGE_KEYS.MESSAGES, allMessages); window.__mirrorMessagesCache = allMessages; }, [isBooting, allMessages]);
  useEffect(() => { if (isBooting) return; storage.set(STORAGE_KEYS.ACTIVE + "_proj", activeProjectId); }, [isBooting, activeProjectId]);
  useEffect(() => { if (isBooting) return; storage.set(STORAGE_KEYS.ACTIVE + "_chat", activeChatId); }, [isBooting, activeChatId]);

  useEffect(() => {
    if (isBooting || !activeProjectId) return;
    const projectChats = sortChatsForProject(chats, activeProjectId);
    if (projectChats.length === 0) {
      const newChat = normalizeChat({ id: `chat_${Date.now()}`, projectId: activeProjectId, title: "New Chat", autoTitle: true, createdAt: Date.now(), updatedAt: Date.now(), options: DEFAULT_CHAT_OPTIONS });
      setChats([newChat, ...chats]); setActiveChatId(newChat.id);
    } else if (!activeChatId || !projectChats.find(c => c.id === activeChatId)) {
      setActiveChatId(projectChats[0].id);
    }
  }, [isBooting, activeProjectId, chats, activeChatId]);

  const newChat = () => {
    const count = chats.filter(c => c.projectId === activeProjectId).length + 1;
    const c = normalizeChat({ id: `chat_${Date.now()}`, projectId: activeProjectId, title: `Session ${count}`, autoTitle: true, createdAt: Date.now(), updatedAt: Date.now(), options: DEFAULT_CHAT_OPTIONS });
    setChats([c, ...chats]); setActiveChatId(c.id); setSidebarOpen(false);
  };

  const importChatBackup = async (backup) => {
    if (!backup?.chat || !Array.isArray(backup?.messages)) throw new Error('Invalid chat backup.');
    const projectChatCount = chats.filter(c => c.projectId === activeProjectId).length + 1;
    const importedChat = normalizeChat({
      ...(backup.chat || {}),
      id: `chat_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`,
      projectId: activeProjectId,
      title: backup.chat.title || `Imported Session ${projectChatCount}`,
      autoTitle: false,
      createdAt: Date.now(),
      updatedAt: Date.now(),
    });
    const importedMessages = backup.messages.map(msg => ({ ...msg }));
    setChats(prev => [importedChat, ...prev]);
    setAllMessages(prev => ({ ...prev, [importedChat.id]: importedMessages }));
    setActiveChatId(importedChat.id);
    setSidebarOpen(false);
  };

  const deleteChat = (id) => {
    const next = chats.filter(c => c.id !== id);
    setChats(next);
    const msgs = { ...allMessages }; delete msgs[id]; setAllMessages(msgs);
    if (activeChatId === id) { const remaining = sortChatsForProject(next, activeProjectId); setActiveChatId(remaining[0]?.id || null); }
  };

  const renameChat = (id, title) => setChats(prev => prev.map(c => c.id === id ? normalizeChat({ ...c, title: (title || "").trim() || "Untitled", autoTitle: false, updatedAt: Date.now() }) : c));
  const togglePinChat = (id) => setChats(prev => prev.map(c => c.id === id ? normalizeChat({ ...c, pinned: !c.pinned, updatedAt: Date.now() }) : c));
  const updateProjectField = (id, field, value) => setProjects(projects.map(p => p.id === id ? normalizeProject({ ...p, [field]: value }) : p));
  const saveChatOptions = (chatId, nextOptions) => setChats(prev => prev.map(c => c.id === chatId ? normalizeChat({ ...c, options: { ...DEFAULT_CHAT_OPTIONS, ...(c.options || {}), ...(nextOptions || {}) }, updatedAt: Date.now() }) : c));
  const saveChatCompaction = (chatId, nextCompaction) => setChats(prev => prev.map(c => c.id === chatId ? normalizeChat({ ...c, compaction: { ...DEFAULT_CHAT_COMPACTION, ...(nextCompaction || {}) }, updatedAt: Date.now() }) : c));
  const setMessages = (msgs) => {
    setAllMessages(prev => ({ ...prev, [activeChatId]: msgs }));
    if (activeChatId) {
      const firstUserText = Array.isArray(msgs) ? (msgs.find(m => m?.role === "user" && String(m?.content || "").trim())?.content || "") : "";
      setChats(prev => prev.map(c => {
        if (c.id !== activeChatId) return c;
        const next = { ...c, updatedAt: Date.now() };
        if (firstUserText && shouldAutoRenameChat(c)) {
          next.title = makeChatTitleFromText(firstUserText);
          next.autoTitle = true;
        }
        return normalizeChat(next);
      }));
    }
  };

  const shortModel = (m) => { const parts = m.split("/"); return parts[parts.length - 1]; };
  const trunc = (str, max) => str?.length > max ? str.slice(0, max) + "…" : str;

  if (isBooting) return (
    <div style={{ width: "100vw", minHeight: "100dvh", height: "100dvh", background: theme.bg, display: "flex", alignItems: "center", justifyContent: "center", padding: 24, boxSizing: "border-box", fontFamily: fonts.family }}>
      <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 12 }}>
        <MirrorLogo size={28} color={theme.accent} />
        <div style={{ color: theme.textMuted, fontSize: 12, letterSpacing: "0.08em", textTransform: "uppercase" }}>Loading IndexedDB…</div>
      </div>
    </div>
  );

  if (screen === "settings") return (
    <SettingsScreen t={theme} settings={settings} fonts={fonts} onBack={() => setScreen("chat")} onSave={s => setSettings(normalizeSettings(s))}
      projects={projects} activeProjectId={activeProjectId} activeChatId={activeChatId}
      onUpdateProjectMemory={(projectId, nextMemory) => updateProjectField(projectId, "memory", nextMemory)}
      onUpdateProjectMemorySettings={(projectId, nextSettings) => updateProjectField(projectId, "memorySettings", nextSettings)} />
  );

  if (screen === "projects") return (
    <ProjectScreen t={theme} fonts={fonts} projects={projects} setProjects={setProjects}
      activeProjectId={activeProjectId} setActiveProjectId={setActiveProjectId}
      settings={settings}
      onEnter={() => setScreen("chat")} onBack={() => setScreen("chat")} />
  );

  return (
    <div style={{ width: "100vw", maxWidth: "100vw", margin: 0, minHeight: "100dvh", height: "100dvh", background: theme.bg, display: "flex", flexDirection: "column", overflow: "hidden", position: "relative", fontFamily: fonts.family, boxSizing: "border-box" }}>
      {confirm && <ConfirmModal t={theme} message={confirm.message} onConfirm={confirm.action} onCancel={() => setConfirm(null)} danger />}
      {showInv && activeProject && <InventoryModal t={theme} fonts={fonts} project={activeProject} onClose={() => setShowInv(false)} onUpdate={(inv) => updateProjectField(activeProject.id, "inventory", inv)} />}
      {showChars && activeProject && <CharacterModal t={theme} fonts={fonts} project={activeProject} onClose={() => setShowChars(false)} onUpdate={(chars) => updateProjectField(activeProject.id, "characters", chars)} onUpdateSettings={(settings) => updateProjectField(activeProject.id, "characterSettings", settings)} />}

      <Sidebar t={theme} fonts={fonts} open={sidebarOpen} onClose={() => setSidebarOpen(false)}
        projects={projects} chats={chats} activeProjectId={activeProjectId} activeChatId={activeChatId}
        onSelectChat={id => setActiveChatId(id)} onNewChat={newChat} onDeleteChat={deleteChat}
        onRenameChat={renameChat} onTogglePinChat={togglePinChat}
        onSetActiveProject={(projectId) => setActiveProjectId(projectId)}
        onOpenProjects={() => { setSidebarOpen(false); setScreen("projects"); }}
        onOpenSettings={() => { setSidebarOpen(false); setScreen("settings"); }}
        confirm={confirm} setConfirm={setConfirm} />

      {/* FIX: Header — removed transform: translateY on menu button that was offsetting the layout */}
      <div style={{ background: theme.headerBg, borderBottom: `1px solid ${theme.border}`, padding: "0 8px", height: 56, display: "flex", alignItems: "center", gap: 6, flexShrink: 0, position: "relative", zIndex: 100 }}>
        <button onClick={() => setSidebarOpen(true)} style={{ background: "none", border: "none", cursor: "pointer", color: theme.textMuted, padding: "6px 8px", flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center" }}>
          <Icon d={ICONS.menu} size={17} />
        </button>
        <div style={{ flex: 1, minWidth: 0, overflow: "hidden", display: "flex", flexDirection: "column", justifyContent: "center", gap: 3 }}>
          <button onClick={() => setShowModelPicker(p => !p)} style={{ background: "none", border: "none", cursor: "pointer", padding: 0, textAlign: "left", display: "flex", alignItems: "center", gap: 4, minWidth: 0, height: 14 }}>
            <span style={{ color: theme.textMuted, fontFamily: "monospace", fontSize: 9, fontWeight: 600, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", letterSpacing: "0.03em" }}>
              {shortModel(activeModel || MODELS[0] || settings.model || getProviderModels(settings)[0])}
            </span>
            <span style={{ color: theme.textMuted, fontSize: 8, lineHeight: 1, flexShrink: 0 }}>▾</span>
          </button>
          <div style={{ display: "flex", alignItems: "center", gap: 5, overflow: "hidden", minWidth: 0, height: 16 }}>
            <span style={{ color: theme.text, fontFamily: fonts.family, fontSize: 11, fontWeight: 700, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{trunc(activeProject?.name || "No Project", 20)}</span>
            <span style={{ color: theme.textDim, fontFamily: fonts.family, fontSize: 10, flexShrink: 0, opacity: 0.9 }}>·</span>
            <span style={{ color: theme.textMuted, fontFamily: fonts.family, fontSize: 11, fontWeight: 500, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{trunc(activeChat?.title || "—", 20)}</span>
          </div>
        </div>

        {/* FIX: Header right icons — using new BagIcon and PersonIcon components, bigger size */}
        <div style={{ display: "flex", gap: 6, flexShrink: 0, alignItems: "center" }}>
          <button onClick={() => setShowInv(true)} style={{ background: "none", border: "none", cursor: "pointer", padding: 0, width: 32, height: 32, display: "grid", placeItems: "center", color: theme.textMuted }}>
            <BagIcon size={22} color={theme.textMuted} />
          </button>
          <button onClick={() => setShowChars(true)} style={{ background: "none", border: "none", cursor: "pointer", padding: 0, width: 32, height: 32, display: "grid", placeItems: "center", color: theme.textMuted }}>
            <PersonIcon size={22} color={theme.textMuted} />
          </button>
          <button onClick={() => setScreen("settings")} style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", background: theme.bgCard, border: `1px solid ${theme.border}`, borderRadius: 8, padding: "6px 7px", cursor: "pointer", minWidth: 30 }}>
            <Icon d={ICONS.settings} size={13} stroke={theme.textMuted} />
          </button>
        </div>

        {showModelPicker && (
          <>
            <div onClick={() => setShowModelPicker(false)} style={{ position: "fixed", inset: 0, zIndex: 4000 }} />
            <div style={{ position: "absolute", top: 54, left: 40, zIndex: 4001, background: theme.bgPanel, border: `1px solid ${theme.borderAccent}`, borderRadius: 10, overflow: "hidden", minWidth: 220, boxShadow: "0 8px 24px rgba(0,0,0,0.5)", maxHeight: "50vh", overflowY: "auto" }}>
              {MODELS.map(m => (
                  <button key={m} onClick={() => {
                    if (activeProject?.id) {
                      setProjects(prev => prev.map(p => p.id === activeProject.id ? normalizeProject({ ...p, apiProvider: activeModelProvider, model: m }) : p));
                    } else {
                      setSettings(s => normalizeSettings({ ...s, apiProvider: activeModelProvider, model: m }));
                    }
                    setShowModelPicker(false);
                  }}
                    style={{ width: "100%", padding: "7px 10px", background: activeModel === m ? theme.accentGlow : "transparent", border: "none", borderBottom: `1px solid ${theme.border}`, color: activeModel === m ? theme.accentBright : theme.textMuted, fontFamily: "monospace", fontSize: 11, cursor: "pointer", textAlign: "left", display: "flex", flexDirection: "column", gap: 1 }}>
                    <span style={{ color: activeModel === m ? theme.accentBright : theme.text, fontSize: 11 }}>{getModelDisplayName(m)}</span>
                    <span style={{ color: theme.textMuted, fontSize: 9 }}>{getProviderLabel(activeModelProvider)}</span>
                  </button>
              ))}
            </div>
          </>
        )}
      </div>

      {activeChatId && activeProject ? (
        <ChatScreen t={theme} fonts={fonts} project={activeProject} chat={activeChat} messages={messages} setMessages={setMessages}
          settings={settings} onUpdateInventory={(inv) => updateProjectField(activeProject.id, "inventory", inv)}
          onUpdateMemory={(mem) => updateProjectField(activeProject.id, "memory", mem)}
          onUpdateCharacters={(chars) => updateProjectField(activeProject.id, "characters", chars)}
          onUpdateProjectSettings={(settings) => updateProjectField(activeProject.id, "characterSettings", settings)}
          onSaveChatOptions={(nextOptions) => saveChatOptions(activeChat.id, nextOptions)}
          onUpdateChatCompaction={(nextCompaction) => saveChatCompaction(activeChat.id, nextCompaction)}
          onImportChat={importChatBackup} />
      ) : (
        <div style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", gap: 12 }}>
          <Icon d={ICONS.folder} size={32} stroke={theme.textDim} />
          <p style={{ color: theme.textMuted, fontFamily: fonts.family, fontSize: 12, textAlign: "center", lineHeight: 1.6 }}>No project or chat selected.<br />Open the menu to get started.</p>
          <button onClick={() => setScreen("projects")} style={{ padding: "9px 20px", background: theme.accentGlow, border: `1px solid ${theme.accent}`, borderRadius: 10, color: theme.accent, fontFamily: fonts.family, fontSize: 11, cursor: "pointer" }}>Open Projects</button>
        </div>
      )}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js').catch((err) => {
          console.error('Service worker registration failed:', err);
        });
      });
    }
  </script>
</body>
</html>
