          <div style={{ color: t.text, fontFamily: fonts.family, fontSize: 13, fontWeight: 800, marginBottom: 5 }}>Character Settings</div>
          <div style={{ color: t.textDim, fontFamily: fonts.family, fontSize: 11, lineHeight: 1.5, marginBottom: 12 }}>Saved per project. Class names become the Class Type dropdown for characters.</div>
          <textarea value={settingsDraft.classesText || ""} onChange={e => saveSettingsDraft({ ...settingsDraft, classesText: e.target.value })} placeholder="Strike, Titan, Mage, Phase, Prism, Hazard, Mimic" style={{ width: "100%", boxSizing: "border-box", background: t.bgInput, border: `1px solid ${t.border}`, borderRadius: 10, color: t.text, fontFamily: fonts.family, fontSize: 12, padding: "10px 12px", outline: "none", resize: "vertical", minHeight: 72, lineHeight: 1.5 }} />
        </div>

        <div style={{ background: t.bgPanel, border: `1px solid ${t.border}`, borderRadius: 14, padding: 14 }}>
          <div style={{ color: t.text, fontFamily: fonts.family, fontSize: 12, fontWeight: 800, marginBottom: 5 }}>Project Character Backup</div>
          <div style={{ color: t.textDim, fontFamily: fonts.family, fontSize: 10.5, lineHeight: 1.45, marginBottom: 10 }}>Export or import all characters for this project. Import replaces the project character list after confirmation.</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
            <button onClick={exportAllCharacters} style={{ background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 8, color: t.text, padding: "8px 10px", fontFamily: fonts.family, fontSize: 11, cursor: "pointer", fontWeight: 700 }}>Export All Characters</button>
            <button onClick={() => allCharactersImportRef.current?.click()} style={{ background: t.accentGlow, border: `1px solid ${t.borderAccent}`, borderRadius: 8, color: t.accentBright, padding: "8px 10px", fontFamily: fonts.family, fontSize: 11, cursor: "pointer", fontWeight: 700 }}>Import All Characters</button>
          </div>
          {characterImportStatus && <div style={{ marginTop: 8, color: characterImportStatus.type === "error" ? t.dangerText : t.successText, fontFamily: fonts.family, fontSize: 10.5, lineHeight: 1.4 }}>{characterImportStatus.message}</div>}
        </div>

        <label style={{ display: "flex", alignItems: "center", gap: 10, background: t.bgPanel, border: `1px solid ${settingsDraft.scaleClassBonusesToLevel ? t.borderAccent : t.border}`, borderRadius: 14, padding: "12px 14px", cursor: "pointer" }}>
          <input type="checkbox" checked={!!settingsDraft.scaleClassBonusesToLevel} onChange={e => saveSettingsDraft({ ...settingsDraft, scaleClassBonusesToLevel: e.target.checked })} />
          <div style={{ minWidth: 0 }}>
            <div style={{ color: t.text, fontFamily: fonts.family, fontSize: 12, fontWeight: 800 }}>Scale bonus stats to class level</div>
            <div style={{ color: t.textDim, fontFamily: fonts.family, fontSize: 10.5, lineHeight: 1.45 }}>When enabled, class bonuses use Primary / Secondary / Tertiary picks and ignore custom bonus numbers unless that class is exempt.</div>
          </div>
        </label>

        <label style={{ display: "flex", alignItems: "center", gap: 10, background: t.bgPanel, border: `1px solid ${settingsDraft.classLabelAsLevel ? t.borderAccent : t.border}`, borderRadius: 14, padding: "12px 14px", cursor: "pointer" }}>
          <input type="checkbox" checked={!!settingsDraft.classLabelAsLevel} onChange={e => saveSettingsDraft({ ...settingsDraft, classLabelAsLevel: e.target.checked })} />
          <div style={{ minWidth: 0 }}>
            <div style={{ color: t.text, fontFamily: fonts.family, fontSize: 12, fontWeight: 800 }}>Show class label as level</div>
            <div style={{ color: t.textDim, fontFamily: fonts.family, fontSize: 10.5, lineHeight: 1.45 }}>Purely cosmetic. Character display lines use “Level 5 Striker” instead of “Class 5 Striker”.</div>
          </div>
        </label>

        <div style={{ background: t.bgPanel, border: `1px solid ${t.border}`, borderRadius: 14, padding: 14 }}>
          <label style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            <span style={{ color: t.textMuted, fontFamily: "monospace", fontSize: 9, letterSpacing: "0.08em", textTransform: "uppercase" }}>Max Class Level</span>
            <input type="number" min="1" step="1" value={settingsDraft.maxClassLevel || 5} onChange={e => saveSettingsDraft({ ...settingsDraft, maxClassLevel: e.target.value })} style={{ width: "100%", boxSizing: "border-box", background: t.bgInput, border: `1px solid ${t.border}`, borderRadius: 10, color: t.text, fontFamily: "monospace", fontSize: 12, padding: "9px 10px", outline: "none" }} />
          </label>
        </div>

        {classes.map(className => {
          const entry = getClassEntry(className);
          const scaledLocked = !!settingsDraft.scaleClassBonusesToLevel && !entry.exemptFromScaling;
          return (
            <div key={className} style={{ background: t.bgPanel, border: `1px solid ${t.border}`, borderRadius: 14, padding: 14 }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10, marginBottom: 10 }}>
                <div style={{ color: t.text, fontFamily: fonts.family, fontSize: 12, fontWeight: 800 }}>{className} Bonus Stats</div>
                <label style={{ display: "flex", alignItems: "center", gap: 7, color: t.textMuted, fontFamily: fonts.family, fontSize: 10.5, cursor: "pointer" }}>
                  <input type="checkbox" checked={!!entry.exemptFromScaling} onChange={e => updateClassEntry(className, { exemptFromScaling: e.target.checked })} />
                  Exempt from class scaling
                </label>
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 9 }}>
                {CHARACTER_BONUS_SLOTS.map(slot => {
                  const slotData = entry.slots?.[slot.key] || {};
                  const stat = normalizeBonusStat(slotData.stat);
                  return (
                    <div key={slot.key} style={{ display: "grid", gridTemplateColumns: "82px minmax(0,1fr) 78px", gap: 8, alignItems: "end" }}>
                      <div style={{ color: t.textDim, fontFamily: "monospace", fontSize: 9, letterSpacing: "0.08em", textTransform: "uppercase", paddingBottom: 8 }}>{slot.label}</div>
                      <select value={stat} onChange={e => updateClassSlot(className, slot.key, "stat", e.target.value)} style={{ width: "100%", boxSizing: "border-box", background: t.bgInput, border: `1px solid ${t.border}`, borderRadius: 8, color: t.text, fontFamily: fonts.family, fontSize: 11, padding: "7px 8px", outline: "none" }}>
                        <option value={DISABLED_STAT_OPTION}>Disabled</option>
                        {DEFAULT_CHARACTER_STATS.map(statName => <option key={statName} value={statName}>{statName}</option>)}
                      </select>
                      <input type="number" min="-99" max="99" step="1" disabled={scaledLocked || stat === DISABLED_STAT_OPTION} value={stat === DISABLED_STAT_OPTION ? 0 : (slotData.value || 0)} onChange={e => updateClassSlot(className, slot.key, "value", e.target.value)} title={scaledLocked ? "Class scaling is enabled; custom numbers are ignored for this class." : "Custom bonus value"} style={{ width: "100%", boxSizing: "border-box", background: scaledLocked ? t.bgCard : t.bgInput, border: `1px solid ${t.border}`, borderRadius: 8, color: scaledLocked || stat === DISABLED_STAT_OPTION ? t.textDim : t.text, fontFamily: "monospace", fontSize: 11, padding: "7px 8px", outline: "none", opacity: scaledLocked || stat === DISABLED_STAT_OPTION ? 0.65 : 1 }} />
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
    );
  };

  const leftProfileKeys = ["realName", "faction", "height", "weight"];
  const rightProfileKeys = ["role", "personality"];
  const middleFullWidthKeys = ["abilities", "appearance", "gear"];
  const bottomFullWidthKeys = ["otherAliases", "backstory", "relationships", "notes", "senderId", "tags"];
  const summaryField = CHARACTER_FIELDS.find(f => f.key === "summary");
  const leftProfileFields = leftProfileKeys.map(key => CHARACTER_FIELDS.find(f => f.key === key)).filter(Boolean);
  const rightProfileFields = rightProfileKeys.map(key => CHARACTER_FIELDS.find(f => f.key === key)).filter(Boolean);
  const middleFullWidthFields = middleFullWidthKeys.map(key => CHARACTER_FIELDS.find(f => f.key === key)).filter(Boolean);
  const bottomFullWidthFields = bottomFullWidthKeys.map(key => CHARACTER_FIELDS.find(f => f.key === key)).filter(Boolean);
  const knownCharacterLayoutKeys = [...leftProfileKeys, ...rightProfileKeys, ...middleFullWidthKeys, ...bottomFullWidthKeys, "mainAlias", "alignment", "summary", "classType", "classRank", "age", "gender"];
  const extraDetailFields = CHARACTER_FIELDS.filter(field => !knownCharacterLayoutKeys.includes(field.key));

  const gallery = (
    <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(120px, 1fr))", gap: 16 }} onPointerMove={handleCharacterPointerMove} onPointerUp={handleCharacterPointerUp} onPointerCancel={clearCharacterDrag}>
      {characters.map(char => {
        const status = getCharacterStatus(char);
        const statusColor = getCharacterStatusColor(status, t);
        const badge = getCharacterGalleryClass(char);
        const isDragging = dragCharacterId === char.id;
        const isDropTarget = dragOverCharacterId === char.id;
        return (
          <button key={char.id}
            ref={node => { if (node) characterCardRefs.current[char.id] = node; }}
            draggable
            onDragStart={e => { dragCharacterIdRef.current = char.id; setDragCharacterId(char.id); e.dataTransfer.effectAllowed = "move"; e.dataTransfer.setData("text/plain", char.id); }}
            onDragOver={e => { e.preventDefault(); if (dragCharacterIdRef.current !== char.id) setDragOverCharacterId(char.id); }}
            onDrop={e => { e.preventDefault(); moveCharacterBefore(e.dataTransfer.getData("text/plain") || dragCharacterIdRef.current, char.id); clearCharacterDrag(); }}
            onDragEnd={clearCharacterDrag}
            onPointerDown={e => { if (e.pointerType === "mouse") return; clearTimeout(longPressTimerRef.current); longPressTimerRef.current = setTimeout(() => beginTouchCharacterDrag(char.id), 280); }}
            onPointerLeave={() => clearTimeout(longPressTimerRef.current)}
            onContextMenu={e => e.preventDefault()}
            onClick={(e) => { if (dragCharacterId) { e.preventDefault(); return; } openCharacter(char.id); }}
            style={{ background: isDropTarget ? t.accentGlow : "none", border: `1px solid ${isDropTarget ? t.borderAccent : "transparent"}`, borderRadius: 12, padding: 4, cursor: dragCharacterId ? "grabbing" : "grab", color: t.text, textAlign: "center", minWidth: 0, display: "flex", flexDirection: "column", alignItems: "stretch", opacity: isDragging ? 0.55 : 1, touchAction: dragCharacterId ? "none" : "manipulation", transform: isDropTarget ? "scale(1.02)" : "none", transition: "background 0.12s, border-color 0.12s, transform 0.12s, opacity 0.12s", WebkitTouchCallout: "none", WebkitUserSelect: "none", userSelect: "none" }}>
            <div style={{ position: "relative", width: "100%", maxWidth: 160, margin: "0 auto" }}>
              <CharacterPortrait char={char} t={t} fonts={fonts} compact suppressNativeImageActions />
              <div title={CHARACTER_STATUS_LABELS[status]} style={{ position: "absolute", top: 7, right: 7, width: 9, height: 9, borderRadius: "50%", background: statusColor, boxShadow: status === "unknown" ? "none" : `0 0 7px ${statusColor}`, border: `1.5px solid ${t.bg}` }} />
              {char.excluded && (
                <div style={{ position: "absolute", top: 6, left: 6, background: "rgba(0,0,0,0.72)", border: `1px solid ${t.border}`, borderRadius: 4, padding: "2px 5px", fontFamily: "monospace", fontSize: 8, color: t.textDim, letterSpacing: "0.06em", textTransform: "uppercase" }}>excluded</div>
              )}
            </div>
            <div style={{ marginTop: 8, padding: "0 2px" }}>
              <div style={{ color: t.text, fontFamily: fonts.family, fontSize: 11.5, fontWeight: 700, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", letterSpacing: "0.01em" }}>{getCharacterPrimaryName(char)}</div>
              {badge && (
                <div style={{ marginTop: 4, display: "inline-block", background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 4, padding: "2px 6px", color: t.textMuted, fontFamily: "monospace", fontSize: 8.5, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", maxWidth: "100%", letterSpacing: "0.04em" }}>{badge}</div>
              )}
            </div>
          </button>
        );
      })}
    </div>
  );

  const characterTabs = screen !== "gallery" && characters.length > 0 && (
    <div style={{ borderBottom: `1px solid ${t.border}`, padding: "8px 14px 0", flexShrink: 0, background: t.bg }}>
      <div style={{ display: "flex", gap: 6, overflowX: "auto", paddingBottom: 8, scrollbarWidth: "none" }}>
        {characters.map(char => {
          const selected = char.id === activeId;
          const status = getCharacterStatus(char);
          const statusColor = getCharacterStatusColor(status, t);
          return (
            <button key={char.id} onClick={() => { setActiveId(char.id); setScreen("detail"); setEditMode(false); }}
              style={{ flexShrink: 0, minWidth: 80, maxWidth: 160, textAlign: "left", background: selected ? t.accentGlow : "transparent", border: `1px solid ${selected ? t.borderAccent : "transparent"}`, borderRadius: 8, padding: "6px 10px", cursor: "pointer", color: selected ? t.accentBright : t.textMuted, borderBottom: selected ? `2px solid ${t.accent}` : "2px solid transparent", transition: "all 0.12s" }}>
              <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                <div style={{ width: 5, height: 5, borderRadius: "50%", background: statusColor, flexShrink: 0 }} />
                <div style={{ fontFamily: fonts.family, fontSize: 10.5, fontWeight: selected ? 800 : 500, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{getCharacterPrimaryName(char)}</div>
              </div>
            </button>
          );
        })}
        <button onClick={addCharacter} style={{ flexShrink: 0, minWidth: 60, background: "transparent", border: `1px dashed ${t.border}`, borderRadius: 8, color: t.textDim, padding: "6px 10px", fontFamily: fonts.family, fontSize: 10, cursor: "pointer", marginBottom: 0, transition: "color 0.12s, border-color 0.12s" }}>+ New</button>
      </div>
    </div>
  );

  const renderSwipePreviewCard = (char, direction) => {
    if (!char) return null;
    const status = getCharacterStatus(char);
    const statusColor = getCharacterStatusColor(status, t);
    const classLine = renderClassBonusLine(char, false);
    return (
      <div style={{ position: "absolute", inset: 0, zIndex: 0, pointerEvents: "none", opacity: 1, transform: "none", transition: "none", display: "flex", flexDirection: "column", gap: 14, padding: "0 1px", boxSizing: "border-box" }}>
        <div style={{ display: "grid", gridTemplateColumns: "minmax(0,1fr) minmax(110px,0.55fr)", gap: 14, alignItems: "end", padding: "2px 2px 4px", borderBottom: `1px solid ${t.border}` }}>
          <div style={{ minWidth: 0 }}>
            <div style={{ color: t.text, fontFamily: fonts.family, fontSize: 22, fontWeight: 850, lineHeight: 1.1, letterSpacing: "-0.02em", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", textAlign: "left" }}>{String(char.mainAlias || getCharacterPrimaryName(char)).trim() || "Untitled"}</div>
          </div>
          <div style={{ color: t.textMuted, fontFamily: "monospace", fontSize: 10, lineHeight: 1.4, letterSpacing: "0.04em", textAlign: "right", textTransform: "uppercase" }}>
            {[String(char.age || "").trim(), String(char.gender || "").trim()].filter(Boolean).join(" / ") || "—"}
          </div>
        </div>
        {summaryField && renderValue(summaryField, false, char)}
        <div style={{ display: "grid", gridTemplateColumns: "minmax(140px, 0.72fr) minmax(0, 1.55fr)", gap: 14, alignItems: "start" }}>
          <div style={{ display: "flex", flexDirection: "column", gap: 10, minWidth: 0 }}>
            <CharacterPortrait char={char} t={t} fonts={fonts} />
            <div style={{ background: t.bgPanel, border: `1px solid ${t.border}`, borderRadius: 10, padding: "9px 10px", display: "flex", alignItems: "center", gap: 8 }}>
              <div style={{ width: 8, height: 8, borderRadius: "50%", background: statusColor, boxShadow: status === "unknown" ? "none" : `0 0 7px ${statusColor}`, flexShrink: 0 }} />
              <div style={{ color: t.textMuted, fontFamily: "monospace", fontSize: 9.5, letterSpacing: "0.07em", textTransform: "uppercase" }}>{CHARACTER_STATUS_LABELS[status] || status}</div>
            </div>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 10, minWidth: 0 }}>
            {classLine}
            {renderStatBars(char, false)}
            {renderTrainingBonusList(char, false)}
          </div>
        </div>
      </div>
    );
  };

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 9000, background: t.bg, display: "flex", flexDirection: "column" }}>
      {/* Header */}
      <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "12px 16px", borderBottom: `1px solid ${t.border}`, background: t.bg, flexShrink: 0 }}>
        <button onClick={backAction} style={{ background: "none", border: "none", cursor: "pointer", color: t.textMuted, padding: "4px 6px", display: "flex", alignItems: "center", borderRadius: 6 }}><Icon d={ICONS.back} size={18} /></button>
        <div style={{ minWidth: 0, flex: 1 }}>
          <div style={{ color: t.text, fontFamily: fonts.family, fontSize: 13, fontWeight: 700, letterSpacing: "0.01em" }}>{screen === "lore" ? "Lore Files" : "Characters"}</div>
          <div style={{ color: t.textDim, fontFamily: "monospace", fontSize: 9, letterSpacing: "0.08em", textTransform: "uppercase", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{project.name || "Project"}</div>
        </div>
        {screen === "gallery" && <button onClick={() => { setScreen("lore"); setLoreEditMode(false); }} style={{ background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 8, color: t.text, padding: "6px 10px", fontFamily: fonts.family, fontSize: 11, cursor: "pointer", display: "flex", alignItems: "center", gap: 6 }}><Icon d={ICONS.file} size={12} /> Lore Files</button>}
        {screen === "gallery" && <button title="Character settings" aria-label="Character settings" onClick={() => setScreen("settings")} style={{ background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 8, color: t.text, padding: 7, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}><Icon d={ICONS.settings} size={13} /></button>}
        {screen === "gallery" && <button onClick={addCharacter} style={{ background: t.accentGlow, border: `1px solid ${t.borderAccent}`, borderRadius: 8, color: t.accentBright, padding: "6px 12px", fontFamily: fonts.family, fontSize: 11, cursor: "pointer", display: "flex", alignItems: "center", gap: 6, fontWeight: 700 }}><Icon d={ICONS.plus} size={12} /> New</button>}
        {activeChar && screen === "detail" && !editMode && <button title="Character settings" aria-label="Character settings" onClick={() => setScreen("settings")} style={{ background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 8, color: t.textMuted, padding: 7, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }}><Icon d={ICONS.settings} size={13} /></button>}
        {activeChar && screen === "detail" && !editMode && <button onClick={() => { setScreen("edit"); setEditMode(true); }} style={{ background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 8, color: t.text, padding: "6px 10px", fontFamily: fonts.family, fontSize: 11, cursor: "pointer", display: "flex", alignItems: "center", gap: 6 }}><Icon d={ICONS.edit} size={12} /> Edit</button>}
        {activeChar && (screen === "detail" || screen === "edit") && <button onClick={() => requestDeleteCharacter(activeChar.id)} style={{ background: "none", border: "none", cursor: "pointer", color: t.textDim, padding: 6, display: "flex", alignItems: "center", borderRadius: 6 }}><Icon d={ICONS.trash} size={14} /></button>}
      </div>

      {screen !== "lore" && characterTabs}
      <input ref={fileInputRef} type="file" accept="image/*" style={{ display: "none" }} onChange={e => { readImageFile(e.target.files?.[0]); e.target.value = ""; }} />
      <input ref={singleCharacterImportRef} type="file" accept="application/json,.json" style={{ display: "none" }} onChange={handleSingleCharacterImport} />
      <input ref={allCharactersImportRef} type="file" accept="application/json,.json" style={{ display: "none" }} onChange={handleAllCharactersImport} />
      <input ref={loreBannerInputRef} type="file" accept="image/*" style={{ display: "none" }} onChange={e => { readLoreBannerFile(e.target.files?.[0]); e.target.value = ""; }} />
      <input ref={allLoreImportRef} type="file" accept="application/json,.json" style={{ display: "none" }} onChange={handleAllLoreImport} />

      <div style={{ flex: 1, overflowY: "auto", padding: screen === "gallery" ? 16 : 12 }}>
        {screen === "gallery" && (
          characters.length ? gallery : (
            <div style={{ display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: "60px 16px", gap: 16 }}>
              <div style={{ width: 48, height: 48, borderRadius: 12, background: t.bgCard, border: `1px solid ${t.border}`, display: "flex", alignItems: "center", justifyContent: "center" }}>
                <PersonIcon size={24} color={t.textDim} />
              </div>
              <p style={{ color: t.textDim, fontFamily: fonts.family, fontSize: 12, textAlign: "center", margin: 0, lineHeight: 1.6 }}>No characters yet.</p>
              <button onClick={addCharacter} style={{ background: t.accentGlow, border: `1px solid ${t.borderAccent}`, borderRadius: 10, color: t.accentBright, padding: "10px 20px", fontFamily: fonts.family, fontSize: 11, cursor: "pointer", fontWeight: 700 }}>+ New Character</button>
            </div>
          )
        )}

        {screen === "settings" && renderCharacterSettings()}

        {screen === "lore" && renderLoreFiles()}

        {activeChar && screen === "detail" && !editMode && (
          <div
            onTouchStart={handleCharacterDetailTouchStart}
            onTouchMove={handleCharacterDetailTouchMove}
            onTouchEnd={handleCharacterDetailTouchEnd}
            onTouchCancel={() => { characterSwipeRef.current = null; resetCharacterSwipe(); }}
            style={{ position: "relative", overflow: "hidden", touchAction: "pan-y", overscrollBehaviorX: "contain", padding: "0 1px" }}
          >
            {characterSwipeState.offsetX < -8 && renderSwipePreviewCard(getAdjacentCharacter(1), 1)}
            {characterSwipeState.offsetX > 8 && renderSwipePreviewCard(getAdjacentCharacter(-1), -1)}
                        <div key={`active-character-card-${activeChar.id}`} style={{ position: "relative", zIndex: 2, background: t.bg, display: "flex", flexDirection: "column", gap: 14, transform: `translate3d(${characterSwipeState.offsetX}px,0,0) rotate(${characterSwipeState.offsetX / 42}deg)`, transformOrigin: characterSwipeState.offsetX < 0 ? "right center" : "left center", transition: (characterSwipeState.dragging || characterSwipeState.noTransition) ? "none" : "transform 170ms ease", willChange: "transform", borderRadius: 14, boxShadow: Math.abs(characterSwipeState.offsetX) > 8 ? `0 14px 40px rgba(0,0,0,${Math.min(0.32, Math.abs(characterSwipeState.offsetX) / 650)})` : "none" }}>
            <div style={{ display: "grid", gridTemplateColumns: "minmax(0,1fr) minmax(110px,0.55fr)", gap: 14, alignItems: "end", padding: "2px 2px 4px", borderBottom: `1px solid ${t.border}` }}>
              <div style={{ minWidth: 0 }}>
                <div style={{ color: t.text, fontFamily: fonts.family, fontSize: 22, fontWeight: 850, lineHeight: 1.1, letterSpacing: "-0.02em", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap", textAlign: "left" }}>{String(activeChar.mainAlias || getCharacterPrimaryName(activeChar)).trim() || "Untitled"}</div>
              </div>
              <div style={{ color: t.textMuted, fontFamily: "monospace", fontSize: 10, lineHeight: 1.4, letterSpacing: "0.04em", textAlign: "right", textTransform: "uppercase" }}>
                {[String(activeChar.age || "").trim(), String(activeChar.gender || "").trim()].filter(Boolean).join(" / ") || "—"}
              </div>
            </div>

            {summaryField && renderValue(summaryField, false)}

            <div style={{ display: "grid", gridTemplateColumns: "minmax(140px, 0.72fr) minmax(0, 1.55fr)", gap: 14, alignItems: "start" }}>
              <div style={{ display: "flex", flexDirection: "column", gap: 10, minWidth: 0 }}>
                <CharacterPortrait char={activeChar} t={t} fonts={fonts} onClick={() => getCharacterImage(activeChar) && setFocusedImage(getCharacterImage(activeChar))} />
                {renderValue(CHARACTER_FIELDS.find(f => f.key === "alignment"), true)}
                {leftProfileFields.map(field => renderValue(field, true))}
              </div>
              <div style={{ display: "flex", flexDirection: "column", gap: 10, minWidth: 0 }}>
                {renderClassBonusLine(activeChar, false)}
                {renderStatBars(activeChar, false)}
                {renderTrainingBonusList(activeChar, false)}
                {rightProfileFields.map(field => renderValue(field, false))}
                {extraDetailFields.map(field => renderValue(field, false))}
              </div>
            </div>

                    <span style={{ color: t.textDim, fontFamily: "monospace", fontSize: 9, letterSpacing: "0.08em", textTransform: "uppercase" }}>Status</span>
                    <select value={getCharacterStatus(activeChar)} onChange={e => updateCharacter(activeChar.id, "status", e.target.value)} style={{ background: t.bgInput, border: `1px solid ${t.border}`, borderRadius: 8, color: getCharacterStatusColor(getCharacterStatus(activeChar), t), fontFamily: "monospace", fontSize: 10.5, padding: "7px 8px", outline: "none", textTransform: "uppercase" }}>
                      {CHARACTER_STATUS_OPTIONS.map(status => <option key={status} value={status}>{CHARACTER_STATUS_LABELS[status]}</option>)}

                  <label style={{ display: "flex", alignItems: "center", gap: 8, cursor: "pointer" }}>
                    <input type="checkbox" checked={!!activeChar.excluded} onChange={e => updateCharacter(activeChar.id, "excluded", e.target.checked)} />

                </div>
                <div style={{ display: "flex", gap: 8, marginTop: 12, flexWrap: "wrap" }}>
                  <button onClick={exportActiveCharacter} style={{ background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 8, color: t.textMuted, padding: "6px 9px", fontFamily: fonts.family, fontSize: 10.5, cursor: "pointer", fontWeight: 700 }}>Export Character</button>
                  <button onClick={() => singleCharacterImportRef.current?.click()} style={{ background: t.accentGlow, border: `1px solid ${t.borderAccent}`, borderRadius: 8, color: t.accentBright, padding: "6px 9px", fontFamily: fonts.family, fontSize: 10.5, cursor: "pointer", fontWeight: 700 }}>Import / Overwrite</button>
                </div>
                {characterImportStatus && <div style={{ marginTop: 8, color: characterImportStatus.type === "error" ? t.dangerText : t.successText, fontFamily: fonts.family, fontSize: 10, lineHeight: 1.35 }}>{characterImportStatus.message}</div>}
              </div>
              <div>
                <CharacterPortrait char={activeChar} t={t} fonts={fonts} compact />
                <button onClick={triggerImagePicker} style={{ width: "100%", marginTop: 8, background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 8, color: t.textMuted, padding: "6px 8px", fontFamily: "monospace", fontSize: 9.5, cursor: "pointer", letterSpacing: "0.04em" }}>Upload</button>

                {renderEditField(CHARACTER_FIELDS.find(f => f.key === "classRank"))}
              </div>
              {renderStatBuilder()}
            </div>
            {/* Fields */}
            <div style={{ background: t.bgPanel, border: `1px solid ${t.border}`, borderRadius: 14, padding: "12px 14px" }}>
              <div style={{ display: "grid", gridTemplateColumns: "minmax(0,1fr) 52px", gap: 10, alignItems: "end", marginBottom: 12, paddingBottom: 10, borderBottom: `1px solid ${t.border}` }}>

                <div style={{ color: t.textDim, fontFamily: "monospace", fontSize: 8.5, letterSpacing: "0.12em", textTransform: "uppercase", textAlign: "center" }}>Secret</div>

              <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>

            <div style={{ position: "sticky", bottom: 0, paddingTop: 8, zIndex: 3 }}>
              <button onClick={() => { setScreen("detail"); setEditMode(false); }} style={{ width: "100%", background: t.accentGlow, border: `1px solid ${t.borderAccent}`, borderRadius: 10, color: t.accentBright, padding: "12px 14px", fontFamily: fonts.family, fontSize: 12, cursor: "pointer", fontWeight: 700, letterSpacing: "0.02em" }}>Save Character</button>
            </div>
          </div>
        )}
      </div>

      {focusedImage && (
        <div onClick={() => setFocusedImage(null)} style={{ position: "fixed", inset: 0, zIndex: 99999, background: "rgba(0,0,0,0.92)", display: "flex", alignItems: "center", justifyContent: "center", padding: 18, cursor: "zoom-out" }}>
          <img src={focusedImage} alt="Focused character portrait" style={{ maxWidth: "100%", maxHeight: "100%", objectFit: "contain", border: `1px solid ${t.borderAccent}`, background: t.bg }} />
        </div>
      )}
      {confirmDelete && <ConfirmModal t={t} message={confirmDelete.message} danger onCancel={() => setConfirmDelete(null)} onConfirm={confirmDelete.action} />}
    </div>
  );
}


// ─── IMAGE SETTINGS MODAL ─────────────────────────────────────────────────────
function ImageSettingsModal({ t, fonts, options, settings, apiProvider = "openrouter", providerKey = "", onSave, onClose }) {
  const [draft, setDraft] = useState(() => ({ ...DEFAULT_CHAT_OPTIONS, ...(options || {}) }));
  useEffect(() => { setDraft({ ...DEFAULT_CHAT_OPTIONS, ...(options || {}) }); }, [options]);
  const [liveImageModels, setLiveImageModels] = useState([]);
  const [imageModelsLoading, setImageModelsLoading] = useState(false);
  const [imageModelsError, setImageModelsError] = useState("");

  const refreshImageModels = useCallback(async () => {
    const safeProvider = normalizeApiProvider(apiProvider);
    setImageModelsLoading(true);
    setImageModelsError("");
    try {
      const key = providerKey || getProviderApiKey(settings || {}, safeProvider);
      const models = safeProvider === "openai" ? await fetchOpenAIImageModels(key) : await fetchOpenRouterImageModels(key);
      setLiveImageModels(models);
      setDraft(prev => {
        const current = normalizeImageSettings(prev);
        if (current.imageGenerationModel && models.some(model => model.id === current.imageGenerationModel)) return prev;
        return { ...prev, imageGenerationModel: chooseDefaultProviderImageModel(safeProvider, models) || current.imageGenerationModel };
      });
    } catch (error) {
      setLiveImageModels([]);
      setImageModelsError(error?.message || "Could not refresh image models. Using fallback list.");
    } finally {
      setImageModelsLoading(false);
    }
  }, [apiProvider, providerKey, settings]);

  useEffect(() => { refreshImageModels(); }, [refreshImageModels]);

  const safeImageProvider = normalizeApiProvider(apiProvider);
  const availableImageModels = getProviderImageModelOptions(safeImageProvider, liveImageModels);
  const imageSettings = normalizeImageSettings(draft);
  const qualityPercent = Math.round(imageSettings.imageJpegQuality * 100);
  const updateDraft = (key, value) => setDraft(prev => ({ ...prev, [key]: value }));
  const inputPanelStyle = { background: t.bgInput, border: `1px solid ${t.border}`, borderRadius: 9, color: t.text, fontFamily: fonts.family, fontSize: 11, padding: "8px 9px", minWidth: 120, boxSizing: "border-box" };
  const labelStyle = { color: t.text, fontFamily: fonts.family, fontSize: 11, fontWeight: 700 };
  const subStyle = { color: t.textDim, fontFamily: fonts.family, fontSize: 10, lineHeight: 1.45 };
  const buttonStyle = (active) => ({ padding: "8px 10px", borderRadius: 9, border: `1px solid ${active ? t.accent : t.border}`, background: active ? t.accentGlow : t.bgPanel, color: active ? t.accentBright : t.textMuted, fontFamily: fonts.family, fontSize: 11, cursor: "pointer", fontWeight: active ? 700 : 500 });
  const qualityPercentFill = ((imageSettings.imageJpegQuality - 0.6) / (0.95 - 0.6)) * 100;
  const sliderStyle = { background: `linear-gradient(90deg, ${t.accent} 0%, ${t.accent} ${qualityPercentFill}%, ${t.border} ${qualityPercentFill}%, ${t.border} 100%)`, accentColor: t.accent };

  return (
    <div style={{ position: "fixed", inset: 0, zIndex: 4100, background: "rgba(0,0,0,0.72)", backdropFilter: "blur(6px)", display: "flex", alignItems: "center", justifyContent: "center", padding: 12 }}>
      <div onClick={onClose} style={{ position: "absolute", inset: 0 }} />
      <div style={{ position: "relative", width: "min(520px, calc(100vw - 24px))", maxHeight: "min(620px, calc(100vh - 24px))", background: t.bgPanel, border: `1px solid ${t.borderAccent}`, borderRadius: 16, boxShadow: "0 24px 70px rgba(0,0,0,0.45)", overflow: "hidden", display: "flex", flexDirection: "column" }}>
        <div style={{ padding: "12px 14px", borderBottom: `1px solid ${t.border}`, display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 9, minWidth: 0 }}>
            <Icon d={ICONS.image} size={15} stroke={t.accent} />
            <div style={{ minWidth: 0 }}>
              <div style={{ color: t.text, fontFamily: fonts.family, fontSize: 13, fontWeight: 800 }}>Image Settings</div>
              <div style={subStyle}>Controls image attachments and image requests. Image requests use your current API provider/key, refresh image-capable models when available, and return a downloadable image only.</div>
            </div>
          </div>
          <button type="button" onClick={onClose} style={{ width: 30, height: 30, borderRadius: 9, border: `1px solid ${t.border}`, background: t.bgCard, color: t.textMuted, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}><Icon d={ICONS.close} size={13} /></button>
        </div>

        <div style={{ padding: 14, overflowY: "auto", display: "flex", flexDirection: "column", gap: 12 }}>
          <div style={{ background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 12, padding: 12, display: "flex", flexDirection: "column", gap: 9 }}>
            <span style={labelStyle}>Image requests</span>
            <span style={subStyle}>Uses your current API provider/key. Auto-route refreshes the provider's image-capable model list and picks the best ChatGPT/OpenAI image model it can find.</span>
            <button type="button" onClick={() => updateDraft("imageAutoRoute", !imageSettings.imageAutoRoute)} style={{ ...buttonStyle(imageSettings.imageAutoRoute), justifyContent: "space-between", display: "flex", alignItems: "center" }}>
              <span>{imageSettings.imageAutoRoute ? "Auto-route to image model" : "Use selected image model"}</span>
              <span style={{ fontFamily: "monospace", fontSize: 10 }}>{imageSettings.imageAutoRoute ? "ON" : "OFF"}</span>
            </button>
            <div style={{ display: "flex", gap: 8, alignItems: "flex-end" }}>
              <label style={{ display: "flex", flexDirection: "column", gap: 5, flex: 1, minWidth: 0 }}>
                <span style={labelStyle}>Image model</span>
                <select value={imageSettings.imageGenerationModel || chooseDefaultProviderImageModel(safeImageProvider, availableImageModels)} onChange={e => updateDraft("imageGenerationModel", e.target.value)} disabled={imageSettings.imageAutoRoute} style={{ ...inputPanelStyle, width: "100%", opacity: imageSettings.imageAutoRoute ? 0.65 : 1 }}>
                  {availableImageModels.map(model => <option key={model.id} value={model.id}>{model.label} — {model.id}</option>)}
                </select>
              </label>
              <button type="button" onClick={refreshImageModels} disabled={imageModelsLoading} style={{ ...buttonStyle(false), height: 34, whiteSpace: "nowrap", opacity: imageModelsLoading ? 0.65 : 1 }}>{imageModelsLoading ? "Refreshing..." : "Refresh"}</button>
            </div>
            <span style={subStyle}>{liveImageModels.length ? `${liveImageModels.length} live ${getProviderLabel(safeImageProvider)} image models loaded.` : `Using ${getProviderLabel(safeImageProvider)} fallback image model list until refresh succeeds.`}</span>
            {imageModelsError && <span style={{ ...subStyle, color: t.dangerText, fontWeight: 800 }}>{imageModelsError}</span>}
            {imageSettings.imageAutoRoute && <span style={subStyle}>Auto-route will pick from the refreshed image-capable model list at request time. Current local pick: {getProviderImageModelLabel(safeImageProvider, chooseDefaultProviderImageModel(safeImageProvider, availableImageModels), availableImageModels)} ({chooseDefaultProviderImageModel(safeImageProvider, availableImageModels) || "none"}).</span>}
          </div>

          <div style={{ background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 12, padding: 12, display: "flex", flexDirection: "column", gap: 8 }}>
            <span style={labelStyle}>Image input detail</span>
            <span style={subStyle}>Low is cheapest and best for most chat use. High can help when the model needs tiny text or visual details.</span>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 7 }}>
              {IMAGE_INPUT_DETAIL_OPTIONS.map(value => (
                <button key={value} type="button" onClick={() => updateDraft("imageInputDetail", value)} style={buttonStyle(imageSettings.imageInputDetail === value)}>{value[0].toUpperCase() + value.slice(1)}</button>
              ))}
            </div>
          </div>

          <div style={{ background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 12, padding: 12, display: "flex", flexDirection: "column", gap: 8 }}>
            <span style={labelStyle}>Max image side</span>
            <span style={subStyle}>Large images are resized before storage and sending. This keeps backups lighter and avoids oversized API requests.</span>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 7 }}>
              {IMAGE_MAX_SIDE_OPTIONS.map(value => (
                <button key={value} type="button" onClick={() => updateDraft("imageMaxSide", value)} style={buttonStyle(imageSettings.imageMaxSide === value)}>{value}px</button>
              ))}
            </div>
          </div>

          <div style={{ background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 12, padding: 12, display: "flex", flexDirection: "column", gap: 8 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10 }}>
              <span style={labelStyle}>JPEG quality</span>
              <div style={inputPanelStyle}>{qualityPercent}%</div>
            </div>
            <span style={subStyle}>Used when the app compresses JPG/WEBP images. PNGs stay PNG unless resized by the browser canvas.</span>
            <input className="rrp-range" type="range" min={60} max={95} step={1} value={qualityPercent} onChange={e => updateDraft("imageJpegQuality", Math.max(0.6, Math.min(0.95, Number(e.target.value) / 100)))} style={sliderStyle} />
          </div>

          <div style={{ color: t.textMuted, fontFamily: fonts.family, fontSize: 10, lineHeight: 1.5, background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 12, padding: 10 }}>
            Max upload size remains 20 MB. GIFs are kept as-is so animation is not destroyed.
          </div>
        </div>

        <div style={{ padding: 12, borderTop: `1px solid ${t.border}`, display: "flex", gap: 8 }}>
          <button type="button" onClick={() => setDraft(prev => ({ ...prev, imageInputDetail: DEFAULT_CHAT_OPTIONS.imageInputDetail, imageMaxSide: DEFAULT_CHAT_OPTIONS.imageMaxSide, imageJpegQuality: DEFAULT_CHAT_OPTIONS.imageJpegQuality, imageAutoRoute: DEFAULT_CHAT_OPTIONS.imageAutoRoute, imageGenerationModel: DEFAULT_CHAT_OPTIONS.imageGenerationModel }))} style={{ flex: 1, padding: "10px 12px", background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 10, color: t.textMuted, fontFamily: fonts.family, fontSize: 12, cursor: "pointer" }}>Reset</button>
          <button type="button" onClick={() => { onSave({ ...draft, ...normalizeImageSettings(draft) }); onClose(); }} style={{ flex: 2, padding: "10px 12px", background: t.accent, border: `1px solid ${t.accent}`, borderRadius: 10, color: t.headerBg, fontFamily: fonts.family, fontSize: 13, fontWeight: 700, cursor: "pointer" }}>Save</button>
        </div>
      </div>
    </div>
  );
}

// ─── CHAT TUNE MODAL ──────────────────────────────────────────────────────────
function ChatTuneModal({ t, fonts, options, onSave, onClose, onExportChat, onImportChat, importStatus, onManageCompaction }) {
  const [draft, setDraft] = useState(() => ({ ...DEFAULT_CHAT_OPTIONS, ...(options || {}) }));
  const [confirmReset, setConfirmReset] = useState(false);
  const fileInputRef = useRef(null);

  useEffect(() => { setDraft({ ...DEFAULT_CHAT_OPTIONS, ...(options || {}) }); }, [options]);

  const rows = [
    ["includeInventoryInPrompt", "Include inventory in prompt"],
    ["includeCharactersInPrompt", "Include ALL characters in prompt"],
    ["includeProjectFilesInPrompt", "Include project files in prompt"],
    ["allowCharacterLookup", "Allow character lookup (on-demand)"],
    ["allowProjectFileLookup", "Allow project file lookup (on-demand)"],
    ["allowMemoryLookup", "Allow memory lookup (on-demand)"],
  ];

  const updateDraft = (key, value) => setDraft(prev => ({ ...prev, [key]: value }));
  const resetDraft = () => setDraft({ ...DEFAULT_CHAT_OPTIONS });
  const triggerImportPicker = () => fileInputRef.current?.click();
  const handleImportChange = async (event) => {
    const file = event.target.files?.[0];
    if (!file) return;
    await onImportChat?.(file);
    event.target.value = "";
  };
  const contextIndex = getClosestContextOptionIndex(draft.maxContextMessages);
  const contextPercent = CONTEXT_MESSAGE_COUNT_OPTIONS.length > 1 ? (contextIndex / (CONTEXT_MESSAGE_COUNT_OPTIONS.length - 1)) * 100 : 0;
  const tempValue = clampNumber(draft.temperature ?? DEFAULT_CHAT_OPTIONS.temperature, 0, 2, DEFAULT_CHAT_OPTIONS.temperature);
  const topPValue = clampNumber(draft.topP ?? DEFAULT_CHAT_OPTIONS.topP, 0, 1, DEFAULT_CHAT_OPTIONS.topP);
  const compactionIndex = getClosestSummaryTokenOptionIndex(draft.compactionMaxTokens ?? DEFAULT_CHAT_OPTIONS.compactionMaxTokens);
  const compactionTokenValue = getSummaryTokenOptionByIndex(compactionIndex);
  const compactionPercent = SUMMARY_TOKEN_OPTIONS.length > 1 ? (compactionIndex / (SUMMARY_TOKEN_OPTIONS.length - 1)) * 100 : 0;
  const batchIndex = getClosestNumberOptionIndex(COMPACTION_BATCH_OPTIONS, draft.compactionBatchMessages, DEFAULT_CHAT_OPTIONS.compactionBatchMessages);
  const batchValue = getNumberOptionByIndex(COMPACTION_BATCH_OPTIONS, batchIndex, DEFAULT_CHAT_OPTIONS.compactionBatchMessages);
  const batchPercent = COMPACTION_BATCH_OPTIONS.length > 1 ? (batchIndex / (COMPACTION_BATCH_OPTIONS.length - 1)) * 100 : 0;
  const chunkLimitIndex = getClosestNumberOptionIndex(COMPACTION_CHUNK_LIMIT_OPTIONS, draft.compactionMaxChunks, DEFAULT_CHAT_OPTIONS.compactionMaxChunks);
  const chunkLimitValue = getNumberOptionByIndex(COMPACTION_CHUNK_LIMIT_OPTIONS, chunkLimitIndex, DEFAULT_CHAT_OPTIONS.compactionMaxChunks);
  const chunkLimitPercent = COMPACTION_CHUNK_LIMIT_OPTIONS.length > 1 ? (chunkLimitIndex / (COMPACTION_CHUNK_LIMIT_OPTIONS.length - 1)) * 100 : 0;
  const tempPercent = (tempValue / 2) * 100;
  const topPPercent = topPValue * 100;

  const sliderStyle = (percent, warning = false) => ({
    width: "100%", background: "transparent", appearance: "none", WebkitAppearance: "none",
    cursor: "pointer", height: 18, touchAction: "pan-y", '--range-progress': `${percent}%`,
    '--range-accent': warning ? t.dangerText : t.accent, '--range-track': t.bgInput, '--range-track-border': warning ? t.dangerText : t.border,
    '--range-thumb': t.bgPanel, '--range-thumb-border': warning ? t.dangerText : t.borderAccent, '--range-thumb-glow': warning ? "rgba(255,80,80,0.18)" : t.accentGlow,
  });
  const tempWarning = tempValue > 1.0;
  const topPWarning = topPValue > 0.5;
  const highValueWarningText = "Warning: a high value may generate more tokens than you intended; use this setting at your own discretion.";
  const warningTextStyle = { color: t.dangerText, fontFamily: fonts.family, fontSize: 10, fontWeight: 800, lineHeight: 1.35 };

  const inputPanelStyle = { minWidth: 76, padding: "7px 9px", borderRadius: 9, border: `1px solid ${t.border}`, background: t.bgInput, color: t.text, fontFamily: fonts.family, fontSize: 11, textAlign: "center", boxSizing: "border-box" };
  const sectionStyle = { background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 14, padding: 10, display: "flex", flexDirection: "column", gap: 10 };
  const labelStyle = { color: t.text, fontFamily: fonts.family, fontSize: 11, fontWeight: 600 };
  const inlineInfoStyle = { color: t.textDim, fontFamily: fonts.family, fontSize: 9.5, lineHeight: 1.2 };
  const labelRowStyle = { display: "flex", alignItems: "baseline", gap: 8, flexWrap: "wrap", minWidth: 0 };

  return (
    <>
      {confirmReset && (
        <ConfirmModal t={t} message="Reset this chat's tune settings to default?" onConfirm={() => { resetDraft(); setConfirmReset(false); }} onCancel={() => setConfirmReset(false)} />
      )}
      <div onClick={onClose} style={{ position: "fixed", inset: 0, zIndex: 9100, display: "flex", alignItems: "flex-end", background: "rgba(0,0,0,0.55)" }}>
        <div onClick={e => e.stopPropagation()} style={{ width: "100%", maxHeight: "92vh", background: t.bgPanel, borderTop: `1px solid ${t.borderAccent}`, borderRadius: "16px 16px 0 0", display: "flex", flexDirection: "column", overflow: "hidden" }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "12px 14px 10px", borderBottom: `1px solid ${t.border}` }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <Icon d={ICONS.tune} size={15} stroke={t.accent} />
              <span style={{ color: t.text, fontFamily: fonts.family, fontSize: 13, fontWeight: 600 }}>Chat Settings</span>
            </div>
            <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap", justifyContent: "flex-end" }}>
              <button type="button" onClick={onExportChat} style={{ background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 8, cursor: "pointer", color: t.accent, padding: "6px 8px", fontFamily: fonts.family, fontSize: 10.5, fontWeight: 700 }}>Export</button>
              <button type="button" onClick={triggerImportPicker} style={{ background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 8, cursor: "pointer", color: t.accent, padding: "6px 8px", fontFamily: fonts.family, fontSize: 10.5, fontWeight: 700 }}>Import</button>
              <button type="button" onClick={() => setConfirmReset(true)} style={{ background: "none", border: "none", cursor: "pointer", color: t.accent, padding: "6px 8px", fontFamily: fonts.family, fontSize: 11, fontWeight: 700 }}>Reset</button>
              <button onClick={onClose} style={{ background: "none", border: "none", cursor: "pointer", color: t.textMuted, padding: 2 }}><Icon d={ICONS.close} size={15} /></button>
            </div>
          </div>

          <input ref={fileInputRef} type="file" accept="application/json,.json" onChange={handleImportChange} style={{ display: "none" }} />
          {importStatus ? <div style={{ margin: "8px 12px 0", background: t.bgCard, border: `1px solid ${importStatus.type === "error" ? t.dangerText : t.border}`, borderRadius: 10, padding: "8px 10px", color: importStatus.type === "error" ? t.dangerText : t.textMuted, fontFamily: fonts.family, fontSize: 10, lineHeight: 1.4 }}>{importStatus.message}</div> : null}

          <div style={{ overflowY: "auto", padding: "10px 12px", display: "flex", flexDirection: "column", gap: 10, WebkitOverflowScrolling: "touch", overscrollBehavior: "contain" }}>
            <div style={sectionStyle}>
              <span style={{ color: t.text, fontFamily: fonts.family, fontSize: 11, fontWeight: 700 }}>Input Settings</span>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(210px, 1fr))", gap: 6 }}>
                {rows.map(([key, label]) => (
                  <label key={key} style={{ display: "flex", alignItems: "center", gap: 7, background: t.bgPanel, border: `1px solid ${t.border}`, borderRadius: 9, padding: "7px 9px", cursor: "pointer", minHeight: 30, boxSizing: "border-box" }}>
                    <input type="checkbox" checked={!!draft[key]} onChange={e => updateDraft(key, e.target.checked)} style={{ width: 14, height: 14, margin: 0, flexShrink: 0 }} />
                    <span style={{ color: t.text, fontFamily: fonts.family, fontSize: 11, lineHeight: 1.15 }}>{label}</span>
                  </label>
                ))}
              </div>
            </div>

            <div style={sectionStyle}>
              <span style={{ color: t.text, fontFamily: fonts.family, fontSize: 11, fontWeight: 700 }}>Model Settings</span>

              <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12 }}>
                  <div style={labelRowStyle}>
                    <span style={labelStyle}>Live Message Count</span>
                    <span style={inlineInfoStyle}>compaction starts after this many recent messages; older messages become summary</span>
                  </div>
                  <div style={inputPanelStyle}>{formatContextOptionLabel(draft.maxContextMessages)}</div>
                </div>
                <input className="rrp-range" type="range" min={0} max={CONTEXT_MESSAGE_COUNT_OPTIONS.length - 1} step={1} value={contextIndex} onChange={e => updateDraft("maxContextMessages", getContextOptionByIndex(e.target.value).value)} style={sliderStyle(contextPercent)} />
              </div>

              <div style={{ display: "flex", flexDirection: "column", gap: 10, background: t.bgPanel, border: `1px solid ${t.border}`, borderRadius: 12, padding: 12 }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12 }}>
                  <div style={labelRowStyle}>
                    <span style={labelStyle}>Compaction</span>
                    <span style={inlineInfoStyle}>hidden rolling summary for older messages</span>
                  </div>
                  <label style={{ position: "relative", width: 48, height: 28, display: "inline-flex", alignItems: "center", cursor: "pointer", flexShrink: 0 }}>
                    <input type="checkbox" checked={!!draft.compactionEnabled} onChange={e => updateDraft("compactionEnabled", e.target.checked)} style={{ position: "absolute", opacity: 0, pointerEvents: "none" }} />
                    <span style={{ position: "absolute", inset: 0, borderRadius: 999, background: draft.compactionEnabled ? t.accent : t.border, transition: "background 0.15s" }} />
                    <span style={{ position: "relative", marginLeft: draft.compactionEnabled ? 22 : 2, width: 24, height: 24, borderRadius: "50%", background: "#fff", transition: "margin 0.15s" }} />
                  </label>
                </div>

                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12 }}>
                  <div style={labelRowStyle}>
                    <span style={labelStyle}>Summary Max Tokens</span>
                    <span style={inlineInfoStyle}>maximum size of the hidden rolling summary</span>
                  </div>
                  <div style={{ ...inputPanelStyle, width: 120, minWidth: 120 }}>{compactionTokenValue.toLocaleString()}</div>
                </div>
                <input
                  className="rrp-range"
                  type="range"
                  min={0}
                  max={SUMMARY_TOKEN_OPTIONS.length - 1}
                  step={1}
                  value={compactionIndex}
                  onChange={e => updateDraft("compactionMaxTokens", getSummaryTokenOptionByIndex(e.target.value))}
                  style={sliderStyle(compactionPercent)}
                />

                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12 }}>
                  <div style={labelRowStyle}>
                    <span style={labelStyle}>Chunk Batch Size</span>
                    <span style={inlineInfoStyle}>how many newly-old messages become one chunk</span>
                  </div>
                  <div style={{ ...inputPanelStyle, width: 96, minWidth: 96 }}>{batchValue}</div>
                </div>
                <input className="rrp-range" type="range" min={0} max={COMPACTION_BATCH_OPTIONS.length - 1} step={1} value={batchIndex} onChange={e => updateDraft("compactionBatchMessages", getNumberOptionByIndex(COMPACTION_BATCH_OPTIONS, e.target.value, DEFAULT_CHAT_OPTIONS.compactionBatchMessages))} style={sliderStyle(batchPercent)} />

                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12 }}>
                  <div style={labelRowStyle}>
                    <span style={labelStyle}>Max Summary Chunks</span>
                    <span style={inlineInfoStyle}>chunks roll into 1 when this limit is reached</span>
                  </div>
                  <div style={{ ...inputPanelStyle, width: 96, minWidth: 96 }}>{chunkLimitValue}</div>
                </div>
                <input className="rrp-range" type="range" min={0} max={COMPACTION_CHUNK_LIMIT_OPTIONS.length - 1} step={1} value={chunkLimitIndex} onChange={e => updateDraft("compactionMaxChunks", getNumberOptionByIndex(COMPACTION_CHUNK_LIMIT_OPTIONS, e.target.value, DEFAULT_CHAT_OPTIONS.compactionMaxChunks))} style={sliderStyle(chunkLimitPercent)} />

                <span style={inlineInfoStyle}>
                  {draft.maxContextMessages == null
                    ? "Compaction is idle while Max Message Count is Unlimited."
                    : `When enabled, once the chat passes ${formatContextOptionLabel(draft.maxContextMessages)} live messages, older turns are compacted into ${batchValue}-message chunks. At ${chunkLimitValue} stored chunks, they roll into one master chunk and free the remaining slots. Summary budget: ${compactionTokenValue.toLocaleString()} tokens.`}
                </span>
              </div>

              <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12 }}>
                  <div style={labelRowStyle}>
                    <span style={labelStyle}>Temperature</span>
                    <span style={inlineInfoStyle}>lower = steadier / higher = more improvisation</span>
                  </div>
                  <div style={inputPanelStyle}>{tempValue.toFixed(2)}</div>
                </div>
                <input className="rrp-range" type="range" min={0} max={2} step={0.01} value={tempValue} onChange={e => updateDraft("temperature", clampNumber(e.target.value, 0, 2, DEFAULT_CHAT_OPTIONS.temperature))} style={sliderStyle(tempPercent, tempWarning)} />
                {tempWarning && <div style={warningTextStyle}>{highValueWarningText}</div>}
              </div>

              <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12 }}>
                  <div style={labelRowStyle}>
                    <span style={labelStyle}>Top P</span>
                    <span style={inlineInfoStyle}>lower = narrower token pool / higher = more wildcards</span>
                  </div>
                  <div style={inputPanelStyle}>{topPValue.toFixed(2)}</div>
                </div>
                <input className="rrp-range" type="range" min={0} max={1} step={0.01} value={topPValue} onChange={e => updateDraft("topP", clampNumber(e.target.value, 0, 1, DEFAULT_CHAT_OPTIONS.topP))} style={sliderStyle(topPPercent, topPWarning)} />
                {topPWarning && <div style={warningTextStyle}>{highValueWarningText}</div>}
              </div>

              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12 }}>
                <div style={labelRowStyle}><span style={labelStyle}>Max Output Tokens</span></div>
                <select value={draft.maxOutputTokens ?? ""} onChange={e => updateDraft("maxOutputTokens", e.target.value ? Number(e.target.value) : null)} style={{ ...inputPanelStyle, textAlign: "left", minWidth: 150, cursor: "pointer" }}>
                  <option value="">Not set</option>
                  {MAX_OUTPUT_TOKEN_OPTIONS.map(value => <option key={value} value={value}>{value}</option>)}
                </select>
              </div>

              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12 }}>
                <div style={labelRowStyle}>
                  <span style={labelStyle}>Stream output</span>
                  <span style={inlineInfoStyle}>Show the reply as it arrives.</span>
                </div>
                <label style={{ position: "relative", width: 48, height: 28, display: "inline-flex", alignItems: "center", cursor: "pointer", flexShrink: 0 }}>
                  <input type="checkbox" checked={!!draft.streamOutput} onChange={e => updateDraft("streamOutput", e.target.checked)} style={{ position: "absolute", opacity: 0, pointerEvents: "none" }} />
                  <span style={{ position: "absolute", inset: 0, borderRadius: 999, background: draft.streamOutput ? t.accent : t.border, transition: "background 0.15s" }} />
                  <span style={{ position: "relative", marginLeft: draft.streamOutput ? 22 : 2, width: 24, height: 24, borderRadius: "50%", background: "#fff", transition: "margin 0.15s" }} />
                </label>
              </div>
            </div>
          </div>

          <div style={{ padding: "0 12px 10px", display: "flex", flexDirection: "column", gap: 8 }}>
            <div style={{ background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 12, padding: 10, display: "flex", flexDirection: "column", gap: 8 }}>
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", gap: 12, flexWrap: "wrap" }}>
                <div style={{ display: "flex", flexDirection: "column", gap: 3, minWidth: 0 }}>
                  <span style={{ color: t.text, fontFamily: fonts.family, fontSize: 12, fontWeight: 700 }}>Compaction Chunks</span>
                  <span style={{ color: t.textDim, fontFamily: fonts.family, fontSize: 10, lineHeight: 1.4 }}>View and edit the exact stored hidden summary chunks for this chat.</span>
                </div>
                <button type="button" onClick={() => { onSave(draft); onManageCompaction?.(); }} style={{ width: "100%", padding: "10px 12px", background: t.bgPanel, border: `1px solid ${t.borderAccent}`, borderRadius: 10, color: t.accent, fontFamily: fonts.family, fontSize: 12, fontWeight: 600, cursor: "pointer" }}>Open Stored Chunks</button>
              </div>
            </div>
          </div>

          <div style={{ padding: "10px 12px 12px", borderTop: `1px solid ${t.border}` }}>
            <button type="button" onClick={() => { onSave(draft); onClose(); }} style={{ width: "100%", padding: "10px 12px", background: t.accent, border: `1px solid ${t.accent}`, borderRadius: 10, color: t.headerBg, fontFamily: fonts.family, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>Save</button>
          </div>
        </div>
      </div>
    </>
  );
}

// ─── SETTINGS SCREEN ──────────────────────────────────────────────────────────
function SectionLabel({ t, fonts, label }) {
  return <p style={{ color: t.textMuted, fontFamily: fonts.family, fontSize: 10, letterSpacing: "0.08em", textTransform: "uppercase", marginBottom: 8 }}>{label}</p>;
}

function DangerButton({ t, fonts, label, sub, onClick }) {
  return (
    <button onClick={onClick} style={{ width: "100%", padding: "12px 14px", background: t.bgCard, border: `1px solid ${t.border}`, borderRadius: 10, marginBottom: 10, cursor: "pointer", textAlign: "left", display: "flex", flexDirection: "column", gap: 2 }}>
      <span style={{ color: t.dangerText, fontFamily: fonts.family, fontSize: 12, fontWeight: 600 }}>{label}</span>
      <span style={{ color: t.textMuted, fontFamily: fonts.family, fontSize: 10 }}>{sub}</span>
    </button>
  );
}

function SettingsScreen({ t, settings, fonts, onBack, onSave, projects, chats = [], allMessages = {}, activeProjectId, activeChatId, onUpdateProjectMemory, onUpdateProjectMemorySettings }) {
  const [tab, setTab] = useState("theme");
  const [draft, setDraft] = useState(() => normalizeSettings(settings));
  const [showKey, setShowKey] = useState(false);
  const [confirm, setConfirm] = useState(null);
  const [newModel, setNewModel] = useState("");
  const [modelSearch, setModelSearch] = useState("");
  const [providerModelResults, setProviderModelResults] = useState([]);
  const [providerFetchStatus, setProviderFetchStatus] = useState(null);
  const [restoreMode, setRestoreMode] = useState("add");
  const [restoreStatus, setRestoreStatus] = useState(null);
  const [backupStatus, setBackupStatus] = useState(null);
  const [contextExportProjectId, setContextExportProjectId] = useState(activeProjectId || projects[0]?.id || "");
  const [contextExportStatus, setContextExportStatus] = useState(null);
  const restoreInputRef = useRef(null);
  const activeProject = projects.find(p => p.id === activeProjectId);
  const activeProvider = normalizeApiProvider(draft.apiProvider);
  const activeProviderKey = getProviderApiKey(draft, activeProvider);
  const modelList = getProviderModels(draft, activeProvider);
  const modelField = activeProvider === "openai" ? "openaiModels" : "openrouterModels";
  const filteredModelList = modelList.filter(m => !modelSearch.trim() || m.toLowerCase().includes(modelSearch.trim().toLowerCase()));
  const filteredProviderResults = providerModelResults.filter(item => {
    const id = String(item?.id || "");
    return id && !modelList.includes(id) && (!modelSearch.trim() || id.toLowerCase().includes(modelSearch.trim().toLowerCase()));
  }).slice(0, 80);

  useEffect(() => { setDraft(normalizeSettings(settings)); }, [settings]);
  useEffect(() => { setProviderModelResults([]); setProviderFetchStatus(null); setModelSearch(""); }, [draft.apiProvider]);
  useEffect(() => {
    if (!projects.length) { setContextExportProjectId(""); return; }
    if (!projects.some(p => p.id === contextExportProjectId)) setContextExportProjectId(activeProjectId || projects[0]?.id || "");
  }, [projects, activeProjectId, contextExportProjectId]);

  const tabs = ["theme", "api", "memory", "data"];
  const previewFont = FONTS[draft.fontFamily] || FONTS.inter;
  const previewTheme = buildResolvedTheme(draft);

  const clearChats = () => { storage.remove(STORAGE_KEYS.CHATS); storage.remove(STORAGE_KEYS.MESSAGES); setConfirm(null); onSave(draft); onBack(); };
  const clearAll = async () => { await storage.clear(); setConfirm(null); window.location.reload(); };

  const backupAllData = () => {
    const payload = {
      type: "mirror-full-backup",
      version: 2,
      appVersion: APP_VERSION,
      exportedAt: Date.now(),
      storageKeys: { ...STORAGE_KEYS },
      data: {
        projects: storage.get(STORAGE_KEYS.PROJECTS, []),
        chats: storage.get(STORAGE_KEYS.CHATS, []),
        messages: storage.get(STORAGE_KEYS.MESSAGES, {}),
        settings: normalizeSettings(draft),
        active: {
          projectId: activeProjectId || storage.get(STORAGE_KEYS.ACTIVE + "_proj", null),
          chatId: activeChatId || storage.get(STORAGE_KEYS.ACTIVE + "_chat", null),
          legacy: storage.get(STORAGE_KEYS.ACTIVE, null),
        },
      },
    };
    const filename = makeDownloadName("mirror-full-backup");
    downloadJsonFile(filename, payload);
    setBackupStatus({
      type: "ok",
      message: `Backup created: ${filename}. Your browser saved it to your device's Downloads location, or wherever this browser is set to save downloads.`
    });
  };

  const buildChatContextExport = (projectId = contextExportProjectId) => {
    const targetProject = normalizeProject(projects.find(p => p.id === projectId) || activeProject || projects[0] || {});
    if (!targetProject?.id) throw new Error("Choose a project to export first.");
    const projectChats = sortChatsForProject(chats, targetProject.id);
    const activeMemories = normalizeProjectMemory(targetProject.memory || [], targetProject.id).filter(m => m.status === "active");
    const activeCharacters = (targetProject.characters || []).filter(c => !c.excluded);
    const loreFiles = normalizeProjectLoreFiles(targetProject.loreFiles || [], targetProject.id);
    const activeFiles = (targetProject.files || []).filter(f => f.active !== false && String(f.text || "").trim());
    const inv = targetProject.inventory || { credits: 0, items: [] };
    const inventoryLines = [
      `Credits: ${Number(inv.credits || 0)}`,
      ...(Array.isArray(inv.items) ? inv.items.filter(item => item?.name).map(item => `- ${item.name} x${item.qty || 1}${item.note ? ` — ${item.note}` : ""}`) : []),
    ];
    const messageLimit = 80;
    const recentMessages = projectChats.flatMap(chat => (allMessages?.[chat.id] || [])
      .filter(msg => msg && msg.role !== "system" && String(msg.content || "").trim())
      .map(msg => ({ ...msg, chatTitle: chat.title || "Untitled Chat", chatUpdatedAt: chat.updatedAt || chat.createdAt || 0 })))
      .sort((a, b) => (b.ts || b.chatUpdatedAt || 0) - (a.ts || a.chatUpdatedAt || 0))
      .slice(0, messageLimit)
      .reverse();
    const sections = [
      `# Chat Context Export`,
      `Project: ${targetProject.name || "Untitled Project"}`,
      `Exported: ${new Date().toISOString()}`,
      ``,
      `## What this is`,
      `This is a readable context pack for pasting into another chat app. It includes the selected project's world info, prompt, active memories, characters, lore files, active project files, inventory, and recent chat turns. It is not a restore backup; use Backup All Data for app recovery.`,
      targetProject.systemPrompt ? `## Project System Prompt\n${targetProject.systemPrompt}` : "",
      targetProject.lore ? `## World Info\n${targetProject.lore}` : "",
      activeMemories.length ? `## Active Memories\n${activeMemories.map(formatMemoryForModel).join("\n")}` : "",
      activeCharacters.length ? `## Characters\n${activeCharacters.map(c => formatCharacterForModel(c, false, targetProject.characterSettings)).join("\n\n")}` : "",
      loreFiles.length ? `## Lore Files\n${loreFiles.map(formatLoreFileForModel).join("\n\n")}` : "",
      (Number(inv.credits || 0) || (Array.isArray(inv.items) && inv.items.length)) ? `## Inventory\n${inventoryLines.join("\n")}` : "",
      activeFiles.length ? `## Active Project Files\n${activeFiles.map(file => `### ${file.name || "Untitled File"}\n${String(file.text || "").trim()}`).join("\n\n")}` : "",
      projectChats.length ? `## Project Chats\n${projectChats.map(chat => `- ${chat.title || "Untitled Chat"}`).join("\n")}` : "",
      recentMessages.length ? `## Recent Chat Turns\n${recentMessages.map(msg => `### ${msg.chatTitle} — ${String(msg.role || "message").toUpperCase()}\n${String(msg.content || "").trim()}`).join("\n\n")}` : "",
    ].filter(Boolean);
    return sections.join("\n\n");
  };

  const copyChatContextExport = async () => {
    try {
      const text = buildChatContextExport();
      await navigator.clipboard.writeText(text);
      const targetProject = projects.find(p => p.id === contextExportProjectId) || activeProject;
      setContextExportStatus({ type: "ok", message: `Context copied for ${targetProject?.name || "selected project"}. Paste it into another chat app to carry over this project's reference material.` });
    } catch (error) {
      setContextExportStatus({ type: "error", message: error?.message || "Context copy failed. Try downloading the Markdown file instead." });
    }
  };

  const downloadChatContextExport = () => {
    try {
      const targetProject = projects.find(p => p.id === contextExportProjectId) || activeProject;
      const text = buildChatContextExport(targetProject?.id);
      const filename = makeDownloadName(`mirror-context-${makeExportSlug(targetProject?.name || "project")}`, "md");
      downloadTextFile(filename, text);
      setContextExportStatus({ type: "ok", message: `Context file created: ${filename}. This is for pasting/uploading into another chat app, not restoring app data.` });
    } catch (error) {
      setContextExportStatus({ type: "error", message: error?.message || "Context export failed." });
    }
  };

  const normalizeFullBackupPayload = (backup) => {
    if (backup?.type !== "mirror-full-backup" || !backup?.data) throw new Error("That file is not a valid full-app backup.");
    const data = backup.data || {};
    const backupProjects = (Array.isArray(data.projects) ? data.projects : []).map(normalizeProject);
    const backupChats = (Array.isArray(data.chats) ? data.chats : []).map(normalizeChat);
    const backupMessages = data.messages && typeof data.messages === "object" ? data.messages : {};
    const backupSettings = normalizeSettings(data.settings || DEFAULT_SETTINGS);
    const backupActive = data.active && typeof data.active === "object" ? data.active : {};
    return { backupProjects, backupChats, backupMessages, backupSettings, backupActive };
  };

  const makeImportedName = (name, fallback) => {
    const base = String(name || fallback || "Imported").trim() || fallback || "Imported";
    return /\(Imported\)$/i.test(base) ? base : `${base} (Imported)`;
  };

  const restoreFullBackup = async (backup, mode = restoreMode) => {
    const { backupProjects, backupChats, backupMessages, backupSettings, backupActive } = normalizeFullBackupPayload(backup);
    const currentProjects = (storage.get(STORAGE_KEYS.PROJECTS, []) || []).map(normalizeProject);
    const currentChats = (storage.get(STORAGE_KEYS.CHATS, []) || []).map(normalizeChat);
    const currentMessages = storage.get(STORAGE_KEYS.MESSAGES, {}) || {};
    let nextProjects = currentProjects;
    let nextChats = currentChats;
    let nextMessages = currentMessages;
    let nextSettings = normalizeSettings(storage.get(STORAGE_KEYS.SETTINGS, draft));
    let nextActiveProjectId = storage.get(STORAGE_KEYS.ACTIVE + "_proj", activeProjectId || null);
    let nextActiveChatId = storage.get(STORAGE_KEYS.ACTIVE + "_chat", activeChatId || null);

    if (mode === "replace") {
      nextProjects = backupProjects;
      nextChats = backupChats;
      nextMessages = backupMessages;
      nextSettings = backupSettings;
      nextActiveProjectId = backupActive.projectId || backupProjects[0]?.id || null;
      nextActiveChatId = backupActive.chatId || backupChats.find(c => c.projectId === nextActiveProjectId)?.id || backupChats[0]?.id || null;
    } else if (mode === "merge") {
      const projectMap = new Map(currentProjects.map(item => [item.id, item]));
      backupProjects.forEach(item => { if (item?.id) projectMap.set(item.id, normalizeProject({ ...(projectMap.get(item.id) || {}), ...item })); });
      const chatMap = new Map(currentChats.map(item => [item.id, item]));
      backupChats.forEach(item => { if (item?.id) chatMap.set(item.id, normalizeChat({ ...(chatMap.get(item.id) || {}), ...item })); });
      nextProjects = Array.from(projectMap.values());
      nextChats = Array.from(chatMap.values());
      nextMessages = { ...currentMessages, ...backupMessages };
      nextActiveProjectId = backupActive.projectId && nextProjects.some(p => p.id === backupActive.projectId) ? backupActive.projectId : nextActiveProjectId;
      nextActiveChatId = backupActive.chatId && nextChats.some(c => c.id === backupActive.chatId) ? backupActive.chatId : nextActiveChatId;
    } else {
      const projectIdMap = {};
      const chatIdMap = {};
      const importedAt = Date.now();
      const importedProjects = backupProjects.map((project, index) => {
        const nextId = makeId("proj_imp");
        projectIdMap[project.id] = nextId;
        return normalizeProject({
          ...project,
          id: nextId,
          name: makeImportedName(project.name, `Imported Project ${index + 1}`),
          createdAt: importedAt,
          importedAt,
        });
      });
      const fallbackProjectId = importedProjects[0]?.id || currentProjects[0]?.id || null;
      const importedChats = backupChats.map((chat, index) => {
        const nextId = makeId("chat_imp");
        chatIdMap[chat.id] = nextId;
        return normalizeChat({
          ...chat,
          id: nextId,
          projectId: projectIdMap[chat.projectId] || fallbackProjectId,
          title: makeImportedName(chat.title, `Imported Chat ${index + 1}`),
          autoTitle: false,
          createdAt: importedAt,
          updatedAt: importedAt,
          importedAt,
        });
      });
      const importedMessages = {};
      Object.entries(backupMessages).forEach(([oldChatId, list]) => {
        const nextChatId = chatIdMap[oldChatId];
        if (nextChatId) importedMessages[nextChatId] = Array.isArray(list) ? list.map(msg => ({ ...msg })) : [];
      });
      nextProjects = [...importedProjects, ...currentProjects];
      nextChats = [...importedChats, ...currentChats];
      nextMessages = { ...currentMessages, ...importedMessages };
      nextActiveProjectId = importedProjects[0]?.id || nextActiveProjectId;
      nextActiveChatId = importedChats.find(c => c.projectId === nextActiveProjectId)?.id || importedChats[0]?.id || nextActiveChatId;
    }

    await Promise.all([
      storage.set(STORAGE_KEYS.PROJECTS, nextProjects),
      storage.set(STORAGE_KEYS.CHATS, nextChats),
      storage.set(STORAGE_KEYS.MESSAGES, nextMessages),
      storage.set(STORAGE_KEYS.SETTINGS, nextSettings),
      storage.set(STORAGE_KEYS.ACTIVE + "_proj", nextActiveProjectId),
      storage.set(STORAGE_KEYS.ACTIVE + "_chat", nextActiveChatId),
    ]);
    setRestoreStatus({ type: "ok", message: mode === "add" ? "Backup imported as a new copy. Reloading…" : mode === "merge" ? "Backup merged. Reloading…" : "Backup restored. Reloading…" });
    setTimeout(() => window.location.reload(), 250);
  };

  const triggerRestorePicker = () => {
    setRestoreStatus(null);
    if (restoreMode === "replace") {
      setConfirm({
        message: "Replace ALL current app data with this backup? This is only for disaster recovery.",
        action: () => { setConfirm(null); setTimeout(() => restoreInputRef.current?.click(), 0); },
      });
      return;
    }
    restoreInputRef.current?.click();
  };

  const handleRestoreBackupChange = async (event) => {
    const file = event.target.files?.[0];
    event.target.value = "";
    if (!file) return;
    try {
      setRestoreStatus({ type: "ok", message: "Reading backup…" });
      const backup = await readJsonFile(file);
      await restoreFullBackup(backup, restoreMode);
    } catch (error) {
      setRestoreStatus({ type: "error", message: error?.message || "Could not import this backup." });
    }
  };

  const setProviderModels = (updater) => {
    setDraft(d => {
      const provider = normalizeApiProvider(d.apiProvider);
      const field = provider === "openai" ? "openaiModels" : "openrouterModels";
      const fallback = provider === "openai" ? OPENAI_BUILTIN_MODELS : BUILTIN_MODELS;
      const current = getProviderModels(d, provider);
      const nextList = typeof updater === "function" ? updater(current, d, provider) : updater;
      const safeList = Array.isArray(nextList) && nextList.length ? [...new Set(nextList.filter(Boolean))] : [...fallback];
      const nextModel = safeList.includes(d.model) ? d.model : safeList[0];
      return { ...d, [field]: safeList, ...(provider === "openrouter" ? { models: safeList } : {}), model: nextModel };
    });
  };

  const addModelWithMeta = (modelId, meta = null) => {
    const value = String(modelId || "").trim();
    if (!value) return;
    setDraft(d => {
      const provider = normalizeApiProvider(d.apiProvider);
      const field = provider === "openai" ? "openaiModels" : "openrouterModels";
      const current = getProviderModels(d, provider);
      const nextModels = current.includes(value) ? current : [...current, value];
      const nextMeta = normalizeModelMeta(d.modelMeta);
      if (meta) nextMeta[provider] = { ...(nextMeta[provider] || {}), [value]: meta };
      return normalizeSettings({ ...d, [field]: nextModels, ...(provider === "openrouter" ? { models: nextModels } : {}), modelMeta: nextMeta, model: d.model || value, defaultApiProvider: d.defaultApiProvider || provider, defaultModel: d.defaultModel || value });
    });
  };

  const addModel = () => {
    const value = newModel.trim();
    if (!value || modelList.includes(value)) { setNewModel(""); return; }
    addModelWithMeta(value);
    setNewModel("");
  };

  const moveModel = (modelId, direction) => {
    setProviderModels((current) => {
      const list = [...current];
      const index = list.indexOf(modelId);
      if (index === -1) return list;
      const nextIndex = index + direction;
      if (nextIndex < 0 || nextIndex >= list.length) return list;
      [list[index], list[nextIndex]] = [list[nextIndex], list[index]];
      return list;
    });
  };

  const removeModel = (modelId) => {
    setProviderModels((current, d, provider) => {
      const fallback = provider === "openai" ? OPENAI_BUILTIN_MODELS : BUILTIN_MODELS;
      const nextModels = current.filter(x => x !== modelId);
      return nextModels.length ? nextModels : [...fallback];
    });
    setConfirm(null);
  };

  const fetchProviderModels = async () => {
    const provider = normalizeApiProvider(draft.apiProvider);
    const key = getProviderApiKey(draft, provider);
    if (!key) {
